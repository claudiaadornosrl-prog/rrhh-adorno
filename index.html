async function enviarSolicitudPago() {
  const dias = parseInt(document.getElementById('solpag-dias').value, 10);
  const motivo = document.getElementById('solpag-motivo').value.trim();
  if (!dias || dias <= 0) { toast('Indicá los días', 'error'); return; }

  // Re-validar disponibilidad
  const r = await _disponibilidadParaPago(session.empleado_id);
  const elegibles = r.saldos.filter(d => d.disponible_pago > 0);
  const totalDisp = elegibles.reduce((s,d) => s + d.disponible_pago, 0);
  if (dias > totalDisp) {
    toast(`Solo podés pedir hasta ${totalDisp} días (${r.tipoTxt})`, 'error');
    return;
  }

  // Crear movimiento estado='solicitada' tipo_solicitud='pago'
  // Apuntamos al saldo más viejo elegible (al aprobar el sistema repartirá FIFO real)
  const fecha = new Date().toISOString().split('T')[0];
  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert({
    vacaciones_id: elegibles[0].vacId,
    empleado_id: session.empleado_id,
    fecha_desde: fecha,
    fecha_hasta: fecha,
    dias,
    estado: 'solicitada',
    tipo_solicitud: 'pago',
    solicitado_por: session.email,
    observaciones: 'Solicitud de pago' + (motivo ? ` — ${motivo}` : ''),
  }).select().single();
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('solicitar_pago_vacaciones', 'rrhh_vacaciones_movimientos', data.id, null, null, `${dias} días`);
  toast('Solicitud de pago enviada ✓ Te avisamos cuando la aprueben', 'success');
  document.getElementById('solpag-modal').remove();
  switchTab('mis-vacaciones');
}

async function enviarReporteTurno() {
  const emp = session.empleadoData;
  const fecha = document.getElementById('rep-fecha').value;
  const propuesto = document.getElementById('rep-propuesto').value;
  const comentario = document.getElementById('rep-comentario').value.trim();

  if (!fecha) { fb.innerHTML = '<span style="color:var(--danger)">Elegí el día.</span>'; return; }

  const { data: t } = await sb.from('rrhh_turnos').select('hora_inicio, hora_fin, es_franco').eq('empleado_id', emp.id).eq('fecha', fecha).maybeSingle();
  const turnoActual = t ? (t.es_franco ? 'Franco' : `${(t.hora_inicio||'').substring(0,5)} → ${(t.hora_fin||'').substring(0,5)}`) : 'Sin turno cargado';
  const { error } = await sb.from('rrhh_reportes_turno').insert({
    empleado_id: emp.id, local: emp.local, fecha,
    turno_actual: turnoActual, turno_propuesto: propuesto || null, comentario: comentario || null,

  setTimeout(() => { const md = document.getElementById('reporte-turno-modal'); if (md) md.remove(); }, 1500);
}

    .in('estado', ['aprobada','tomada'])
    .gte('fecha_hasta', fechaDesde.toISOString().split('T')[0])
    .lte('fecha_desde', fechaHasta.toISOString().split('T')[0]);

  // Permisos aprobados del mes
  const { data: permisos } = await sb.from('rrhh_permisos')
    .select('fecha, hora_desde, hora_hasta, estado, motivo')
    .eq('empleado_id', session.empleado_id)
    .eq('estado', 'aprobado')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);

  // Mis reportes de turno (para ver el estado: aceptado / rechazado / pendiente)
  const { data: misReportes } = await sb.from('rrhh_reportes_turno')
    .select('fecha, turno_actual, turno_propuesto, estado, respuesta, creado_at')
    .eq('empleado_id', session.empleado_id)
    .order('creado_at', { ascending: false }).limit(10);

  // Fichadas reales (crudas Anviz) del mes — entrada = primera, salida = última
  const { data: misFichs } = await sb.from('rrhh_fichadas_raw')
    .select('fecha, hora, fecha_hora')
    .eq('empleado_id', session.empleado_id)
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0])
    .order('fecha_hora', { ascending: true });
  const miFichMap = {};
  (misFichs || []).forEach(f => {
    if (!f.hora) return;
    if (!miFichMap[f.fecha]) miFichMap[f.fecha] = [];
    miFichMap[f.fecha].push(f.hora.substring(0,5));
  });

  // Feriados del mes
  const { data: feriados } = await sb.from('rrhh_feriados')
    .select('fecha, nombre, cierra_oficina, cierra_shoppings')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);
  const feriadoMap = {};
  (feriados || []).forEach(f => { feriadoMap[f.fecha] = f; });

  const turnoMap = {};
  (turnos || []).forEach(t => { turnoMap[t.fecha] = t; });

  // Marcar días dentro de vacaciones
  const enVacaciones = new Set();
  (vacaciones || []).forEach(v => {
    let d = new Date(v.fecha_desde + 'T12:00:00');
    const fin = new Date(v.fecha_hasta + 'T12:00:00');
    while (d <= fin) {
      enVacaciones.add(d.toISOString().split('T')[0]);
      d.setDate(d.getDate() + 1);
    }
  });

  const permisoMap = {};
  (permisos || []).forEach(p => { permisoMap[p.fecha] = p; });

  // Stats del mes
  const turnosTrabajados = (turnos || []).filter(t => !t.es_franco && t.tipo === 'planificado').length;
  const francos = (turnos || []).filter(t => t.es_franco).length;
  const diasVacaciones = enVacaciones.size;

  // Calcular total de horas planificadas
  let totalMinutos = 0;
  (turnos || []).forEach(t => {
    if (t.hora_inicio && t.hora_fin) {
      const [h1, m1] = t.hora_inicio.split(':').map(Number);
      const [h2, m2] = t.hora_fin.split(':').map(Number);
      totalMinutos += (h2*60+m2) - (h1*60+m1);
    }
  });
  const totalHoras = Math.floor(totalMinutos/60) + ':' + String(totalMinutos%60).padStart(2,'0');

  // Construir grid: 7 columnas (L M M J V S D) con vista mes completo estilo calendario
  const primerDow = new Date(y, m-1, 1).getDay(); // 0=domingo
  const offset = primerDow === 0 ? 6 : primerDow - 1; // empezar en lunes

  let html = `
    <div class="page-header">
      <h2>Mi calendario</h2>
      <div class="subtitle">${escapeHtml(session.empleadoData?.nombre_completo || '')} · ${LOCALES[session.empleadoData?.local]?.nombre || ''}</div>
    </div>

    <div class="cal-toolbar">
      <div class="month-nav">
        <button onclick="cambiarMiMes(-1)">‹</button>
        <span class="month-label">${new Date(y, m-1, 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })}</span>
        <button onclick="cambiarMiMes(1)">›</button>
      </div>
      <button class="btn" onclick="miCalState.mes = mesActualString(); switchTab('mi-calendario');">Hoy</button>
      <button class="btn accent2" onclick="abrirNuevoPermisoEmpleado()" style="margin-left:auto;">🙋 Pedir permiso</button>
      <button class="btn" onclick="abrirReporteTurno()">🚩 Reportar turno</button>
    </div>

    <div class="metrics-grid">
      <div class="metric-card accent"><div class="label">Días a trabajar</div><div class="value">${turnosTrabajados}</div></div>
      <div class="metric-card"><div class="label">Francos</div><div class="value">${francos}</div></div>
      <div class="metric-card"><div class="label">Vacaciones</div><div class="value">${diasVacaciones}</div></div>
      <div class="metric-card"><div class="label">Total horas</div><div class="value" style="font-size:24px;">${totalHoras}</div></div>
    </div>

    <div class="card" style="padding:18px;">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
        ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => `
          <div style="text-align:center;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:4px 0;">${d}</div>
        `).join('')}
        ${Array.from({length: offset}).map(() => '<div></div>').join('')}
        ${Array.from({length: diasMes}, (_, i) => {
          const d = i + 1;
          const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const date = new Date(y, m-1, d);
          const dow = date.getDay();
          const turno = turnoMap[fecha];
          const esVac = enVacaciones.has(fecha);
          const esFeriado = feriadoMap[fecha];
          const esHoy = fecha === hoyStr;
          const permiso = permisoMap[fecha];
          const local = session.empleadoData?.local;
          const cierraLocal = esFeriado && (
            (local === 'oficina' && esFeriado.cierra_oficina) ||
            ((local === 'unicenter' || local === 'alcorta') && esFeriado.cierra_shoppings)
          );

          let bg = 'white';
          let fg = 'var(--text)';
          let icon = '';
          let label = '';
          let titleAttr = '';

          if (esVac) {
            bg = '#d1faf1'; fg = '#0d9488';
            icon = '🌴';
            label = 'Vacaciones';
          } else if (cierraLocal) {
            bg = '#fee2e2'; fg = '#b91c1c';
            icon = '🔒';
            label = 'Cerrado';
            titleAttr = `title="${esFeriado.nombre}"`;
          } else if (turno?.es_franco) {
            bg = '#f3f4f6'; fg = 'var(--muted)';
            icon = '—';
            label = 'Franco';
          } else if (turno?.tipo === 'licencia') {
            bg = '#fef3c7'; fg = '#92400e';
            icon = '📋';
            label = 'Licencia';
          } else if (turno && turno.hora_inicio) {
            bg = turno.template?.color || '#6366f1';
            fg = 'white';
            icon = turno.template?.icono || '🕐';
            label = `${turno.hora_inicio.substring(0,5)} - ${turno.hora_fin?.substring(0,5)||''}`;
          }

          if (dow === 0 && bg === 'white') bg = '#fefce8'; // domingo claro
          if (esFeriado && bg === 'white') { bg = '#fef2f2'; titleAttr = `title="${esFeriado.nombre}"`; }
          if (esHoy) {
            // Borde resaltado
          }

          return `
            <div style="background:${bg};color:${fg};border:${esHoy ? '2px solid var(--accent2)' : '1px solid var(--border)'};border-radius:10px;padding:10px 8px;min-height:88px;display:flex;flex-direction:column;text-align:center;position:relative;" ${titleAttr}>
              <div style="font-size:12px;font-weight:600;opacity:0.7;text-align:left;">${d}</div>
              ${icon ? `<div style="font-size:22px;margin:4px 0;">${icon}</div>` : ''}
              <div style="font-size:11px;font-weight:600;line-height:1.2;">${label}</div>
              ${(() => {
                const fich = miFichMap[fecha];
                if (!fich || !fich.length) return '';
                const ent = fich[0];
                const sal = fich.length > 1 ? fich[fich.length-1] : '';
                const fichBg = (bg === 'white' || bg.startsWith('#fe') || bg.startsWith('#fef') || bg === '#f3f4f6') ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.22)';
                return `<div title="Fichadas reales Anviz" style="font-size:9px;margin-top:4px;background:${fichBg};border-radius:4px;padding:2px 3px;line-height:1.3;">✓ ${ent}${sal ? '<br>↳ ' + sal : ''}</div>`;
              })()}
              ${permiso ? `<div style="font-size:9px;margin-top:auto;background:#fef3c7;color:#92400e;border-radius:4px;padding:2px;">⏱ Permiso</div>` : ''}
              ${esHoy ? '<div style="position:absolute;top:4px;right:4px;background:var(--accent2);color:white;border-radius:50%;width:8px;height:8px;"></div>' : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>

    ${(permisos || []).length > 0 ? `
      <div class="card" style="margin-top:14px;">
        <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;">⏱ Permisos aprobados este mes</h3>
        <ul class="simple-list">
          ${permisos.map(p => `
            <li>
              <div>
                <strong>${fmtFecha(p.fecha)}</strong> · ${p.hora_desde?.substring(0,5)} a ${p.hora_hasta?.substring(0,5)}
                ${p.motivo ? `<div class="meta">${escapeHtml(p.motivo)}</div>` : ''}
              </div>
              <span class="emp-tag" style="background:#d1faf1;color:#0d9488;">aprobado</span>
            </li>
          `).join('')}
        </ul>
      </div>
    ` : ''}

    ${(misReportes && misReportes.length) ? `
      <div class="card" style="margin-top:14px;">
        <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;">🚩 Mis reportes de turno</h3>
        <ul class="simple-list">
          ${misReportes.map(r => {
            const badge = r.estado === 'aceptado' ? '<span class="emp-tag" style="background:#d1faf1;color:#0d9488;">✓ Corregido</span>'
                        : r.estado === 'rechazado' ? '<span class="emp-tag" style="background:#fee2e2;color:#b91c1c;">✗ Rechazado</span>'
                        : '<span class="emp-tag" style="background:#fef3c7;color:#92400e;">⏳ Pendiente</span>';
            return `<li>
              <div>
                <strong>${fmtFecha(r.fecha)}</strong> · turno cargado: ${escapeHtml(r.turno_actual||'—')}
                ${r.respuesta ? `<div class="meta">Respuesta de la encargada: ${escapeHtml(r.respuesta)}</div>` : ''}
              </div>
              ${badge}
            </li>`;
          }).join('')}
        </ul>
      </div>
    ` : ''}

    <div class="card" style="margin-top:14px;background:#eff6ff;border-color:#bfdbfe;">
      <strong style="color:#1e40af;">💡 Tip:</strong> Si necesitás retirarte antes algún día o pedir un permiso puntual, andá a <a href="javascript:switchTab('mis-vacaciones');" style="color:#1e40af;text-decoration:underline;font-weight:600;">Mis vacaciones</a> y solicitalo. La encargada va a recibir el pedido para aprobar.
    </div>
  `;
  return html;
}

function cambiarMiMes(delta) {
  const [y, m] = miCalState.mes.split('-').map(Number);
  let ny = y, nm = m + delta;
  if (nm < 1)  { nm = 12; ny -= 1; }
  if (nm > 12) { nm = 1;  ny += 1; }
  miCalState.mes = `${ny}-${String(nm).padStart(2,'0')}`;
  switchTab('mi-calendario');
}

async function guardarMisDatos() {
  const fields = {
    email: document.getElementById('self-email').value.trim() || null,
    telefono: document.getElementById('self-telefono').value.trim() || null,
    direccion: document.getElementById('self-direccion').value.trim() || null,
    emergencia_nombre: document.getElementById('self-emer-nombre').value.trim() || null,
    emergencia_telefono: document.getElementById('self-emer-tel').value.trim() || null,
    emergencia_vinculo: document.getElementById('self-emer-vinc').value.trim() || null,
  };
  const { error } = await sb.rpc('rrhh_actualizar_mis_datos', {
    p_email: fields.email,
    p_telefono: fields.telefono,
    p_direccion: fields.direccion,
    p_emergencia_nombre: fields.emergencia_nombre,
    p_emergencia_telefono: fields.emergencia_telefono,
    p_emergencia_vinculo: fields.emergencia_vinculo,
  });
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  if (session.empleadoData) Object.assign(session.empleadoData, fields);
  await auditLog('editar', 'rrhh_empleados', session.empleado_id, 'self-edit', null, JSON.stringify(fields));
  toast('Datos actualizados ✓', 'success');
}

async function subirMiFoto(inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('El archivo debe ser una imagen', 'error'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('La foto no puede superar 5 MB', 'error'); return; }
  toast('Subiendo foto…', '');
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
  const path = `${session.empleado_id}/avatar.${ext}`;
  const { error: upErr } = await sb.storage.from('rrhh-fotos').upload(path, file, { upsert: true, contentType: file.type });
  if (upErr) { toast('Error subiendo: ' + upErr.message, 'error'); return; }
  const { data: pub } = sb.storage.from('rrhh-fotos').getPublicUrl(path);
  const url = pub.publicUrl + '?v=' + Date.now();
  const { error: rpcErr } = await sb.rpc('rrhh_actualizar_mi_foto', { p_url: url });
  if (rpcErr) { toast('Error guardando: ' + rpcErr.message, 'error'); return; }
  if (session.empleadoData) session.empleadoData.foto_url = url;
  toast('Foto actualizada ✓', 'success');
  switchTab('mi-legajo');
}

            <div>

    ${archivos.length > 0 ? `

async function descargarRecibo(path) {
  const { data, error } = await sb.storage.from('rrhh-recibos').createSignedUrl(path, 60);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  window.open(data.signedUrl, '_blank');
}

// Wiring post-render para mis-vacaciones (calculador de días)
function wireVacacionesForm() {
  const dEl = document.getElementById('vac-desde');
  const hEl = document.getElementById('vac-hasta');
  if (!dEl || !hEl) return;
  const calc = () => {
    const d = dEl.value, h = hEl.value;
    const prev = document.getElementById('vac-preview');
    if (!d || !h) { prev.textContent = 'Seleccioná fechas'; return; }
    const dias = Math.round((new Date(h) - new Date(d)) / (1000*60*60*24)) + 1;
    if (dias <= 0) { prev.textContent = 'Las fechas son inválidas'; return; }
    prev.textContent = dias + ' días corridos';
  };
  dEl.addEventListener('change', calc);
  hEl.addEventListener('change', calc);
}

let _editandoVacacionId = null;

async function solicitarVacaciones() {
  let desde = document.getElementById('vac-desde').value;
  let hasta = document.getElementById('vac-hasta').value;
  const obs   = document.getElementById('vac-obs').value;
  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }

  // Aplicar regla franco asociado (solo locales)
  const ext = await _extenderPorFranco(session.empleado_id, desde, hasta);
  if (ext.extendido) {
    if (!confirm(`Tu período incluye un día de jornada larga (sáb/dom). Para que el finde quede completo, se va a extender automáticamente:\n\n  Original: ${desde} → ${hasta}\n  Ajustado: ${ext.desde} → ${ext.hasta}\n  ${ext.mensaje}\n\n¿Continuar?`)) return;
    desde = ext.desde;
    hasta = ext.hasta;
  }

  const dias = Math.round((new Date(hasta) - new Date(desde)) / (1000*60*60*24)) + 1;
  if (dias <= 0) { toast('Fechas inválidas', 'error'); return; }
  const año = new Date(desde).getFullYear();
  const { data: saldo } = await sb.from('rrhh_vacaciones').select('id, dias_pendientes').eq('empleado_id', session.empleado_id).eq('año', año).maybeSingle();
  if (!saldo) { toast('No hay saldo cargado para ' + año, 'error'); return; }

  // Si estoy editando, sumar los días de mi solicitud actual al saldo "disponible"
  let pendientesAjustados = saldo.dias_pendientes;
  if (_editandoVacacionId) {
    const { data: actual } = await sb.from('rrhh_vacaciones_movimientos').select('dias').eq('id', _editandoVacacionId).maybeSingle();
    if (actual) pendientesAjustados += actual.dias;
  }
  if (dias > pendientesAjustados) {
    if (!confirm(`Estás pidiendo ${dias} días pero tenés ${pendientesAjustados} pendientes. ¿${_editandoVacacionId ? 'Modificar' : 'Solicitar'} igual?`)) return;
  }

  if (_editandoVacacionId) {
    // UPDATE — solo permitido si sigue en estado='solicitada' (RLS lo valida)
    const { error } = await sb.from('rrhh_vacaciones_movimientos').update({
      fecha_desde: desde, fecha_hasta: hasta, dias,
      observaciones: obs || null,
    }).eq('id', _editandoVacacionId);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    await auditLog('modificar_vacaciones', 'rrhh_vacaciones_movimientos', _editandoVacacionId, null, null, `${desde} → ${hasta} (${dias}d)`);
    toast('Solicitud modificada ✓', 'success');
    _editandoVacacionId = null;
    switchTab('mis-vacaciones');
    return;
  }

  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert({
    vacaciones_id: saldo.id, empleado_id: session.empleado_id,
    fecha_desde: desde, fecha_hasta: hasta, dias,
    estado: 'solicitada',
    solicitado_por: session.email,
    observaciones: obs || null,
  }).select().single();
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('solicitar_vacaciones', 'rrhh_vacaciones_movimientos', data.id, null, null, `${desde} → ${hasta} (${dias}d)`);
  toast('Solicitud enviada ✓ Te avisamos cuando la aprueben', 'success');
  switchTab('mis-vacaciones');
}

async function modificarMiVacacion(id) {
  const { data: m, error } = await sb.from('rrhh_vacaciones_movimientos').select('*').eq('id', id).single();
  if (error || !m) { toast('No se pudo cargar la solicitud', 'error'); return; }
  if (m.estado !== 'solicitada') { toast('Solo podés modificar solicitudes pendientes', 'error'); return; }

  _editandoVacacionId = id;
  // Pre-cargar el form con los valores existentes
  setTimeout(() => {
    const dEl = document.getElementById('vac-desde');
    const hEl = document.getElementById('vac-hasta');
    const oEl = document.getElementById('vac-obs');
    if (dEl) dEl.value = m.fecha_desde;
    if (hEl) hEl.value = m.fecha_hasta;
    if (oEl) oEl.value = m.observaciones || '';
    // Cambiar el texto del botón Solicitar → Guardar cambios
    const btn = document.querySelector('button[onclick="solicitarVacaciones()"]');
    if (btn) btn.textContent = 'Guardar cambios';
    // Hacer scroll al form
    document.querySelector('.section-title')?.scrollIntoView({behavior:'smooth'});
    // Disparar el cálculo de días
    if (dEl) dEl.dispatchEvent(new Event('change'));
    toast('Editando solicitud — cambiá lo que necesites y guardá', 'info');
  }, 50);
}

async function anularMiVacacion(id) {
  if (!confirm('¿Anular esta solicitud de vacaciones? Se elimina del sistema.')) return;
  const { error } = await sb.from('rrhh_vacaciones_movimientos').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('anular_vacaciones', 'rrhh_vacaciones_movimientos', id, null, null, null);
  toast('Solicitud anulada', 'info');
  _editandoVacacionId = null;
  switchTab('mis-vacaciones');
}

// Anular una vacación aprobada/tomada — solo admin o encargada.
// Si tenía evento en Google Calendar, el trigger BEFORE DELETE lo encola
// en rrhh_calendar_delete_queue para que el script 11_sync_google_calendar.py
// lo borre del Calendar en la próxima corrida.
async function anularVacacionAprobada(id) {
  // Traer datos para mostrar en confirmación
  const { data: mov } = await sb.from('rrhh_vacaciones_movimientos')
    .select('id, fecha_desde, fecha_hasta, dias, estado, calendar_event_id, empleado:rrhh_empleados(nombre_completo)')
    .eq('id', id).single();
  if (!mov) { toast('No se encontró la vacación', 'error'); return; }

  const nombre = mov.empleado?.nombre_completo || '?';
  const enCalendar = !!mov.calendar_event_id;
  const msg = `¿Anular las vacaciones de ${nombre}?\n\n${fmtFecha(mov.fecha_desde)} → ${fmtFecha(mov.fecha_hasta)} · ${mov.dias} días\nEstado actual: ${mov.estado}`
    + (enCalendar ? '\n\n⚠ Tiene evento en Google Calendar — se borrará automáticamente en la próxima sincronización.' : '');
  if (!confirm(msg)) return;

  const { error } = await sb.from('rrhh_vacaciones_movimientos').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('anular_vacaciones_aprobada', 'rrhh_vacaciones_movimientos', id, mov, null, null);
  toast(enCalendar ? 'Vacación anulada. El evento del Calendar se borrará en la próxima sync.' : 'Vacación anulada', 'info');

  if (typeof renderVacaciones === 'function') renderVacaciones();
}

async function subirMiCertificado() {
  const desde = document.getElementById('cert-desde').value;
  const hasta = document.getElementById('cert-hasta').value;
  const medico = document.getElementById('cert-medico').value.trim() || null;
  const diag = document.getElementById('cert-diag').value.trim() || null;
  const file = document.getElementById('cert-file').files[0];
  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }
  if (!file) { toast('Subí el archivo', 'error'); return; }
  const dias = Math.round((new Date(hasta) - new Date(desde)) / (1000*60*60*24)) + 1;

  try {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${session.empleado_id}/certificado/${Date.now()}_${safeName}`;
    const { error: errUp } = await sb.storage.from('rrhh-certificados').upload(path, file, { contentType: file.type });
    if (errUp) throw errUp;
    const { data, error: errDb } = await sb.from('rrhh_certificados_medicos').insert({
      empleado_id: session.empleado_id,
      fecha_desde: desde, fecha_hasta: hasta, dias,
      medico, diagnostico: diag,
      archivo_url: path, validado: false,
    }).select().single();
    if (errDb) throw errDb;
    await auditLog('crear', 'rrhh_certificados_medicos', data.id, null, null, `${desde}→${hasta}`);
    toast('Certificado subido ✓', 'success');
    switchTab('mis-certif');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

let sueldosState = { periodo: null, local: '' };

async function renderSueldosAdmin() {
  // Período por defecto: mes anterior (los sueldos del mes anterior se pagan a fin de mes)
  if (!sueldosState.periodo) {
    const hoy = new Date();
    let m = hoy.getMonth(); // 0..11 → mes anterior
    let y = hoy.getFullYear();
    if (m === 0) { m = 12; y -= 1; }
    sueldosState.periodo = `${y}-${String(m).padStart(2,'0')}`;
  }

  const html = `
    <div class="page-header">
      <h2>Sueldos</h2>
      <div class="subtitle">Liquidaciones mes a mes con control automático vs CCT 130/75</div>
    </div>

    <div class="toolbar">
      <select id="sueldo-periodo">
        ${generarPeriodos(sueldosState.periodo).map(p => `<option value="${p}" ${sueldosState.periodo===p?'selected':''}>${p}</option>`).join('')}
      </select>
      <select id="sueldo-local">

        <option value="oficina"   ${sueldosState.local==='oficina'  ?'selected':''}>Oficina</option>
      </select>
      <div class="right">
        <button class="btn accent2" id="sueldo-upload-btn">📎 Subir recibos del mes</button>
      </div>
    </div>

    <div id="sueldo-content"><div class="spinner"></div></div>
  `;
  setTimeout(() => {
    document.getElementById('sueldo-periodo').addEventListener('change', e => { sueldosState.periodo = e.target.value; renderSueldoContent(); });
    document.getElementById('sueldo-local').addEventListener('change', e => { sueldosState.local = e.target.value; renderSueldoContent(); });
    document.getElementById('sueldo-upload-btn').addEventListener('click', abrirSubirSueldosBulk);
    renderSueldoContent();
  }, 0);

function generarPeriodos(actual) {
  // Genera 24 meses hacia atrás desde el seleccionado
  const periodos = new Set([actual]);
  const [y0, m0] = actual.split('-').map(Number);
  for (let i = 0; i < 24; i++) {
    let m = m0 - i; let y = y0;
    while (m <= 0) { m += 12; y -= 1; }
    periodos.add(`${y}-${String(m).padStart(2,'0')}`);
  }
  return [...periodos].sort().reverse();
}

let asisState = { tab: 'calendario', mes: null, local: '' };

}

      <button class="modal-tab ${asisState.tab==='fichadas'?'active':''}"   data-asistab="fichadas"   style="border-bottom:2px solid transparent;padding:12px 14px;">🕐 Fichadas (Anviz)</button>

      <button class="modal-tab ${asisState.tab==='reportes'?'active':''}" data-asistab="reportes" style="border-bottom:2px solid transparent;padding:12px 14px;">🚩 Reportes</button>
      <button class="modal-tab ${asisState.tab==='extras'?'active':''}"     data-asistab="extras"     style="border-bottom:2px solid transparent;padding:12px 14px;">⏰ Horas extras</button>
      <button class="modal-tab ${asisState.tab==='banco'?'active':''}"      data-asistab="banco"      style="border-bottom:2px solid transparent;padding:12px 14px;">🏦 Banco</button>

// ─── Reportes de turno: vista de la encargada (resolver) ───
async function renderReportesTurno(cont) {
  const isAdmin = session.rol === 'admin';
  const localF = isAdmin ? (asisState.local || null) : session.local_gerencia;
  const { data: reps } = await sb.from('rrhh_reportes_turno')
    .select('*, empleado:rrhh_empleados(nombre_completo, local)')
    .order('creado_at', { ascending: false }).limit(100);
  let lista = reps || [];
  if (localF) lista = lista.filter(r => r.local === localF);
  const { data: tpls } = await sb.from('rrhh_templates_turno')
    .select('id, local, nombre, hora_inicio, hora_fin, es_franco').order('orden', { ascending: true });
  const tplByLocal = {};
  (tpls || []).forEach(t => { (tplByLocal[t.local] = tplByLocal[t.local] || []).push(t); });
  const pendientes = lista.filter(r => r.estado === 'pendiente');
  const resueltos  = lista.filter(r => r.estado !== 'pendiente');

  const cardReporte = (r) => {
    const emp = r.empleado;
    const fecha = new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
    const opts = (tplByLocal[r.local] || []).filter(t => !t.es_franco).map(t => {
      const h = `${(t.hora_inicio||'').substring(0,5)}-${(t.hora_fin||'').substring(0,5)}`;
      const sel = r.turno_propuesto && r.turno_propuesto.includes(t.nombre) ? 'selected' : '';
      return `<option value="${t.id}" ${sel}>${escapeHtml(t.nombre)} (${h})</option>`;
    }).join('');
    return `
      <div class="card" style="margin-bottom:10px;border-left:3px solid #d97706;">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
          <strong>${escapeHtml(emp?.nombre_completo || '?')}</strong>
          <span style="font-size:12px;color:var(--muted);text-transform:capitalize;">${fecha}</span>
        </div>
        <div style="font-size:13px;margin-top:6px;">Turno cargado hoy: <strong>${escapeHtml(r.turno_actual || '—')}</strong></div>
        ${r.turno_propuesto ? `<div style="font-size:13px;">La vendedora propone: <strong>${escapeHtml(r.turno_propuesto)}</strong></div>` : ''}
        ${r.comentario ? `<div style="font-size:13px;margin-top:4px;font-style:italic;color:var(--muted);">"${escapeHtml(r.comentario)}"</div>` : ''}
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span style="font-size:12px;color:var(--muted);">Corregir a:</span>
          <select id="repfix-${r.id}" style="padding:6px;border:1px solid var(--border);border-radius:8px;font-size:12px;">
            ${opts}
            <option value="franco">❌ Franco</option>
          </select>
          <button class="btn small accent" onclick="aceptarReporteTurno(${r.id}, ${r.empleado_id}, '${r.fecha}')">✓ Aceptar y corregir</button>
          <button class="btn small danger" onclick="rechazarReporteTurno(${r.id})">✗ Rechazar</button>
        </div>
      </div>`;
  };

  cont.innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Turnos mal cargados que reportaron las vendedoras. Aceptá (corrige el turno automáticamente) o rechazá con un motivo.</div>
    <h3 style="font-size:14px;margin:0 0 8px;">Pendientes (${pendientes.length})</h3>
    ${pendientes.length ? pendientes.map(cardReporte).join('') : '<div class="emp-empty">Sin reportes pendientes. 🎉</div>'}
    ${resueltos.length ? `<h3 style="font-size:14px;margin:20px 0 8px;">Resueltos recientes</h3>` + resueltos.slice(0,10).map(r => {
      const f = new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit' });
      const badge = r.estado === 'aceptado' ? '<span style="color:var(--success)">✓ Aceptado</span>' : '<span style="color:var(--danger)">✗ Rechazado</span>';
      return `<div class="card" style="margin-bottom:6px;opacity:0.75;font-size:12px;"><strong>${escapeHtml(r.empleado?.nombre_completo || '?')}</strong> · ${f} · ${badge}${r.respuesta ? ' · ' + escapeHtml(r.respuesta) : ''}</div>`;
    }).join('') : ''}
  `;
}

async function aceptarReporteTurno(id, empId, fecha) {
  const sel = document.getElementById('repfix-' + id);
  const val = sel ? sel.value : null;
  let updateData;
  if (val === 'franco') {
    updateData = { empleado_id: empId, fecha, es_franco: true, template_id: null, hora_inicio: null, hora_fin: null, tipo: 'planificado', planificado_por: session.email };
  } else {
    const { data: t } = await sb.from('rrhh_templates_turno').select('id, hora_inicio, hora_fin').eq('id', Number(val)).maybeSingle();
    if (!t) { toast('Elegí un turno válido', 'error'); return; }
    updateData = { empleado_id: empId, fecha, es_franco: false, template_id: t.id, hora_inicio: t.hora_inicio, hora_fin: t.hora_fin, tipo: 'planificado', planificado_por: session.email };
  }
  const { error: e1 } = await sb.from('rrhh_turnos').upsert(updateData, { onConflict: 'empleado_id,fecha' });
  if (e1) { toast('Error al corregir turno: ' + e1.message, 'error'); return; }
  await sb.from('rrhh_reportes_turno').update({ estado: 'aceptado', resuelto_at: new Date().toISOString(), resuelto_por: session.email, respuesta: 'Turno corregido' }).eq('id', id);
  try { await auditLog('aceptar_reporte_turno', 'rrhh_reportes_turno', id, fecha, null, null); } catch(_) {}
  toast('Turno corregido. Reprocesá el mes para actualizar el resumen.', 'success');
  renderReportesTurno(document.getElementById('asis-content'));
}

async function rechazarReporteTurno(id) {
  const motivo = prompt('Motivo del rechazo (lo verá la vendedora):');
  if (motivo === null) return;
  await sb.from('rrhh_reportes_turno').update({ estado: 'rechazado', respuesta: motivo.trim() || 'Sin cambios', resuelto_at: new Date().toISOString(), resuelto_por: session.email }).eq('id', id);
  try { await auditLog('rechazar_reporte_turno', 'rrhh_reportes_turno', id, null, null, motivo); } catch(_) {}
  toast('Reporte rechazado', 'info');
  renderReportesTurno(document.getElementById('asis-content'));
}

async function renderAsisTab() {
  const cont = document.getElementById('asis-content');
  if (!cont) return;
  if      (asisState.tab === 'calendario') await renderCalendario(cont);
  else if (asisState.tab === 'fichadas')   await renderFichadas(cont);
  else if (asisState.tab === 'resumen')    await renderResumenMensual(cont);
  else if (asisState.tab === 'permisos')   await renderPermisosAdmin(cont);
  else if (asisState.tab === 'reportes')   await renderReportesTurno(cont);
  else if (asisState.tab === 'extras')     await renderExtrasAdmin(cont);
  else if (asisState.tab === 'banco')      await renderBancoAdmin(cont);
  // Actualizar badge de pendientes
  actualizarBadgePermisos();
}

async function actualizarBadgePermisos() {
  const badge = document.getElementById('badge-permisos-pend');
  if (!badge) return;
  try {
    let q = sb.from('rrhh_permisos_puntuales').select('id', { count: 'exact', head: true }).eq('estado','pendiente');
    if (session.rol === 'gerente') {
      // gerente solo ve los de su local — el RLS filtra solo
    }

  const fechaHasta = new Date(y, m, 0);   // último día del mes

  cont.innerHTML = `
    <div class="cal-toolbar">
      <div class="month-nav">
        <button onclick="cambiarMes(-1)" title="Mes anterior">‹</button>
        <span class="month-label">${new Date(y, m-1, 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })}</span>
        <button onclick="cambiarMes(1)" title="Mes siguiente">›</button>
      </div>
      ${isAdmin ? `
      <select id="cal-local" onchange="cambiarLocal(this.value)">

        <option value="unicenter" ${local==='unicenter'?'selected':''}>Unicenter</option>
        <option value="alcorta"   ${local==='alcorta'  ?'selected':''}>Alcorta</option>
        <option value="oficina"   ${local==='oficina'  ?'selected':''}>Oficina</option>
      </select>` : ''}
      <button class="btn" onclick="asisState.mes = mesActualString(); document.getElementById('main').innerHTML = '<div class=spinner></div>'; renderAsistenciasAdmin().then(h => document.getElementById('main').innerHTML = h);">Hoy</button>
      ${(isAdmin || session.rol==='gerente') ? `
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn accent2" onclick="generarMesDesdeDefault()">⚡ Generar mes desde default</button>
        <button class="btn" onclick="limpiarMes()">🗑️ Limpiar mes</button>
      </div>` : ''}
    </div>

    <div id="cal-grid-container"><div class="spinner"></div></div>
  `;

  await renderCalendarioGrid();
}

async function renderCalendarioGrid() {
  const cont = document.getElementById('cal-grid-container');
  if (!cont) return;
  const isAdmin = session.rol === 'admin';
  const localFiltro = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = new Date(y, m-1, 1);
  const fechaHasta = new Date(y, m, 0);
  const diasMes = fechaHasta.getDate();
  const hoyStr = new Date().toISOString().split('T')[0];

  // Empleados
  let qEmp = sb.from('rrhh_empleados').select('id, nombre, apellido, nombre_completo, local, foto_url').eq('estado', 'activo').order('local').order('apellido');
  if (localFiltro) qEmp = qEmp.eq('local', localFiltro);
  const { data: empleados } = await qEmp;

  // Turnos del mes
  const { data: turnos } = await sb.from('rrhh_turnos')
    .select('id, empleado_id, fecha, hora_inicio, hora_fin, es_franco, tipo, template:rrhh_templates_turno(codigo, nombre, color, icono)')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);

  // Map (emp_id × fecha) → turno
  const turnoMap = {};
  (turnos || []).forEach(t => { turnoMap[`${t.empleado_id}_${t.fecha}`] = t; });

  // Feriados
  const { data: feriados } = await sb.from('rrhh_feriados')
    .select('fecha, nombre, cierra_oficina, cierra_shoppings')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);
  const feriadoMap = {};
  (feriados || []).forEach(f => { feriadoMap[f.fecha] = f; });

  // Vacaciones aprobadas/tomadas del mes (cruzar con cada empleado/día)
  const empIds = (empleados || []).map(e => e.id);
  const vacSet = new Set();
  if (empIds.length) {
    const { data: vacs } = await sb.from('rrhh_vacaciones_movimientos')
      .select('empleado_id, fecha_desde, fecha_hasta, estado')
      .in('empleado_id', empIds)
      .in('estado', ['aprobada', 'tomada'])
      .or(`fecha_desde.lte.${fechaHasta.toISOString().split('T')[0]},fecha_hasta.gte.${fechaDesde.toISOString().split('T')[0]}`);
    (vacs || []).forEach(v => {
      let d = new Date(v.fecha_desde + 'T12:00:00');
      const f = new Date(v.fecha_hasta + 'T12:00:00');
      while (d <= f) {
        vacSet.add(`${v.empleado_id}_${d.toISOString().split('T')[0]}`);
        d.setDate(d.getDate() + 1);
      }
    });
  }

  // Licencias activas del mes
  const licSet = new Set();
  if (empIds.length) {
    const { data: lics } = await sb.from('rrhh_licencias')
      .select('empleado_id, fecha_desde, fecha_hasta')
      .in('empleado_id', empIds);
    (lics || []).forEach(l => {
      let d = new Date(l.fecha_desde + 'T12:00:00');
      const f = new Date(l.fecha_hasta + 'T12:00:00');
      while (d <= f) {
        licSet.add(`${l.empleado_id}_${d.toISOString().split('T')[0]}`);
        d.setDate(d.getDate() + 1);
      }
    });
  }

  // Días con carga sospechosa: fichadas reales muy lejos del turno cargado
  // (tarde >120min o banco <-120min, sin salvar) → probable error de carga de la encargada
  const sospechosos = new Set();
  if (empIds.length) {
    const { data: detSosp } = await sb.from('rrhh_asistencias_detalle')
      .select('empleado_id, fecha, estado, minutos_tarde, minutos_banco, error_salvado')
      .in('empleado_id', empIds)
      .gte('fecha', fechaDesde.toISOString().split('T')[0])
      .lte('fecha', fechaHasta.toISOString().split('T')[0]);
    (detSosp || []).forEach(d => {
      if (d.error_salvado) return;
      const tardeAlta = d.estado === 'tarde' && (d.minutos_tarde||0) > 120;
      const bancoRaro = (d.minutos_banco||0) < -120;
      if (tardeAlta || bancoRaro) sospechosos.add(`${d.empleado_id}_${d.fecha}`);
    });
  }

  // Fichadas reales (crudas Anviz): entrada = primera, salida = última de cada día
  const fichMap = {};
  if (empIds.length) {
    const { data: fichs } = await sb.from('rrhh_fichadas_raw')
      .select('empleado_id, fecha, hora, fecha_hora')
      .in('empleado_id', empIds)
      .gte('fecha', fechaDesde.toISOString().split('T')[0])
      .lte('fecha', fechaHasta.toISOString().split('T')[0])
      .order('fecha_hora', { ascending: true });
    (fichs || []).forEach(f => {
      const k = `${f.empleado_id}_${f.fecha}`;
      if (!fichMap[k]) fichMap[k] = [];
      if (f.hora) fichMap[k].push(f.hora.substring(0,5));
    });
  }

  if (!empleados || empleados.length === 0) {
    cont.innerHTML = '<div class="emp-empty">Sin empleados para mostrar.</div>';
    return;
  }

  const dias = Array.from({length: diasMes}, (_, i) => i + 1);
  const gridTemplate = `200px repeat(${diasMes}, minmax(56px, 1fr))`;

  const headerCells = dias.map(d => {
    const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const date = new Date(y, m-1, d);
    const dow = date.getDay();
    const esFeriado = !!feriadoMap[fecha];
    const esHoy = fecha === hoyStr;
    const cls = ['cal-cell-header'];
    if (dow === 0 || dow === 6) cls.push('weekend');
    if (esFeriado) cls.push('feriado');
    if (esHoy) cls.push('today');
    const diaSemana = ['D','L','M','M','J','V','S'][dow];
    return `<div class="${cls.join(' ')}" title="${esFeriado ? feriadoMap[fecha].nombre : ''}">
      ${diaSemana}<br><span style="font-size:14px;color:inherit;">${d}</span>
    </div>`;
  }).join('');

  const rows = empleados.map(e => {
    const cells = dias.map(d => {
      const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const turno = turnoMap[`${e.id}_${fecha}`];
      const date = new Date(y, m-1, d);
      const dow = date.getDay();
      const esFeriado = feriadoMap[fecha];
      const esHoy = fecha === hoyStr;
      const cierra = esFeriado && (
        (e.local === 'oficina' && esFeriado.cierra_oficina) ||
        ((e.local === 'unicenter' || e.local === 'alcorta') && esFeriado.cierra_shoppings)
      );

      const cls = ['cal-cell-day'];
      if (dow === 0 || dow === 6) cls.push('weekend');
      if (esHoy) cls.push('today');
      if (cierra) cls.push('feriado-cerrado');

      let content = '';
      let style = '';
      const enVacaciones = vacSet.has(`${e.id}_${fecha}`);
      const enLicencia = licSet.has(`${e.id}_${fecha}`);

      if (enVacaciones) {
        cls.push('vacaciones');
        content = '🌴';
      } else if (enLicencia) {
        cls.push('licencia');
        content = '📋';
      } else if (turno) {
        if (turno.tipo === 'vacaciones')  { cls.push('vacaciones'); content = '🌴'; }
        else if (turno.tipo === 'licencia') { cls.push('licencia');   content = '📋'; }
        else if (turno.es_franco)         { cls.push('franco');     content = '—'; }
        else {
          cls.push('has-turno');
          style = `background:${turno.template?.color || '#6366f1'};`;
          const hi = turno.hora_inicio ? turno.hora_inicio.substring(0,5) : '';
          const hf = turno.hora_fin    ? turno.hora_fin.substring(0,5) : '';
          content = `<div class="turno-icon">${turno.template?.icono || '🕐'}</div><div class="turno-time">${hi}</div>`;
          const fich = fichMap[`${e.id}_${fecha}`];
          if (fich && fich.length) {
            const ent = fich[0];
            const sal = fich.length > 1 ? fich[fich.length-1] : '';
            content += `<div class="cal-fichadas" title="Fichadas reales Anviz">✓ ${ent}${sal ? ' · ' + sal : ''}</div>`;
          }
          if (sospechosos.has(`${e.id}_${fecha}`)) content += `<div style="position:absolute;top:1px;right:2px;font-size:9px;" title="Las fichadas no coinciden con el turno cargado — revisar">⚠️</div>`;
        }
      } else if (cierra) {
        content = '🔒';
      }
      return `<div class="${cls.join(' ')}" style="${style}" data-emp="${e.id}" data-fecha="${fecha}" data-local="${e.local}">${content}</div>`;
    }).join('');

    return `
      <div class="cal-cell-emp">
        <div class="avatar">${e.foto_url ? `<img src="${escapeHtml(e.foto_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : escapeHtml(initials(e.apellido, e.nombre))}</div>
        <div class="info">
          <div class="name">${escapeHtml(e.apellido)}</div>
          <div class="role">${LOCALES[e.local]?.nombre || e.local}</div>
        </div>
      </div>
      ${cells}
    `;
  }).join('');

  cont.innerHTML = `
    <div class="cal-container">
      <div class="cal-grid" style="grid-template-columns: ${gridTemplate};">
        <div class="cal-cell-emp" style="background:#f9fafb;font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;">
          Empleado
        </div>
        ${headerCells}
        ${rows}
      </div>
    </div>

function cambiarMes(delta) {
  const [y, m] = asisState.mes.split('-').map(Number);
  let ny = y, nm = m + delta;
  if (nm < 1)  { nm = 12; ny -= 1; }
  if (nm > 12) { nm = 1;  ny += 1; }
  asisState.mes = `${ny}-${String(nm).padStart(2,'0')}`;
  document.getElementById('main').innerHTML = '<div class="spinner"></div>';
  renderAsistenciasAdmin().then(h => document.getElementById('main').innerHTML = h);
}

function cambiarLocal(local) {
  asisState.local = local;
  renderCalendarioGrid();
}

// ─── Popover de asignación de turno ───
let popoverState = { emp: null, fecha: null, local: null };

async function abrirPopoverTurno(cellEl) {
  if (session.rol === 'empleado') return; // sin permisos
  const emp_id = parseInt(cellEl.dataset.emp, 10);
  const fecha  = cellEl.dataset.fecha;
  const local  = cellEl.dataset.local;
  popoverState = { emp: emp_id, fecha, local };

  // Cerrar popover previo
  document.querySelectorAll('.tpl-popover').forEach(p => p.remove());

  // Cargar templates del local
  const { data: templates } = await sb.from('rrhh_templates_turno')
    .select('*').eq('local', local).eq('activo', true).order('orden');

  // Datos del empleado
  const { data: emp } = await sb.from('rrhh_empleados').select('nombre_completo').eq('id', emp_id).single();

  const pop = document.createElement('div');
  pop.className = 'tpl-popover show';

  // Posicionar relativo a la celda
  const rect = cellEl.getBoundingClientRect();
  pop.style.left = Math.min(window.innerWidth - 280, rect.left) + 'px';
  pop.style.top  = Math.min(window.innerHeight - 400, rect.bottom + 4) + 'px';

  pop.innerHTML = `
    <div class="tpl-popover-header">
      <div class="title">${escapeHtml(emp?.nombre_completo || '')}</div>
      <div class="meta">${new Date(fecha + 'T12:00:00').toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
    </div>
    ${(templates || []).map(t => `
      <div class="tpl-option" data-tpl="${t.id}" data-codigo="${t.codigo}">
        <div class="swatch" style="background:${t.color || '#6366f1'};"></div>
        <span style="font-size:14px;">${t.icono || ''}</span>
        <div class="label">${escapeHtml(t.nombre)}</div>
      </div>
    `).join('')}
    <hr>
    <div class="tpl-option" data-custom="1">
      <span style="font-size:14px;">✏️</span>
      <div class="label">Horario personalizado…</div>
    </div>
    <hr>
    <div class="tpl-option danger" data-clear="1">
      <span style="font-size:14px;">🗑️</span>
      <div class="label">Quitar turno</div>
    </div>
  `;
  document.body.appendChild(pop);

  pop.querySelectorAll('.tpl-option').forEach(opt => {
    opt.addEventListener('click', async () => {
      if (opt.dataset.clear) await quitarTurno(emp_id, fecha);
      else if (opt.dataset.custom) await asignarTurnoCustom(emp_id, fecha);
      else await asignarTurno(emp_id, fecha, parseInt(opt.dataset.tpl, 10));
      pop.remove();
      await renderCalendarioGrid();
    });
  });

  // Cerrar al clickear afuera
  setTimeout(() => {
    document.addEventListener('click', function cerrar(e) {
      if (!pop.contains(e.target)) {
        pop.remove();
        document.removeEventListener('click', cerrar);
      }
    }, { once: false });
  }, 100);
}

async function asignarTurno(emp_id, fecha, template_id) {
  const { data: tpl } = await sb.from('rrhh_templates_turno').select('*').eq('id', template_id).single();
  if (!tpl) { toast('Template no encontrado', 'error'); return; }
  const payload = {
    empleado_id: emp_id, fecha,
    template_id: template_id,
    hora_inicio: tpl.hora_inicio, hora_fin: tpl.hora_fin,
    es_franco: tpl.es_franco,
    tipo: tpl.es_franco ? 'franco' : 'planificado',
    planificado_por: session.email,
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('rrhh_turnos').upsert(payload, { onConflict: 'empleado_id,fecha' });
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Turno asignado ✓', 'success');
}

async function asignarTurnoCustom(emp_id, fecha) {
  const hi = prompt('Hora de inicio (HH:MM)', '10:00');
  if (!hi) return;
  const hf = prompt('Hora de fin (HH:MM)', '18:00');
  if (!hf) return;
  if (!/^\d{1,2}:\d{2}$/.test(hi) || !/^\d{1,2}:\d{2}$/.test(hf)) {
    toast('Formato HH:MM inválido', 'error'); return;
  }

    hora_inicio: hi, hora_fin: hf,
    es_franco: false, tipo: 'planificado',

  }, { onConflict: 'empleado_id,fecha' });
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Turno asignado ✓', 'success');
}

async function quitarTurno(emp_id, fecha) {

async function generarMesDesdeDefault() {
  if (!confirm('Esto va a generar los turnos del mes según el horario default de cada empleado.\n\n¿Sobrescribe los turnos ya cargados? NO — solo agrega días vacíos. Lo ya cargado queda intacto.\n\n¿Continuar?')) return;

  const isAdmin = session.rol === 'admin';
  const local = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = new Date(y, m-1, 1);
  const fechaHasta = new Date(y, m, 0);
  const diasMes = fechaHasta.getDate();

  toast('Generando mes…');

  // Empleados filtrados por local
  let qEmp = sb.from('rrhh_empleados').select('id, local').eq('estado', 'activo');
  if (local) qEmp = qEmp.eq('local', local);
  const { data: empleados } = await qEmp;

  // Defaults
  const { data: defaults } = await sb.from('rrhh_turnos_default')
    .select('*, template:rrhh_templates_turno(*)')
    .in('empleado_id', (empleados||[]).map(e => e.id));
  // Map (emp_id × dia_semana) → default
  const defMap = {};
  (defaults || []).forEach(d => { defMap[`${d.empleado_id}_${d.dia_semana}`] = d; });

  // Turnos ya cargados (para no pisar)
  const { data: ya } = await sb.from('rrhh_turnos')
    .select('empleado_id, fecha')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0])
    .in('empleado_id', (empleados||[]).map(e => e.id));
  const yaSet = new Set((ya || []).map(t => `${t.empleado_id}_${t.fecha}`));

  // Generar
  const inserts = [];
  for (const e of (empleados || [])) {
    for (let d = 1; d <= diasMes; d++) {
      const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (yaSet.has(`${e.id}_${fecha}`)) continue;
      const dow = new Date(y, m-1, d).getDay();
      const def = defMap[`${e.id}_${dow}`];
      if (!def) continue;
      inserts.push({
        empleado_id: e.id, fecha,
        template_id: def.template_id,
        hora_inicio: def.hora_inicio || def.template?.hora_inicio,
        hora_fin:    def.hora_fin    || def.template?.hora_fin,
        es_franco: def.es_franco,
        tipo: def.es_franco ? 'franco' : 'planificado',
        planificado_por: session.email,
      });
    }
  }
  if (inserts.length === 0) { toast('Nada que generar (todos los días ya estaban cargados)', ''); return; }

  // Insert en batches de 100
  for (let i = 0; i < inserts.length; i += 100) {
    const batch = inserts.slice(i, i+100);
    const { error } = await sb.from('rrhh_turnos').insert(batch);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
  }
  toast(`✓ ${inserts.length} turnos generados`, 'success');
  await renderCalendarioGrid();
}

async function cerrarMes(periodo, local) {
  const [y, m] = periodo.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];

  // Validar que no esté ya cerrado
  const { data: existente } = await sb.from('rrhh_meses_cerrados')
    .select('id').eq('local', local).eq('año', y).eq('mes', m).maybeSingle();
  if (existente) throw new Error('Este mes ya está cerrado');

  // Cargar empleados del local
  const { data: empleados } = await sb.from('rrhh_empleados')
    .select('id').eq('local', local).eq('estado','activo').eq('ficha', true);
  const empIds = (empleados || []).map(e => e.id);
  if (empIds.length === 0) throw new Error('Sin empleados para procesar');

  // Cargar detalles del mes con minutos_banco
  const { data: detalle } = await sb.from('rrhh_asistencias_detalle')
    .select('id, empleado_id, fecha, estado, minutos_banco, minutos_tarde, minutos_extra, minutos_salida_temp, error_salvado')
    .in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta);

  if (!detalle || detalle.length === 0) throw new Error('No hay datos procesados. Procesá el mes primero.');

  // Cargar config umbral mensual tardanzas
  const { data: tol } = await sb.from('rrhh_config_tolerancias')
    .select('umbral_mensual_tardanzas').eq('local', local).maybeSingle();
  const umbralMensual = tol?.umbral_mensual_tardanzas || 60;

  // Calcular movimientos por día (minutos_banco) + acumular tardanzas mensuales
  const movimientos = [];
  const tardanzaPorEmp = {};

  for (const d of detalle) {
    if (d.error_salvado) continue;  // si el día está salvado, no impacta banco
    if ((d.minutos_banco || 0) !== 0) {
      // Movimiento del día (ausente, salida temprana, etc.)
      let tipo = 'ajuste';
      if (d.estado === 'ausente') tipo = 'falta';
      else if (d.estado === 'tarde') tipo = 'tarde';
      movimientos.push({
        empleado_id: d.empleado_id,
        fecha: d.fecha,
        minutos: d.minutos_banco,
        tipo,
        referencia_tipo: 'asistencia',
        referencia_id: d.id,
        observaciones: `Cierre mes ${periodo} ${local}`,
        creado_por: session.email,
      });
    }
    // Acumular tardanzas para el umbral mensual (solo días con minutos_tarde y no salvados)
    if ((d.minutos_tarde || 0) > 0) {
      tardanzaPorEmp[d.empleado_id] = (tardanzaPorEmp[d.empleado_id] || 0) + d.minutos_tarde;
    }
  }

  // Aplicar umbral mensual de tardanzas
  for (const empIdStr in tardanzaPorEmp) {
    const empId = parseInt(empIdStr, 10);
    const acum = tardanzaPorEmp[empId];
    if (acum > umbralMensual) {
      movimientos.push({
        empleado_id: empId,
        fecha: fechaHasta,  // último día del mes
        minutos: -acum,     // descuenta TODO el acumulado
        tipo: 'tarde',
        referencia_tipo: 'umbral_mensual',
        observaciones: `Cierre mes ${periodo}: ${acum} min tarde acumulados (> umbral ${umbralMensual})`,
        creado_por: session.email,
      });
    }
  }

  // Insertar movimientos en lote
  const BATCH = 200;
  for (let i = 0; i < movimientos.length; i += BATCH) {
    const batch = movimientos.slice(i, i+BATCH);
    const { error } = await sb.from('rrhh_banco_minutos').insert(batch);
    if (error) throw error;
  }

  const minutosTotal = movimientos.reduce((s,mov) => s + (mov.minutos||0), 0);

  // Registrar cierre
  await sb.from('rrhh_meses_cerrados').insert({
    local, año: y, mes: m,
    cerrado_por: session.email,
    movimientos_creados: movimientos.length,
    minutos_totales: minutosTotal,
  });

  await auditLog('cerrar_mes', 'rrhh_meses_cerrados', null, null, null, `${local} ${periodo} - ${movimientos.length} mov (${minutosTotal} min)`);
  return { movimientos: movimientos.length, minutos_total: minutosTotal };
}

async function reabrirMesUI() {

    .select('id').eq('local', localFiltro).eq('año', y).eq('mes', m).maybeSingle();

  // Borrar movimientos creados en el cierre (filtramos por observaciones que contienen "Cierre mes <periodo> <local>")
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;

    .select('id').eq('local', localFiltro).eq('estado','activo').eq('ficha', true);

}

async function renderResumenContent() {
  const cont = document.getElementById('resumen-content');
  if (!cont) return;
  cont.innerHTML = '<div class="spinner"></div>';

  const isAdmin = session.rol === 'admin';
  const localFiltro = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];

  // Empleados + detalle del mes
  let qEmp = sb.from('rrhh_empleados').select('id, nombre_completo, local, ficha').eq('estado', 'activo');
  if (localFiltro) qEmp = qEmp.eq('local', localFiltro);
  const { data: empleadosRaw } = await qEmp;
  const empleados = (empleadosRaw || []).filter(e => e.ficha !== false);

  const { data: detalle } = await sb.from('rrhh_asistencias_detalle')
    .select('*').gte('fecha', fechaDesde).lte('fecha', fechaHasta);

  // Agrupar por empleado + contar errores de fichada
  const porEmp = {};
  (detalle || []).forEach(d => {
    if (!porEmp[d.empleado_id]) porEmp[d.empleado_id] = {
      puntual: 0, tarde: 0, ausente: 0, franco: 0, vacaciones: 0,
      licencia: 0, feriado: 0, falta_fichada: 0,
      min_tarde: 0, min_temp: 0, min_extra: 0, min_banco: 0,
      errores: 0,
    };
    const r = porEmp[d.empleado_id];
    r[d.estado] = (r[d.estado] || 0) + 1;
    r.min_tarde += d.minutos_tarde || 0;
    r.min_temp  += d.minutos_salida_temp || 0;
    r.min_extra += d.minutos_extra || 0;
    r.min_banco += d.minutos_banco || 0;
    // Puntos de error contra el premio (0, 1, o 2):
    //  - falta_fichada (sin entrada Y sin salida) = 2 puntos
    //  - falta_fichada (solo una) = 1 punto
    //  - ausente con turno planificado = 2 puntos (sin entrada ni salida)
    //  - tarde (minTarde > 5 min después del buffer = 10:06+) = 1 punto
    //  - Si está salvado → 0 puntos
    let pts = 0;
    if (d.estado === 'falta_fichada') {
      pts = (!d.entrada && !d.salida) ? 2 : 1;
    } else if (d.estado === 'ausente' && d.turno_id) {
      pts = 2;
    } else if (d.estado === 'tarde') {
      pts = 1;
    }
    if (pts > 0 && !d.error_salvado) r.errores += pts;
    if (pts > 0 && d.error_salvado)  r.errores_salvados = (r.errores_salvados || 0) + pts;
  });

  // Cargar config de tolerancias por local (para max_errores_premio)
  const { data: tols } = await sb.from('rrhh_config_tolerancias').select('local, max_errores_premio');
  const maxErrPorLocal = {};
  (tols || []).forEach(t => { maxErrPorLocal[t.local] = t.max_errores_premio || 4; });

  const lista = (empleados || []).sort((a,b) => (a.nombre_completo||'').localeCompare(b.nombre_completo||''));

  if (lista.length === 0 || Object.keys(porEmp).length === 0) {
    cont.innerHTML = `
      <div class="card">
        <div class="placeholder">
          <div class="icon">📊</div>
          <h3>Sin datos procesados para ${asisState.mes}</h3>
          <p>Tocá <strong>"⚙️ Procesar mes"</strong> arriba para cruzar fichadas y turnos.</p>
        </div>
      </div>`;
    return;
  }

  // Totales
  const tot = { puntual:0, tarde:0, ausente:0, min_tarde:0, min_extra:0, min_banco:0 };
  Object.values(porEmp).forEach(r => {
    tot.puntual += r.puntual; tot.tarde += r.tarde; tot.ausente += r.ausente;
    tot.min_tarde += r.min_tarde; tot.min_extra += r.min_extra; tot.min_banco += r.min_banco;
  });

  const fmtMin = (m) => {
    if (m == null) return '—';
    const sign = m < 0 ? '-' : '';
    const abs = Math.abs(m);
    return `${sign}${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
  };

  cont.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card accent"><div class="label">Empleados procesados</div><div class="value">${Object.keys(porEmp).length}</div></div>
      <div class="metric-card"><div class="label">Días puntuales</div><div class="value">${tot.puntual}</div></div>
      <div class="metric-card warn"><div class="label">Llegadas tarde</div><div class="value">${tot.tarde}</div><div class="hint">${fmtMin(tot.min_tarde)} acumulado</div></div>
      <div class="metric-card" style="border-left:4px solid var(--danger);"><div class="label">Ausencias</div><div class="value">${tot.ausente}</div></div>
      <div class="metric-card" style="border-left:4px solid #6366f1;"><div class="label">🎖 Pierden premio</div><div class="value">${(() => {
        return Object.entries(porEmp).filter(([eid, r]) => {
          const emp = lista.find(e => e.id == eid);
          if (!emp) return false;
          const max = maxErrPorLocal[emp.local] || 4;
          return (r.errores || 0) > max;
        }).length;
      })()}</div><div class="hint">empleados con +límite errores</div></div>
    </div>

    <table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-top:16px;">
      <thead>
        <tr style="background:#f9fafb;text-align:left;">
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);">Empleado</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);">Local</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">✓ Punt.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">⚠ Tarde</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">✗ Aus.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">🌴 Vac.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">📋 Lic.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Min tarde</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Min extra</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Δ banco</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">🎖 Premio</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map(e => {
          const r = porEmp[e.id] || {};
          return `
            <tr class="emp-row" data-emp="${e.id}" style="border-top:1px solid var(--border);cursor:pointer;" onclick="toggleDetalleResumen(${e.id})">
              <td style="padding:8px 12px;font-size:13px;"><span class="caret" id="caret-${e.id}" style="display:inline-block;width:14px;color:var(--muted);font-size:10px;">▶</span> ${escapeHtml(e.nombre_completo)}</td>
              <td style="padding:8px 12px;"><span class="emp-tag local-${e.local}">${LOCALES[e.local]?.nombre||''}</span></td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;">${r.puntual||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:${(r.tarde||0)>0?'var(--warning)':'var(--muted)'};">${r.tarde||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:${(r.ausente||0)>0?'var(--danger)':'var(--muted)'};">${r.ausente||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:var(--muted);">${r.vacaciones||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:var(--muted);">${r.licencia||0}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;color:${(r.min_tarde||0)>0?'var(--warning)':'var(--muted)'};">${fmtMin(r.min_tarde||0)}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;">${fmtMin(r.min_extra||0)}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;font-weight:600;color:${(r.min_banco||0)>=0?'var(--success)':'var(--danger)'};">${fmtMin(r.min_banco||0)}</td>
              <td style="padding:8px 12px;text-align:center;font-size:12px;">${(() => {

                else if (err === max) { bg = '#fef3c7'; color = '#92400e'; label = `⚠ ${err}/${max}`; }
                else { bg = '#d1faf1'; color = '#0d9488'; label = `✓ ${err}/${max}`; }
                return `<span style="background:${bg};color:${color};padding:3px 9px;border-radius:99px;font-weight:600;white-space:nowrap;">${label}</span>`;
              })()}</td>

            <tr id="detalle-${e.id}" style="display:none;background:#fafafa;">

                <div id="detalle-cont-${e.id}" style="padding:16px 20px;">

      </tbody>

    <div class="hint" style="margin-top:10px;font-size:12px;color:var(--muted);text-align:right;">
