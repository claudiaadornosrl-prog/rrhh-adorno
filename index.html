<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRHH · Claudia Adorno</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d9488">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RRHH Adorno">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ────────────────────────────────────────────────────────────── */
/* RRHH ADORNO — Estilos (consistentes con CRM, acento diferencial) */
/* ────────────────────────────────────────────────────────────── */
:root {
  --bg:        #f4f5f7;
  --card:      #ffffff;
  --text:      #1a1a2e;
  --muted:     #6b7280;
  --border:    #e5e7eb;
  --accent:    #1a1a2e;          /* navy (igual que CRM) */
  --accent2:   #0d9488;          /* teal — distintivo RRHH */
  --accent2-soft: #d1faf1;
  --danger:    #dc2626;
  --warning:   #d97706;
  --success:   #059669;
  --info:      #2563eb;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; font-family: 'Josefin Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 15px; }

/* ============================================== */
/* PANTALLA DE LOGIN                              */
/* ============================================== */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #1a1a2e 0%, #2d2d4e 100%);
  padding: 40px 20px;
}
.login-wrap { width: 100%; max-width: 400px; }
.login-logo { text-align: center; color: white; margin-bottom: 32px; }
.login-logo .badge { display: inline-block; background: var(--accent2); color: white; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.login-logo h1 { font-size: 32px; margin: 0; font-weight: 600; letter-spacing: -0.02em; }
.login-logo .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }
.login-card {
  background: white; border-radius: 20px; padding: 32px 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-card h2 { margin: 0 0 24px; font-size: 18px; font-weight: 600; text-align: center; color: var(--text); }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
  background: #fafafa; outline: none; transition: all 0.15s;
}
.login-field input:focus { border-color: var(--accent2); background: white; }
.login-btn {
  width: 100%; padding: 14px; background: var(--accent); color: white; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 600; margin-top: 8px; transition: background 0.15s;
}
.login-btn:hover { background: #2d2d4e; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error {
  background: #fee2e2; color: var(--danger); padding: 10px 14px; border-radius: 8px;
  font-size: 13px; margin-top: 12px; display: none;
}
.login-error.show { display: block; }
.login-footer { text-align: center; margin-top: 18px; font-size: 12px; color: rgba(255,255,255,0.5); }
.login-footer a { color: rgba(255,255,255,0.7); cursor: pointer; text-decoration: underline; }

/* ============================================== */
/* APP PRINCIPAL                                  */
/* ============================================== */
#app-screen { display: none; min-height: 100vh; }
#app-screen.active { display: flex; flex-direction: column; }

.topbar {
  background: var(--accent); color: white; padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo .badge {
  background: var(--accent2); color: white; padding: 3px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.topbar-logo h1 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
.topbar-link { font-size: 13px; color: rgba(255,255,255,0.6); padding: 4px 8px; border-radius: 6px; transition: all 0.15s; }
.topbar-link:hover { color: white; background: rgba(255,255,255,0.1); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-info { display: flex; align-items: center; gap: 10px; }
.user-info .name { font-size: 14px; font-weight: 500; }
.user-info .role { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.user-info .role.admin { background: var(--accent2); }
.user-info .role.gerente { background: var(--warning); }
.user-info .role.empleado { background: #6366f1; }
.logout-btn {
  background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 12px; border-radius: 8px; font-size: 13px; transition: all 0.15s;
}
.logout-btn:hover { background: rgba(255,255,255,0.1); color: white; }

.layout { display: flex; flex: 1; }

.sidebar {
  width: 240px; background: var(--card); border-right: 1px solid var(--border);
  padding: 20px 12px; display: flex; flex-direction: column; gap: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px;
  font-size: 14px; color: var(--muted); cursor: pointer; transition: all 0.15s;
  border: none; background: transparent; text-align: left; width: 100%;
}
.nav-item:hover { background: #f3f4f6; color: var(--text); }
.nav-item.active { background: var(--accent); color: white; font-weight: 500; }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 16px 14px 6px; font-weight: 600; }

.main {
  flex: 1; padding: 32px; overflow-y: auto;
  max-width: 1400px;
}

.page-header { margin-bottom: 24px; }
.page-header h2 { margin: 0 0 6px; font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
.page-header .subtitle { color: var(--muted); font-size: 14px; }

.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 24px; margin-bottom: 16px;
}

.placeholder {
  text-align: center; padding: 80px 20px; color: var(--muted);
}
.placeholder .icon { font-size: 48px; margin-bottom: 12px; }
.placeholder h3 { font-size: 18px; font-weight: 500; color: var(--text); margin: 0 0 6px; }
.placeholder p { margin: 0; font-size: 14px; }
.placeholder .phase-tag {
  display: inline-block; margin-top: 16px; background: var(--accent2-soft); color: var(--accent2);
  padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
}

/* Dashboard cards (Fase 0 — métricas simples) */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
.metric-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 8px; }
.metric-card .value { font-size: 32px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.metric-card .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
.metric-card.accent { border-left: 4px solid var(--accent2); }
.metric-card.warn   { border-left: 4px solid var(--warning); }

/* Spinner */
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================== */
/* MÓDULO EMPLEADOS                              */
/* ============================================== */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.toolbar input[type="search"], .toolbar select, .toolbar input[type="text"] {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--card); outline: none; transition: border-color 0.15s;
}
.toolbar input:focus, .toolbar select:focus { border-color: var(--accent2); }
.toolbar input[type="search"] { min-width: 260px; flex: 1; }
.toolbar .right { margin-left: auto; display: flex; gap: 10px; }

.btn { padding: 9px 16px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); border-radius: 10px; font-weight: 500; transition: all 0.15s; cursor: pointer; font-size: 14px; }
.btn:hover { background: #f3f4f6; }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #2d2d4e; }
.btn.accent2 { background: var(--accent2); color: white; border-color: var(--accent2); }
.btn.accent2:hover { background: #0b7a6e; }
.btn.danger { color: var(--danger); border-color: #fecaca; }
.btn.danger:hover { background: #fee2e2; }
.btn.small { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.emp-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px; cursor: pointer; transition: all 0.15s;
  display: flex; gap: 14px; align-items: flex-start;
}
.emp-card:hover { border-color: var(--accent2); box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-1px); }
.emp-avatar {
  width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #6366f1, #a78bfa); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 18px; letter-spacing: -0.01em;
}
.emp-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.emp-info { flex: 1; min-width: 0; }
.emp-info .name { font-weight: 600; font-size: 15px; line-height: 1.2; margin-bottom: 4px; }
.emp-info .meta { font-size: 12px; color: var(--muted); line-height: 1.4; }
.emp-info .meta .sep { margin: 0 6px; opacity: 0.5; }
.emp-info .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.emp-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: var(--muted);
  font-weight: 500;
}
.emp-tag.local-unicenter { background: #dbeafe; color: #1e40af; }
.emp-tag.local-alcorta   { background: #fce7f3; color: #be185d; }
.emp-tag.local-oficina   { background: #d1faf1; color: #0d9488; }
.emp-tag.estado-licencia { background: #fef3c7; color: #92400e; }
.emp-tag.estado-baja     { background: #fee2e2; color: #b91c1c; }

.emp-empty { text-align: center; padding: 60px 20px; color: var(--muted); background: var(--card); border-radius: 14px; border: 1px dashed var(--border); }

/* ============================================== */
/* MODAL — Vista 360°                            */
/* ============================================== */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55);
  z-index: 1000; display: none; align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--card); border-radius: 16px; width: 100%; max-width: 900px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4); overflow: hidden;
  animation: modal-in 0.18s ease-out;
}
@keyframes modal-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.modal-header .title { display: flex; align-items: center; gap: 14px; }
.modal-header h3 { margin: 0; font-size: 18px; font-weight: 600; }
.modal-header .meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
.modal-close { background: transparent; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: #f3f4f6; color: var(--text); }

.modal-tabs { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--border); background: #fafafa; overflow-x: auto; }
.modal-tab {
  padding: 12px 14px; background: transparent; border: none; border-bottom: 2px solid transparent;
  font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.modal-tab:hover { color: var(--text); }
.modal-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.modal-body { padding: 24px; max-height: 60vh; overflow-y: auto; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; background: #fafafa; }

/* Form layouts dentro del modal */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px 18px; }
.form-grid.full-row { grid-template-columns: 1fr; }
.form-row { display: flex; flex-direction: column; gap: 4px; }
.form-row label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.form-row input, .form-row select, .form-row textarea {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--card); outline: none; transition: border-color 0.15s; width: 100%;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent2); }
.form-row.full { grid-column: 1 / -1; }
.form-row textarea { min-height: 70px; resize: vertical; font-family: inherit; }
.form-row .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
.form-row.readonly input, .form-row.readonly select { background: #f9fafb; cursor: not-allowed; color: var(--muted); }

.section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.section-title:first-child { margin-top: 0; }

.simple-list { list-style: none; padding: 0; margin: 0; }
.simple-list li { padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.simple-list li .meta { color: var(--muted); font-size: 12px; }

.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: white;
  padding: 12px 18px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 2000; font-size: 14px; opacity: 0; transform: translateY(10px); transition: all 0.2s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: var(--danger); }
.toast.success { background: var(--success); }


/* ============================================== */
/* CALENDARIO DE TURNOS                          */
/* ============================================== */
.cal-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: auto; max-height: 75vh; }
.cal-grid { display: grid; min-width: max-content; }
.cal-header-row { display: contents; }
.cal-cell-header { background: #f9fafb; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 0; z-index: 2; border-bottom: 2px solid var(--border); }
.cal-cell-header.weekend { background: #fef3c7; color: #92400e; }
.cal-cell-header.feriado { background: #fee2e2; color: #b91c1c; }
.cal-cell-header.today { background: var(--accent2); color: white; }
.cal-cell-emp { background: white; padding: 8px 12px; font-size: 13px; font-weight: 500; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); position: sticky; left: 0; z-index: 1; min-width: 200px; display: flex; align-items: center; gap: 8px; }
.cal-cell-emp .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a78bfa); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.cal-cell-emp .info { min-width: 0; }
.cal-cell-emp .info .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-cell-emp .info .role { font-size: 10px; color: var(--muted); }
.cal-cell-day { background: white; padding: 4px; text-align: center; font-size: 11px; border-bottom: 1px solid var(--border); border-right: 1px solid #f3f4f6; cursor: pointer; min-width: 56px; min-height: 50px; transition: background 0.1s; position: relative; }
.cal-cell-day:hover { background: #f3f4f6; }
.cal-cell-day.weekend { background: #fefce8; }
.cal-cell-day.feriado { background: #fef2f2; }
.cal-cell-day.today { background: #ecfdf5; box-shadow: inset 0 0 0 2px var(--accent2); }
.cal-cell-day.has-turno { color: white; font-weight: 600; }
.cal-cell-day .turno-time { font-size: 10px; line-height: 1.2; }
.cal-cell-day .turno-icon { font-size: 14px; }
.cal-cell-day.franco { background: #f3f4f6; color: var(--muted); }
.cal-cell-day.vacaciones { background: #d1faf1; color: #0d9488; }
.cal-cell-day.licencia   { background: #fef3c7; color: #92400e; }
.cal-cell-day.feriado-cerrado { background: #fee2e2; }

/* Popover para asignar turno */
.tpl-popover {
  position: fixed; z-index: 3000;
  background: white; border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  padding: 8px; min-width: 240px; max-width: 320px;
  display: none;
}
.tpl-popover.show { display: block; }
.tpl-popover-header { padding: 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.tpl-popover-header .title { font-size: 13px; font-weight: 600; }
.tpl-popover-header .meta  { font-size: 11px; color: var(--muted); }
.tpl-option {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 13px; transition: background 0.1s;
}
.tpl-option:hover { background: #f3f4f6; }
.tpl-option .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
.tpl-option .label { flex: 1; }
.tpl-option .hint { font-size: 11px; color: var(--muted); }
.tpl-popover hr { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
.tpl-option.danger { color: var(--danger); }

.cal-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.cal-toolbar .month-nav { display: flex; align-items: center; gap: 4px; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 2px; }
.cal-toolbar .month-nav button { background: transparent; border: none; padding: 8px 10px; border-radius: 8px; cursor: pointer; color: var(--text); font-size: 14px; }
.cal-toolbar .month-nav button:hover { background: #f3f4f6; }
.cal-toolbar .month-label { padding: 8px 16px; font-weight: 600; font-size: 14px; min-width: 140px; text-align: center; }

@media (max-width: 768px) {
  .sidebar { width: 60px; padding: 12px 6px; }
  .nav-item .label { display: none; }
  .nav-section { display: none; }
  .main { padding: 16px; }
  .modal { max-width: 100%; margin: 0; border-radius: 12px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════ -->
<!-- LOGIN SCREEN                                                  -->
<!-- ════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="badge">Recursos Humanos</div>
      <h1>Claudia Adorno</h1>
      <div class="subtitle">Portal de RRHH · v0.1</div>
    </div>
    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="login-field">
          <label for="login-pass">Contraseña</label>
          <input type="password" id="login-pass" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="login-btn" id="login-submit">Ingresar</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
    <div class="login-footer">
      ¿Olvidaste tu contraseña? <a id="forgot-link">Recuperar</a>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════ -->
<!-- APP SCREEN                                                    -->
<!-- ════════════════════════════════════════════════════════════ -->
<div id="app-screen">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <span class="badge">RRHH</span>

    .eq('activo', true)
    .maybeSingle();

  if (errU || !usuarioRow) {
    showLoginError('Tu usuario no está autorizado. Contactá al administrador.');

  }

  let empleadoData = null;
  if (usuarioRow.empleado_id) {
    console.log('[LOGIN] querying rrhh_empleados id=', usuarioRow.empleado_id);
    const { data: emp, error: errE } = await sb
      .from('rrhh_empleados')
      .select('id, nombre, apellido, nombre_completo, local, fecha_ingreso, dni, foto_url')
      .eq('id', usuarioRow.empleado_id)
      .maybeSingle();
    console.log('[LOGIN] rrhh_empleados result:', { emp, errE });
    empleadoData = emp;
  }

  session = {
    user,
    rol: usuarioRow.rol,
    local_gerencia: usuarioRow.local_gerencia,
    empleado_id: usuarioRow.empleado_id,
    empleadoData,
    email: usuarioRow.email,
  };
  console.log('[LOGIN] session set:', session);

  // Update last_login (best effort, sin bloquear)

// ════════════════════════════════════════════════════════════
// DASHBOARD (Fase 0 — métricas básicas para verificar conexión)
// ════════════════════════════════════════════════════════════
async function renderDashboard() {
  // Solo para admin/gerente — empleado tiene su propio "mi-legajo"
  const isAdmin = session.rol === 'admin';
  const local = session.local_gerencia;

  let q = sb.from('rrhh_empleados').select('id, local, estado', { count: 'exact' }).eq('estado', 'activo');
  if (!isAdmin && local) q = q.eq('local', local);
  const { data: empleados, count: totalEmp } = await q;

  const conteoPorLocal = {};
  if (isAdmin && empleados) {
    empleados.forEach(e => { conteoPorLocal[e.local] = (conteoPorLocal[e.local] || 0) + 1; });
  }

  const hoy = new Date();
  const mesActual = hoy.getMonth() + 1;
  const diaActual = hoy.getDate();

  // Listado completo de empleados activos con fechas
  const { data: empAll } = await sb
    .from('rrhh_empleados')
    .select('id, nombre, apellido, fecha_nacimiento, fecha_ingreso, local')
    .eq('estado', 'activo');

  // Cumpleaños del mes
  const cumpleEsteMes = (empAll || [])
    .filter(e => e.fecha_nacimiento && (isAdmin || e.local === local))
    .map(e => {
      const d = new Date(e.fecha_nacimiento + 'T12:00:00');
      return { ...e, _mes: d.getMonth() + 1, _dia: d.getDate() };
    })
    .filter(e => e._mes === mesActual)
    .sort((a, b) => a._dia - b._dia);

  // Aniversarios laborales — próximos 30 días
  const aniversariosProximos = (empAll || [])
    .filter(e => e.fecha_ingreso && (isAdmin || e.local === local))
    .map(e => {
      const ing = new Date(e.fecha_ingreso + 'T12:00:00');
      // Calcular el próximo aniversario
      const aniv = new Date(hoy.getFullYear(), ing.getMonth(), ing.getDate());
      if (aniv < hoy) aniv.setFullYear(hoy.getFullYear() + 1);
      const años = aniv.getFullYear() - ing.getFullYear();
      const diasFalta = Math.ceil((aniv - hoy) / (1000 * 60 * 60 * 24));
      return { ...e, _aniv: aniv, _años: años, _diasFalta: diasFalta };
    })
    .filter(e => e._diasFalta <= 30 && e._años >= 1)
    .sort((a, b) => a._diasFalta - b._diasFalta);

  // Aniversarios del mes (este mes calendario)
  const aniversariosEsteMes = (empAll || [])
    .filter(e => e.fecha_ingreso && (isAdmin || e.local === local))
    .map(e => {
      const ing = new Date(e.fecha_ingreso + 'T12:00:00');
      return { ...e, _mes: ing.getMonth() + 1, _dia: ing.getDate(), _años: hoy.getFullYear() - ing.getFullYear() };
    })
    .filter(e => e._mes === mesActual && e._años >= 1)
    .sort((a, b) => a._dia - b._dia);

  const { count: vacPendientes } = await sb
    .from('rrhh_vacaciones_movimientos')
    .select('id', { count: 'exact', head: true })
    .eq('estado', 'solicitada');

  const { data: prox } = await sb
    .from('rrhh_feriados')
    .select('fecha, nombre')
    .gte('fecha', hoy.toISOString().split('T')[0])
    .order('fecha', { ascending: true })
    .limit(1);
  const proxFeriado = prox?.[0];

  let html = `
    <div class="page-header">
      <h2>${isAdmin ? 'Dashboard general' : 'Dashboard de ' + (LOCALES[local]?.nombre || local)}</h2>
      <div class="subtitle">${new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card accent">
        <div class="label">Empleados activos</div>
        <div class="value">${totalEmp || 0}</div>
        ${isAdmin ? `<div class="hint">Unicenter ${conteoPorLocal.unicenter||0} · Alcorta ${conteoPorLocal.alcorta||0} · Oficina ${conteoPorLocal.oficina||0}</div>` : '<div class="hint">' + (LOCALES[local]?.nombre || '') + '</div>'}
      </div>

      <div class="metric-card">
        <div class="label">🎂 Cumpleaños este mes</div>
        <div class="value">${cumpleEsteMes.length}</div>
        <div class="hint">${cumpleEsteMes.length === 0 ? 'Ninguno en ' + hoy.toLocaleDateString('es-AR', { month: 'long' }) : cumpleEsteMes.slice(0,3).map(c => `${c._dia}/${c._mes} ${c.nombre.split(' ')[0]}`).join(' · ')}</div>
      </div>

      <div class="metric-card accent" style="border-left-color:#f59e0b;">
        <div class="label">🏆 Aniversarios este mes</div>
        <div class="value">${aniversariosEsteMes.length}</div>
        <div class="hint">${aniversariosEsteMes.length === 0 ? 'Ninguno en ' + hoy.toLocaleDateString('es-AR', { month: 'long' }) : aniversariosEsteMes.slice(0,3).map(a => `${a._dia}/${a._mes} ${a.nombre.split(' ')[0]} (${a._años} a.)`).join(' · ')}</div>
      </div>

      ${isAdmin ? `
      <div class="metric-card warn">
        <div class="label">Vacaciones pendientes</div>
        <div class="value">${vacPendientes || 0}</div>
        <div class="hint">Solicitudes sin aprobar</div>
      </div>
      ` : ''}

      <div class="metric-card">
        <div class="label">Próximo feriado</div>
        <div class="value" style="font-size:18px;">${proxFeriado ? new Date(proxFeriado.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'short' }) : '—'}</div>
        <div class="hint">${proxFeriado?.nombre || 'Sin feriados próximos'}</div>
      </div>
    </div>

    ${(cumpleEsteMes.length > 0 || aniversariosProximos.length > 0) ? `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;">

        ${cumpleEsteMes.length > 0 ? `
        <div class="card">
          <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;">🎂 Cumpleaños de ${hoy.toLocaleDateString('es-AR', { month: 'long' })}</h3>
          <ul class="simple-list" style="margin:0;">
            ${cumpleEsteMes.map(c => {
              const esHoy = c._dia === diaActual;
              return `
                <li style="${esHoy ? 'background:#fef3c7;border-color:#fde68a;' : ''}">
                  <div>
                    <strong>${escapeHtml(c.nombre.split(' ')[0])} ${escapeHtml(c.apellido)}</strong>
                    ${esHoy ? '<span class="emp-tag" style="background:#f59e0b;color:white;margin-left:8px;">¡HOY!</span>' : ''}
                    <div class="meta">${c._dia} de ${hoy.toLocaleDateString('es-AR', { month: 'long' })} · ${LOCALES[c.local]?.nombre || ''}</div>
                  </div>
                  <button class="btn small" onclick="openEmpleadoModal(${c.id})">Ver</button>
                </li>
              `;
            }).join('')}
          </ul>
        </div>
        ` : ''}

        ${aniversariosProximos.length > 0 ? `
        <div class="card">
          <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;">🏆 Próximos aniversarios laborales (30 días)</h3>
          <ul class="simple-list" style="margin:0;">
            ${aniversariosProximos.map(a => {
              const esHoy = a._diasFalta === 0;
              return `
                <li style="${esHoy ? 'background:#d1faf1;border-color:#5eead4;' : ''}">
                  <div>
                    <strong>${escapeHtml(a.nombre.split(' ')[0])} ${escapeHtml(a.apellido)}</strong>
                    ${esHoy ? `<span class="emp-tag" style="background:#0d9488;color:white;margin-left:8px;">¡HOY cumple ${a._años} años!</span>` : ''}
                    <div class="meta">${esHoy ? `${a._años} años con nosotros` : `Cumple <strong>${a._años} ${a._años === 1 ? 'año' : 'años'}</strong> el ${a._aniv.toLocaleDateString('es-AR', { day: 'numeric', month: 'long' })} (en ${a._diasFalta} ${a._diasFalta === 1 ? 'día' : 'días'})`} · ${LOCALES[a.local]?.nombre || ''}</div>
                  </div>
                  <button class="btn small" onclick="openEmpleadoModal(${a.id})">Ver</button>
                </li>
              `;
            }).join('')}
          </ul>
        </div>
        ` : ''}

      </div>
    ` : ''}
  `;
  return html;
}

// LOGIN HANDLERS
// ════════════════════════════════════════════════════════════
function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideLoginError() {
  document.getElementById('login-error').classList.remove('show');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideLoginError();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-submit');
  btn.disabled = true; btn.textContent = 'Ingresando…';
  try {
    console.log('[LOGIN] signInWithPassword...');
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    console.log('[LOGIN] signIn result:', { hasUser: !!data?.user, error });
    if (error) throw error;
    if (!data?.user) throw new Error('No se obtuvo usuario');
    // Llamar onLoggedIn directamente (no depender de onAuthStateChange)
    await onLoggedIn(data.user);
  } catch (err) {
    console.error('[LOGIN] error:', err);
    showLoginError(err.message || 'Error al iniciar sesión');
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

document.getElementById('forgot-link').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showLoginError('Ingresá tu email primero arriba.'); return; }
  hideLoginError();
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href
    });
    if (error) throw error;
    alert('Te mandamos un mail con el link para resetear la contraseña. Revisá tu casilla (puede caer en spam).');
  } catch (err) {
    showLoginError(err.message || 'Error al pedir recuperación');
  }
});

// UTILS
// ════════════════════════════════════════════════════════════
function toast(msg, kind = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function initials(apellido, nombre) {
  const a = (apellido || '').trim()[0] || '';
  const n = (nombre   || '').trim()[0] || '';
  return (a + n).toUpperCase() || '?';
}

function fmtFecha(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function antigüedad(fechaIngreso) {
  if (!fechaIngreso) return '—';
  const ing = new Date(fechaIngreso);
  const hoy = new Date();
  const años = (hoy - ing) / (1000 * 60 * 60 * 24 * 365.25);
  if (años < 1) {
    const meses = Math.floor(años * 12);
    return meses + (meses === 1 ? ' mes' : ' meses');
  }
  return Math.floor(años) + (Math.floor(años) === 1 ? ' año' : ' años');
}

async function renderEmpleadosList() {
  const cont = document.getElementById('emp-list-container');
  cont.innerHTML = '<div class="spinner"></div>';

  let q = sb.from('rrhh_empleados').select(`
    id, dni, cuil, apellido, nombre, nombre_completo, local, estado,
    fecha_ingreso, foto_url, telefono, email,
    categoria:rrhh_categorias_cct(nombre)
  `).order('apellido', { ascending: true });

  if (empleadosState.estado) q = q.eq('estado', empleadosState.estado);
  if (empleadosState.local)  q = q.eq('local',  empleadosState.local);

  const { data, error } = await q;
  if (error) {
    cont.innerHTML = `<div class="card" style="color:var(--danger)">Error: ${error.message}</div>`;
    return;
  }
  empleadosState.empleados = data || [];

  // Filtro search en cliente
  let lista = empleadosState.empleados;
  if (empleadosState.search.trim()) {
    const s = empleadosState.search.toLowerCase().trim();
    lista = lista.filter(e =>
      (e.nombre_completo || '').toLowerCase().includes(s) ||
      (e.dni  || '').includes(s) ||
      (e.cuil || '').includes(s) ||
      (e.email || '').toLowerCase().includes(s)
    );
  }

  if (lista.length === 0) {
    cont.innerHTML = `<div class="emp-empty">No hay empleados que coincidan con los filtros.</div>`;
    return;
  }

  cont.innerHTML = '<div class="emp-grid">' + lista.map(e => `
    <div class="emp-card" data-id="${e.id}">
      <div class="emp-avatar">${e.foto_url ? `<img src="${escapeHtml(e.foto_url)}" alt="">` : escapeHtml(initials(e.apellido, e.nombre))}</div>
      <div class="emp-info">
        <div class="name">${escapeHtml(e.nombre_completo)}</div>
        <div class="meta">
          ${e.categoria?.nombre ? escapeHtml(e.categoria.nombre) : 'Sin categoría'}
          <span class="sep">·</span>
          ${antigüedad(e.fecha_ingreso)}
        </div>
        <div class="tags">
          <span class="emp-tag local-${e.local}">${LOCALES[e.local]?.icon || ''} ${LOCALES[e.local]?.nombre || e.local}</span>
          ${e.estado !== 'activo' ? `<span class="emp-tag estado-${e.estado}">${e.estado}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('') + '</div>';

  cont.querySelectorAll('.emp-card').forEach(card => {
    card.addEventListener('click', () => openEmpleadoModal(parseInt(card.dataset.id, 10)));
  });
}

async function openEmpleadoModal(empleadoId) {
  empModalState.empleadoId = empleadoId;
  empModalState.isNew = empleadoId == null;
  empModalState.editing = empModalState.isNew;  // si es nuevo, ya está en modo edición
  empModalState.activeTab = 'datos';

  const backdrop = document.getElementById('emp-modal-backdrop');
  backdrop.classList.add('show');
  document.getElementById('emp-modal-body').innerHTML = '<div class="spinner"></div>';
  document.getElementById('emp-modal-name').textContent = empModalState.isNew ? 'Nuevo empleado' : 'Cargando…';
  document.getElementById('emp-modal-meta').textContent = '';
  document.getElementById('emp-modal-avatar').textContent = '+';
  document.getElementById('emp-modal-tabs').innerHTML = '';
  document.getElementById('emp-modal-footer-left').innerHTML = '';
  document.getElementById('emp-modal-save').style.display = 'none';

  if (empModalState.isNew) {
    empModalState.empleadoData = {
      apellido: '', nombre: '', dni: '', cuil: '',
      local: '', categoria_cct_id: null, tipo_contrato: 'relacion_dependencia',
      estado: 'activo', fecha_ingreso: new Date().toISOString().split('T')[0],
    };
    empModalState.formData = { ...empModalState.empleadoData };
    renderModalTabs();
    renderModalBody();
  } else {
    const { data, error } = await sb.from('rrhh_empleados').select(`
      *, categoria:rrhh_categorias_cct(id, codigo, nombre, sueldo_basico)
    `).eq('id', empleadoId).maybeSingle();
    if (error || !data) {
      document.getElementById('emp-modal-body').innerHTML = `<div style="color:var(--danger);">Error al cargar empleado: ${error?.message || 'no encontrado'}</div>`;
      return;
    }
    empModalState.empleadoData = data;
    empModalState.formData = { ...data };
    document.getElementById('emp-modal-name').textContent = data.nombre_completo;
    document.getElementById('emp-modal-meta').textContent = `${data.categoria?.nombre || 'Sin categoría'} · ${LOCALES[data.local]?.nombre || data.local} · DNI ${data.dni || '—'} · Ingreso ${fmtFecha(data.fecha_ingreso)} (${antigüedad(data.fecha_ingreso)})`;
    document.getElementById('emp-modal-avatar').innerHTML = data.foto_url
      ? `<img src="${escapeHtml(data.foto_url)}">`

    renderModalBody();
  }

function renderModalTabs() {

    <button class="modal-tab ${empModalState.activeTab === t.id ? 'active' : ''}" data-tab="${t.id}">
      ${t.icon} ${t.label}
    </button>
  `).join('');
  const el = document.getElementById('emp-modal-tabs');
  el.innerHTML = html;
  el.querySelectorAll('.modal-tab').forEach(b => {
    b.addEventListener('click', () => {
      empModalState.activeTab = b.dataset.tab;
      renderModalTabs();
      renderModalBody();
    });
  });
}

async function renderModalBody() {
  const body = document.getElementById('emp-modal-body');
  const saveBtn = document.getElementById('emp-modal-save');
  const footerLeft = document.getElementById('emp-modal-footer-left');
  const isAdmin = session.rol === 'admin';

  switch (empModalState.activeTab) {
    case 'datos':       await renderTabDatos();       break;
    case 'documentos':  await renderTabDocumentos();  break;
    case 'sueldos':     await renderTabSueldos();     break;
    case 'asistencias': await renderTabAsistencias(); break;
    case 'vacaciones':  await renderTabVacaciones();  break;
    case 'licencias':   await renderTabLicencias();   break;
    case 'certificados':await renderTabCertificados();break;
    case 'apercibimientos': await renderTabApercibimientos(); break;
    case 'premios':     await renderTabPremios();     break;
    case 'notas':       await renderTabNotas();       break;
  }
}

async function docAction(docId, action) {
  const doc = (await sb.from('rrhh_documentos').select('*').eq('id', docId).single()).data;
  if (!doc) return;
  if (action === 'ver') {
    // Generar signed URL del bucket
    const path = doc.archivo_url; // guardamos el path interno
    const { data, error } = await sb.storage.from('rrhh-documentos').createSignedUrl(path, 60);
    if (error) { toast('Error al generar enlace: ' + error.message, 'error'); return; }
    window.open(data.signedUrl, '_blank');
  } else if (action === 'eliminar') {
    if (!confirm('¿Eliminar este documento? Esta acción no se puede deshacer.')) return;
    await sb.storage.from('rrhh-documentos').remove([doc.archivo_url]);
    const { error } = await sb.from('rrhh_documentos').delete().eq('id', docId);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    await auditLog('eliminar', 'rrhh_documentos', docId, null, doc.nombre, null);
    toast('Documento eliminado', 'success');
    renderTabDocumentos();
  }
}

async function doSubirDoc() {
  const tipo = document.getElementById('doc-tipo').value;
  const nombre = document.getElementById('doc-nombre').value.trim();
  const vence = document.getElementById('doc-vence').value || null;
  const fileInput = document.getElementById('doc-file');
  const file = fileInput.files[0];
  if (!nombre) { toast('Falta el nombre', 'error'); return; }
  if (!file) { toast('Falta el archivo', 'error'); return; }
  if (file.size > 20 * 1024 * 1024) { toast('Archivo > 20MB', 'error'); return; }

  const btn = document.getElementById('emp-modal-save');
  btn.disabled = true; btn.textContent = 'Subiendo…';

  try {
    // Path: {empleado_id}/{tipo}/{timestamp}_{filename}
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${empModalState.empleadoId}/${tipo}/${Date.now()}_${safeName}`;
    const { error: errUpload } = await sb.storage.from('rrhh-documentos').upload(path, file, { contentType: file.type });
    if (errUpload) throw errUpload;
    const { data: created, error: errDb } = await sb.from('rrhh_documentos').insert({
      empleado_id: empModalState.empleadoId,
      tipo, nombre, archivo_url: path,
      fecha_vencimiento: vence,
      cargado_por: session.email,
    }).select().single();
    if (errDb) throw errDb;
    await auditLog('crear', 'rrhh_documentos', created.id, 'archivo', null, nombre);
    toast('Documento subido ✓', 'success');
    document.getElementById('emp-modal-save').onclick = saveEmpleado;
    renderTabDocumentos();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Subir';
  }
}

async function doGuardarLicencia() {
  const tipo  = document.getElementById('lic-tipo').value;
  const paga  = document.getElementById('lic-paga').value === 'true';
  const desde = document.getElementById('lic-desde').value;
  const hasta = document.getElementById('lic-hasta').value;
  const obs   = document.getElementById('lic-obs').value.trim() || null;
  const file  = document.getElementById('lic-file').files[0];

  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }
  if (new Date(hasta) < new Date(desde)) { toast('Hasta no puede ser anterior a Desde', 'error'); return; }
  const dias = Math.round((new Date(hasta) - new Date(desde)) / (1000*60*60*24)) + 1;

  const btn = document.getElementById('emp-modal-save');
  btn.disabled = true; btn.textContent = 'Guardando…';

  try {
    let certUrl = null;
    if (file) {
      if (file.size > 10 * 1024 * 1024) { toast('Archivo > 10MB', 'error'); btn.disabled = false; btn.textContent = 'Guardar'; return; }
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `${empModalState.empleadoId}/licencia/${Date.now()}_${safeName}`;
      const { error: errUp } = await sb.storage.from('rrhh-certificados').upload(path, file, { contentType: file.type });
      if (errUp) throw errUp;
      certUrl = path;
    }
    const { data, error } = await sb.from('rrhh_licencias').insert({
      empleado_id: empModalState.empleadoId,
      tipo, fecha_desde: desde, fecha_hasta: hasta, dias, paga,
      certificado_url: certUrl, observaciones: obs,
      aprobado_por: session.email,
    }).select().single();
    if (error) throw error;
    await auditLog('crear', 'rrhh_licencias', data.id, null, null, `${tipo} ${desde}→${hasta}`);
    toast('Licencia cargada ✓', 'success');
    document.getElementById('emp-modal-save').onclick = saveEmpleado;
    renderTabLicencias();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Guardar';
  }
}

async function saveEmpleado() {
  const d = empModalState.formData;
  // Validaciones mínimas
  if (!d.apellido?.trim()) { toast('Falta el apellido', 'error'); return; }
  if (!d.nombre?.trim())   { toast('Falta el nombre', 'error'); return; }
  if (!d.dni?.trim())      { toast('Falta el DNI', 'error'); return; }
  if (!d.local)            { toast('Falta el local', 'error'); return; }
  if (!/^\d{7,9}$/.test(d.dni.replace(/\./g, '').trim())) { toast('DNI inválido', 'error'); return; }

  const payload = {
    apellido: d.apellido.trim().toUpperCase(),
    nombre:   d.nombre.trim().toUpperCase(),
    dni:      d.dni.replace(/\./g, '').trim(),
    cuil:     d.cuil?.trim() || null,
    fecha_nacimiento: d.fecha_nacimiento || null,
    sexo: d.sexo || null,
    estado_civil: d.estado_civil || null,
    nacionalidad: d.nacionalidad || 'Argentina',
    direccion: d.direccion || null,
    localidad: d.localidad || null,
    provincia: d.provincia || null,
    cp: d.cp || null,
    telefono: d.telefono || null,
    email: d.email || null,
    emergencia_nombre: d.emergencia_nombre || null,
    emergencia_telefono: d.emergencia_telefono || null,
    emergencia_vinculo: d.emergencia_vinculo || null,
    local: d.local,
    categoria_cct_id: d.categoria_cct_id || null,
    tipo_contrato: d.tipo_contrato || 'relacion_dependencia',
    fecha_ingreso: d.fecha_ingreso || null,
    fecha_baja: d.estado === 'baja' ? (d.fecha_baja || new Date().toISOString().split('T')[0]) : null,
    motivo_baja: d.estado === 'baja' ? (d.motivo_baja || null) : null,
    estado: d.estado || 'activo',
    cbu: d.cbu || null,
    banco: d.banco || null,
  };

  const saveBtn = document.getElementById('emp-modal-save');
  saveBtn.disabled = true; saveBtn.textContent = 'Guardando…';

  try {
    if (empModalState.isNew) {
      const { data: created, error } = await sb.from('rrhh_empleados').insert(payload).select().single();
      if (error) throw error;
      await auditLog('crear', 'rrhh_empleados', created.id, null, null, created.nombre_completo);
      // Crear saldo de vacaciones del año
      const año = new Date().getFullYear();
      const antigüedadAños = created.fecha_ingreso ? Math.floor((new Date() - new Date(created.fecha_ingreso)) / (1000*60*60*24*365.25)) : 0;
      const dias = antigüedadAños >= 20 ? 35 : antigüedadAños >= 10 ? 28 : antigüedadAños >= 5 ? 21 : 14;
      await sb.from('rrhh_vacaciones').insert({ empleado_id: created.id, año, dias_correspondientes: dias, dias_tomados: 0 });
      toast('Empleado creado', 'success');
      empModalState.empleadoId = created.id;
      empModalState.isNew = false;
      empModalState.editing = false;
      await openEmpleadoModal(created.id);
    } else {
      // Detectar cambios para audit log
      const old = empModalState.empleadoData;
      const cambios = [];
      Object.keys(payload).forEach(k => {
        const ov = old[k] == null ? '' : String(old[k]);
        const nv = payload[k] == null ? '' : String(payload[k]);
        if (ov !== nv) cambios.push({ campo: k, viejo: ov, nuevo: nv });
      });
      const { error } = await sb.from('rrhh_empleados').update(payload).eq('id', empModalState.empleadoId);
      if (error) throw error;
      // Log cada cambio
      for (const c of cambios) await auditLog('editar', 'rrhh_empleados', empModalState.empleadoId, c.campo, c.viejo, c.nuevo);
      toast(`Guardado (${cambios.length} cambio${cambios.length!==1?'s':''})`, 'success');
      empModalState.editing = false;
      await openEmpleadoModal(empModalState.empleadoId);
    }
    // Refrescar listado abajo
    renderEmpleadosList();
  } catch (e) {
    toast('Error: ' + e.message, 'error');
    saveBtn.disabled = false;
    saveBtn.textContent = empModalState.isNew ? 'Crear empleado' : 'Guardar cambios';
  }
}

// ─── Cerrar modal ───
function closeEmpModal() {
  document.getElementById('emp-modal-backdrop').classList.remove('show');
  empModalState.empleadoId = null;
  empModalState.empleadoData = null;
  empModalState.formData = {};
}

document.getElementById('emp-modal-cancel').addEventListener('click', closeEmpModal);
document.getElementById('emp-modal-save').addEventListener('click', saveEmpleado);

async function renderDocList() {
  const cont = document.getElementById('doc-list-container');
  cont.innerHTML = '<div class="spinner"></div>';
  let q = sb.from('rrhh_documentos')
    .select(`*, empleado:rrhh_empleados!inner(id, nombre_completo, local, estado)`)
    .order('created_at', { ascending: false }).limit(500);
  if (docState.tipo)  q = q.eq('tipo', docState.tipo);
  if (docState.local) q = q.eq('empleado.local', docState.local);

  const { data, error } = await q;
  if (error) { cont.innerHTML = `<div class="card" style="color:var(--danger)">${error.message}</div>`; return; }

  let lista = data || [];
  if (docState.search.trim()) {
    const s = docState.search.toLowerCase().trim();
    lista = lista.filter(d =>
      (d.nombre || '').toLowerCase().includes(s) ||
      (d.empleado?.nombre_completo || '').toLowerCase().includes(s)
    );
  }

  if (lista.length === 0) { cont.innerHTML = '<div class="emp-empty">Sin documentos.</div>'; return; }

  // Alertas: documentos por vencer próximos 30 días
  const hoy = new Date();
  const en30 = new Date(); en30.setDate(en30.getDate() + 30);
  const porVencer = lista.filter(d => d.fecha_vencimiento && new Date(d.fecha_vencimiento) <= en30 && new Date(d.fecha_vencimiento) >= hoy);
  let alertHtml = '';
  if (porVencer.length > 0) {
    alertHtml = `
      <div class="card" style="background:#fef3c7;border-color:#fde68a;margin-bottom:16px;">

      </div>
    `;
  }

  cont.innerHTML = alertHtml + `
    <table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);">
      <thead>
        <tr style="background:#f9fafb;text-align:left;">

          <th style="padding:12px 16px;font-size:12px;color:var(--muted);">Cargado</th>
          <th style="padding:12px 16px;font-size:12px;color:var(--muted);">Vence</th>
          <th style="padding:12px 16px;font-size:12px;color:var(--muted);text-align:right;">Acción</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map(d => `
          <tr style="border-top:1px solid var(--border);">
            <td style="padding:12px 16px;font-size:14px;">${escapeHtml(d.empleado?.nombre_completo||'—')}</td>
            <td style="padding:12px 16px;"><span class="emp-tag">${escapeHtml(d.tipo)}</span></td>
            <td style="padding:12px 16px;font-size:13px;">${escapeHtml(d.nombre)}</td>

            <td style="padding:12px 16px;font-size:12px;color:${d.fecha_vencimiento && new Date(d.fecha_vencimiento) <= en30 ? 'var(--warning)' : 'var(--muted)'};">${d.fecha_vencimiento ? fmtFecha(d.fecha_vencimiento) : '—'}</td>

async function decidirVacacion(movId, accion) {
  const motivo = accion === 'rechazar' ? prompt('Motivo del rechazo:') : null;
  if (accion === 'rechazar' && !motivo) return;
  const nuevoEstado = accion === 'aprobar' ? 'aprobada' : 'rechazada';
  const patch = {
    estado: nuevoEstado,
    aprobado_por: session.email,
    fecha_aprobacion: new Date().toISOString(),
  };
  if (accion === 'rechazar') patch.motivo_rechazo = motivo;
  const { error } = await sb.from('rrhh_vacaciones_movimientos').update(patch).eq('id', movId);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog(accion === 'aprobar' ? 'aprobar_vacaciones' : 'rechazar_vacaciones', 'rrhh_vacaciones_movimientos', movId, 'estado', 'solicitada', nuevoEstado);
  toast(accion === 'aprobar' ? 'Aprobada ✓' : 'Rechazada', 'success');
  renderVacContent();
}

async function renderMiCalendario() {
  if (!miCalState.mes) miCalState.mes = mesActualString();
  const [y, m] = miCalState.mes.split('-').map(Number);
  const fechaDesde = new Date(y, m-1, 1);
  const fechaHasta = new Date(y, m, 0);
  const diasMes = fechaHasta.getDate();
  const hoyStr = new Date().toISOString().split('T')[0];

  // Cargar turnos del empleado del mes
  const { data: turnos } = await sb.from('rrhh_turnos')
    .select('*, template:rrhh_templates_turno(codigo, nombre, color, icono)')
    .eq('empleado_id', session.empleado_id)
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0])
    .order('fecha');

  // Vacaciones aprobadas del mes
  const { data: vacaciones } = await sb.from('rrhh_vacaciones_movimientos')
    .select('fecha_desde, fecha_hasta, estado')
    .eq('empleado_id', session.empleado_id)
    .in('estado', ['aprobada','tomada'])
    .gte('fecha_hasta', fechaDesde.toISOString().split('T')[0])
    .lte('fecha_desde', fechaHasta.toISOString().split('T')[0]);

  // Permisos aprobados del mes
  const { data: permisos } = await sb.from('rrhh_permisos')
    .select('fecha, hora_desde, hora_hasta, estado, motivo')
    .eq('empleado_id', session.empleado_id)
    .eq('estado', 'aprobado')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);

  // Feriados del mes
  const { data: feriados } = await sb.from('rrhh_feriados')
    .select('fecha, nombre, cierra_oficina, cierra_shoppings')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);
  const feriadoMap = {};
  (feriados || []).forEach(f => { feriadoMap[f.fecha] = f; });

  const turnoMap = {};
  (turnos || []).forEach(t => { turnoMap[t.fecha] = t; });

  // Marcar días dentro de vacaciones
  const enVacaciones = new Set();
  (vacaciones || []).forEach(v => {
    let d = new Date(v.fecha_desde + 'T12:00:00');
    const fin = new Date(v.fecha_hasta + 'T12:00:00');
    while (d <= fin) {
      enVacaciones.add(d.toISOString().split('T')[0]);
      d.setDate(d.getDate() + 1);
    }
  });

  const permisoMap = {};
  (permisos || []).forEach(p => { permisoMap[p.fecha] = p; });

  // Stats del mes
  const turnosTrabajados = (turnos || []).filter(t => !t.es_franco && t.tipo === 'planificado').length;
  const francos = (turnos || []).filter(t => t.es_franco).length;
  const diasVacaciones = enVacaciones.size;

  // Calcular total de horas planificadas
  let totalMinutos = 0;
  (turnos || []).forEach(t => {
    if (t.hora_inicio && t.hora_fin) {
      const [h1, m1] = t.hora_inicio.split(':').map(Number);
      const [h2, m2] = t.hora_fin.split(':').map(Number);
      totalMinutos += (h2*60+m2) - (h1*60+m1);
    }
  });
  const totalHoras = Math.floor(totalMinutos/60) + ':' + String(totalMinutos%60).padStart(2,'0');

  // Construir grid: 7 columnas (L M M J V S D) con vista mes completo estilo calendario
  const primerDow = new Date(y, m-1, 1).getDay(); // 0=domingo
  const offset = primerDow === 0 ? 6 : primerDow - 1; // empezar en lunes

  let html = `
    <div class="page-header">
      <h2>Mi calendario</h2>
      <div class="subtitle">${escapeHtml(session.empleadoData?.nombre_completo || '')} · ${LOCALES[session.empleadoData?.local]?.nombre || ''}</div>
    </div>

    <div class="cal-toolbar">
      <div class="month-nav">
        <button onclick="cambiarMiMes(-1)">‹</button>
        <span class="month-label">${new Date(y, m-1, 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })}</span>
        <button onclick="cambiarMiMes(1)">›</button>
      </div>
      <button class="btn" onclick="miCalState.mes = mesActualString(); switchTab('mi-calendario');">Hoy</button>
      <button class="btn accent2" onclick="abrirNuevoPermisoEmpleado()" style="margin-left:auto;">🙋 Pedir permiso</button>
    </div>

    <div class="metrics-grid">
      <div class="metric-card accent"><div class="label">Días a trabajar</div><div class="value">${turnosTrabajados}</div></div>
      <div class="metric-card"><div class="label">Francos</div><div class="value">${francos}</div></div>
      <div class="metric-card"><div class="label">Vacaciones</div><div class="value">${diasVacaciones}</div></div>
      <div class="metric-card"><div class="label">Total horas</div><div class="value" style="font-size:24px;">${totalHoras}</div></div>
    </div>

    <div class="card" style="padding:18px;">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
        ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d => `
          <div style="text-align:center;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:4px 0;">${d}</div>
        `).join('')}
        ${Array.from({length: offset}).map(() => '<div></div>').join('')}
        ${Array.from({length: diasMes}, (_, i) => {
          const d = i + 1;
          const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const date = new Date(y, m-1, d);
          const dow = date.getDay();
          const turno = turnoMap[fecha];
          const esVac = enVacaciones.has(fecha);
          const esFeriado = feriadoMap[fecha];
          const esHoy = fecha === hoyStr;
          const permiso = permisoMap[fecha];
          const local = session.empleadoData?.local;
          const cierraLocal = esFeriado && (
            (local === 'oficina' && esFeriado.cierra_oficina) ||
            ((local === 'unicenter' || local === 'alcorta') && esFeriado.cierra_shoppings)
          );

          let bg = 'white';
          let fg = 'var(--text)';
          let icon = '';
          let label = '';
          let titleAttr = '';

          if (esVac) {
            bg = '#d1faf1'; fg = '#0d9488';
            icon = '🌴';
            label = 'Vacaciones';
          } else if (cierraLocal) {
            bg = '#fee2e2'; fg = '#b91c1c';
            icon = '🔒';
            label = 'Cerrado';
            titleAttr = `title="${esFeriado.nombre}"`;
          } else if (turno?.es_franco) {
            bg = '#f3f4f6'; fg = 'var(--muted)';
            icon = '—';
            label = 'Franco';
          } else if (turno?.tipo === 'licencia') {
            bg = '#fef3c7'; fg = '#92400e';
            icon = '📋';
            label = 'Licencia';
          } else if (turno && turno.hora_inicio) {
            bg = turno.template?.color || '#6366f1';
            fg = 'white';
            icon = turno.template?.icono || '🕐';
            label = `${turno.hora_inicio.substring(0,5)} - ${turno.hora_fin?.substring(0,5)||''}`;
          }

          if (dow === 0 && bg === 'white') bg = '#fefce8'; // domingo claro
          if (esFeriado && bg === 'white') { bg = '#fef2f2'; titleAttr = `title="${esFeriado.nombre}"`; }
          if (esHoy) {
            // Borde resaltado
          }

          return `
            <div style="background:${bg};color:${fg};border:${esHoy ? '2px solid var(--accent2)' : '1px solid var(--border)'};border-radius:10px;padding:10px 8px;min-height:88px;display:flex;flex-direction:column;text-align:center;position:relative;" ${titleAttr}>
              <div style="font-size:12px;font-weight:600;opacity:0.7;text-align:left;">${d}</div>
              ${icon ? `<div style="font-size:22px;margin:4px 0;">${icon}</div>` : ''}
              <div style="font-size:11px;font-weight:600;line-height:1.2;">${label}</div>
              ${permiso ? `<div style="font-size:9px;margin-top:auto;background:#fef3c7;color:#92400e;border-radius:4px;padding:2px;">⏱ Permiso</div>` : ''}
              ${esHoy ? '<div style="position:absolute;top:4px;right:4px;background:var(--accent2);color:white;border-radius:50%;width:8px;height:8px;"></div>' : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>

    ${(permisos || []).length > 0 ? `
      <div class="card" style="margin-top:14px;">
        <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;">⏱ Permisos aprobados este mes</h3>

          ${permisos.map(p => `
            <li>
              <div>
                <strong>${fmtFecha(p.fecha)}</strong> · ${p.hora_desde?.substring(0,5)} a ${p.hora_hasta?.substring(0,5)}

              </div>

            </li>
          `).join('')}
        </ul>

    <div class="card" style="margin-top:14px;background:#eff6ff;border-color:#bfdbfe;">
      <strong style="color:#1e40af;">💡 Tip:</strong> Si necesitás retirarte antes algún día o pedir un permiso puntual, andá a <a href="javascript:switchTab('mis-vacaciones');" style="color:#1e40af;text-decoration:underline;font-weight:600;">Mis vacaciones</a> y solicitalo. La encargada va a recibir el pedido para aprobar.
    </div>
  `;
  return html;
}

function cambiarMiMes(delta) {
  const [y, m] = miCalState.mes.split('-').map(Number);
  let ny = y, nm = m + delta;
  if (nm < 1)  { nm = 12; ny -= 1; }
  if (nm > 12) { nm = 1;  ny += 1; }
  miCalState.mes = `${ny}-${String(nm).padStart(2,'0')}`;
  switchTab('mi-calendario');
}

// Wiring post-render para mis-vacaciones (calculador de días)
function wireVacacionesForm() {
  const dEl = document.getElementById('vac-desde');
  const hEl = document.getElementById('vac-hasta');
  if (!dEl || !hEl) return;
  const calc = () => {
    const d = dEl.value, h = hEl.value;
    const prev = document.getElementById('vac-preview');
    if (!d || !h) { prev.textContent = 'Seleccioná fechas'; return; }
    const dias = Math.round((new Date(h) - new Date(d)) / (1000*60*60*24)) + 1;
    if (dias <= 0) { prev.textContent = 'Las fechas son inválidas'; return; }
    prev.textContent = dias + ' días corridos';
  };
  dEl.addEventListener('change', calc);
  hEl.addEventListener('change', calc);
}

async function solicitarVacaciones() {
  let desde = document.getElementById('vac-desde').value;
  let hasta = document.getElementById('vac-hasta').value;
  const obs   = document.getElementById('vac-obs').value;
  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }

  // Aplicar regla franco asociado (solo locales)
  const ext = await _extenderPorFranco(session.empleado_id, desde, hasta);
  if (ext.extendido) {
    if (!confirm(`Tu período incluye un día de jornada larga (sáb/dom). Para que el finde quede completo, se va a extender automáticamente:\n\n  Original: ${desde} → ${hasta}\n  Ajustado: ${ext.desde} → ${ext.hasta}\n  ${ext.mensaje}\n\n¿Continuar?`)) return;
    desde = ext.desde;
    hasta = ext.hasta;
  }

  const dias = Math.round((new Date(hasta) - new Date(desde)) / (1000*60*60*24)) + 1;
  if (dias <= 0) { toast('Fechas inválidas', 'error'); return; }
  const año = new Date(desde).getFullYear();
  const { data: saldo } = await sb.from('rrhh_vacaciones').select('id, dias_pendientes').eq('empleado_id', session.empleado_id).eq('año', año).maybeSingle();
  if (!saldo) { toast('No hay saldo cargado para ' + año, 'error'); return; }
  if (dias > saldo.dias_pendientes) {
    if (!confirm(`Estás pidiendo ${dias} días pero tenés ${saldo.dias_pendientes} pendientes. ¿Solicitar igual?`)) return;
  }
  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert({
    vacaciones_id: saldo.id, empleado_id: session.empleado_id,
    fecha_desde: desde, fecha_hasta: hasta, dias,
    estado: 'solicitada',
    solicitado_por: session.email,
    observaciones: obs || null,
  }).select().single();
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('solicitar_vacaciones', 'rrhh_vacaciones_movimientos', data.id, null, null, `${desde} → ${hasta} (${dias}d)`);
  toast('Solicitud enviada ✓ Te avisamos cuando la aprueben', 'success');
  switchTab('mis-vacaciones');
}

async function subirMiCertificado() {
  const desde = document.getElementById('cert-desde').value;
  const hasta = document.getElementById('cert-hasta').value;
  const medico = document.getElementById('cert-medico').value.trim() || null;
  const diag = document.getElementById('cert-diag').value.trim() || null;
  const file = document.getElementById('cert-file').files[0];
  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }
  if (!file) { toast('Subí el archivo', 'error'); return; }
  const dias = Math.round((new Date(hasta) - new Date(desde)) / (1000*60*60*24)) + 1;

  try {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${session.empleado_id}/certificado/${Date.now()}_${safeName}`;
    const { error: errUp } = await sb.storage.from('rrhh-certificados').upload(path, file, { contentType: file.type });
    if (errUp) throw errUp;
    const { data, error: errDb } = await sb.from('rrhh_certificados_medicos').insert({
      empleado_id: session.empleado_id,
      fecha_desde: desde, fecha_hasta: hasta, dias,
      medico, diagnostico: diag,
      archivo_url: path, validado: false,
    }).select().single();
    if (errDb) throw errDb;
    await auditLog('crear', 'rrhh_certificados_medicos', data.id, null, null, `${desde}→${hasta}`);
    toast('Certificado subido ✓', 'success');
    switchTab('mis-certif');
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

  if (!sueldosState.periodo) {

  }

function generarPeriodos(actual) {
  // Genera 24 meses hacia atrás desde el seleccionado
  const periodos = new Set([actual]);
  const [y0, m0] = actual.split('-').map(Number);
  for (let i = 0; i < 24; i++) {
    let m = m0 - i; let y = y0;
    while (m <= 0) { m += 12; y -= 1; }
    periodos.add(`${y}-${String(m).padStart(2,'0')}`);
  }
  return [...periodos].sort().reverse();
}

async function renderCalendarioGrid() {
  const cont = document.getElementById('cal-grid-container');
  if (!cont) return;
  const isAdmin = session.rol === 'admin';
  const localFiltro = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = new Date(y, m-1, 1);
  const fechaHasta = new Date(y, m, 0);
  const diasMes = fechaHasta.getDate();
  const hoyStr = new Date().toISOString().split('T')[0];

  // Empleados
  let qEmp = sb.from('rrhh_empleados').select('id, nombre, apellido, nombre_completo, local, foto_url').eq('estado', 'activo').order('local').order('apellido');
  if (localFiltro) qEmp = qEmp.eq('local', localFiltro);
  const { data: empleados } = await qEmp;

  // Turnos del mes
  const { data: turnos } = await sb.from('rrhh_turnos')
    .select('id, empleado_id, fecha, hora_inicio, hora_fin, es_franco, tipo, template:rrhh_templates_turno(codigo, nombre, color, icono)')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);

  // Map (emp_id × fecha) → turno
  const turnoMap = {};
  (turnos || []).forEach(t => { turnoMap[`${t.empleado_id}_${t.fecha}`] = t; });

  // Feriados
  const { data: feriados } = await sb.from('rrhh_feriados')
    .select('fecha, nombre, cierra_oficina, cierra_shoppings')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0]);
  const feriadoMap = {};
  (feriados || []).forEach(f => { feriadoMap[f.fecha] = f; });

  if (!empleados || empleados.length === 0) {
    cont.innerHTML = '<div class="emp-empty">Sin empleados para mostrar.</div>';
    return;
  }

  const dias = Array.from({length: diasMes}, (_, i) => i + 1);
  const gridTemplate = `200px repeat(${diasMes}, minmax(56px, 1fr))`;

  const headerCells = dias.map(d => {
    const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const date = new Date(y, m-1, d);
    const dow = date.getDay();
    const esFeriado = !!feriadoMap[fecha];
    const esHoy = fecha === hoyStr;
    const cls = ['cal-cell-header'];
    if (dow === 0 || dow === 6) cls.push('weekend');
    if (esFeriado) cls.push('feriado');
    if (esHoy) cls.push('today');
    const diaSemana = ['D','L','M','M','J','V','S'][dow];
    return `<div class="${cls.join(' ')}" title="${esFeriado ? feriadoMap[fecha].nombre : ''}">
      ${diaSemana}<br><span style="font-size:14px;color:inherit;">${d}</span>
    </div>`;
  }).join('');

  const rows = empleados.map(e => {
    const cells = dias.map(d => {
      const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const turno = turnoMap[`${e.id}_${fecha}`];
      const date = new Date(y, m-1, d);
      const dow = date.getDay();
      const esFeriado = feriadoMap[fecha];
      const esHoy = fecha === hoyStr;
      const cierra = esFeriado && (
        (e.local === 'oficina' && esFeriado.cierra_oficina) ||
        ((e.local === 'unicenter' || e.local === 'alcorta') && esFeriado.cierra_shoppings)
      );

      const cls = ['cal-cell-day'];
      if (dow === 0 || dow === 6) cls.push('weekend');
      if (esHoy) cls.push('today');
      if (cierra) cls.push('feriado-cerrado');

      let content = '';
      let style = '';
      if (turno) {
        if (turno.tipo === 'vacaciones')  { cls.push('vacaciones'); content = '🌴'; }
        else if (turno.tipo === 'licencia') { cls.push('licencia');   content = '📋'; }
        else if (turno.es_franco)         { cls.push('franco');     content = '—'; }
        else {
          cls.push('has-turno');
          style = `background:${turno.template?.color || '#6366f1'};`;
          const hi = turno.hora_inicio ? turno.hora_inicio.substring(0,5) : '';
          const hf = turno.hora_fin    ? turno.hora_fin.substring(0,5) : '';
          content = `<div class="turno-icon">${turno.template?.icono || '🕐'}</div><div class="turno-time">${hi}</div>`;
        }
      } else if (cierra) {
        content = '🔒';
      }
      return `<div class="${cls.join(' ')}" style="${style}" data-emp="${e.id}" data-fecha="${fecha}" data-local="${e.local}">${content}</div>`;
    }).join('');

    return `
      <div class="cal-cell-emp">
        <div class="avatar">${e.foto_url ? `<img src="${escapeHtml(e.foto_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : escapeHtml(initials(e.apellido, e.nombre))}</div>
        <div class="info">
          <div class="name">${escapeHtml(e.apellido)}</div>
          <div class="role">${LOCALES[e.local]?.nombre || e.local}</div>
        </div>
      </div>
      ${cells}
    `;
  }).join('');

  cont.innerHTML = `
    <div class="cal-container">
      <div class="cal-grid" style="grid-template-columns: ${gridTemplate};">
        <div class="cal-cell-emp" style="background:#f9fafb;font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;">
          Empleado
        </div>
        ${headerCells}
        ${rows}
      </div>
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);">
      💡 Tocá una celda para asignar turno. Las celdas con color son turnos planificados, 🌴 vacaciones, 📋 licencia, — franco, 🔒 local cerrado por feriado.
    </div>
  `;

  // Wire clicks
  cont.querySelectorAll('.cal-cell-day').forEach(cell => {
    cell.addEventListener('click', (e) => abrirPopoverTurno(e.currentTarget));
  });
}

function cambiarMes(delta) {
  const [y, m] = asisState.mes.split('-').map(Number);
  let ny = y, nm = m + delta;
  if (nm < 1)  { nm = 12; ny -= 1; }
  if (nm > 12) { nm = 1;  ny += 1; }
  asisState.mes = `${ny}-${String(nm).padStart(2,'0')}`;
  document.getElementById('main').innerHTML = '<div class="spinner"></div>';
  renderAsistenciasAdmin().then(h => document.getElementById('main').innerHTML = h);
}

function cambiarLocal(local) {
  asisState.local = local;
  renderCalendarioGrid();
}

// ─── Popover de asignación de turno ───
let popoverState = { emp: null, fecha: null, local: null };

async function abrirPopoverTurno(cellEl) {
  if (session.rol === 'empleado') return; // sin permisos
  const emp_id = parseInt(cellEl.dataset.emp, 10);
  const fecha  = cellEl.dataset.fecha;
  const local  = cellEl.dataset.local;
  popoverState = { emp: emp_id, fecha, local };

  // Cerrar popover previo
  document.querySelectorAll('.tpl-popover').forEach(p => p.remove());

  // Cargar templates del local
  const { data: templates } = await sb.from('rrhh_templates_turno')
    .select('*').eq('local', local).eq('activo', true).order('orden');

  // Datos del empleado
  const { data: emp } = await sb.from('rrhh_empleados').select('nombre_completo').eq('id', emp_id).single();

  const pop = document.createElement('div');
  pop.className = 'tpl-popover show';

  // Posicionar relativo a la celda
  const rect = cellEl.getBoundingClientRect();
  pop.style.left = Math.min(window.innerWidth - 280, rect.left) + 'px';
  pop.style.top  = Math.min(window.innerHeight - 400, rect.bottom + 4) + 'px';

  pop.innerHTML = `
    <div class="tpl-popover-header">
      <div class="title">${escapeHtml(emp?.nombre_completo || '')}</div>
      <div class="meta">${new Date(fecha + 'T12:00:00').toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
    </div>
    ${(templates || []).map(t => `
      <div class="tpl-option" data-tpl="${t.id}" data-codigo="${t.codigo}">
        <div class="swatch" style="background:${t.color || '#6366f1'};"></div>
        <span style="font-size:14px;">${t.icono || ''}</span>
        <div class="label">${escapeHtml(t.nombre)}</div>
      </div>
    `).join('')}
    <hr>
    <div class="tpl-option" data-custom="1">
      <span style="font-size:14px;">✏️</span>
      <div class="label">Horario personalizado…</div>
    </div>
    <hr>
    <div class="tpl-option danger" data-clear="1">
      <span style="font-size:14px;">🗑️</span>
      <div class="label">Quitar turno</div>
    </div>
  `;
  document.body.appendChild(pop);

  pop.querySelectorAll('.tpl-option').forEach(opt => {
    opt.addEventListener('click', async () => {
      if (opt.dataset.clear) await quitarTurno(emp_id, fecha);
      else if (opt.dataset.custom) await asignarTurnoCustom(emp_id, fecha);
      else await asignarTurno(emp_id, fecha, parseInt(opt.dataset.tpl, 10));
      pop.remove();
      await renderCalendarioGrid();
    });
  });

  // Cerrar al clickear afuera
  setTimeout(() => {
    document.addEventListener('click', function cerrar(e) {
      if (!pop.contains(e.target)) {
        pop.remove();
        document.removeEventListener('click', cerrar);
      }
    }, { once: false });
  }, 100);
}

async function asignarTurno(emp_id, fecha, template_id) {
  const { data: tpl } = await sb.from('rrhh_templates_turno').select('*').eq('id', template_id).single();
  if (!tpl) { toast('Template no encontrado', 'error'); return; }
  const payload = {
    empleado_id: emp_id, fecha,
    template_id: template_id,
    hora_inicio: tpl.hora_inicio, hora_fin: tpl.hora_fin,
    es_franco: tpl.es_franco,
    tipo: tpl.es_franco ? 'franco' : 'planificado',
    planificado_por: session.email,
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('rrhh_turnos').upsert(payload, { onConflict: 'empleado_id,fecha' });
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Turno asignado ✓', 'success');
}

async function asignarTurnoCustom(emp_id, fecha) {
  const hi = prompt('Hora de inicio (HH:MM)', '10:00');
  if (!hi) return;
  const hf = prompt('Hora de fin (HH:MM)', '18:00');
  if (!hf) return;
  if (!/^\d{1,2}:\d{2}$/.test(hi) || !/^\d{1,2}:\d{2}$/.test(hf)) {
    toast('Formato HH:MM inválido', 'error'); return;
  }
  const { error } = await sb.from('rrhh_turnos').upsert({
    empleado_id: emp_id, fecha,
    hora_inicio: hi, hora_fin: hf,
    es_franco: false, tipo: 'planificado',
    planificado_por: session.email,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'empleado_id,fecha' });
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Turno asignado ✓', 'success');
}

async function quitarTurno(emp_id, fecha) {
  const { error } = await sb.from('rrhh_turnos').delete().eq('empleado_id', emp_id).eq('fecha', fecha);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Turno borrado', 'success');
}

async function generarMesDesdeDefault() {
  if (!confirm('Esto va a generar los turnos del mes según el horario default de cada empleado.\n\n¿Sobrescribe los turnos ya cargados? NO — solo agrega días vacíos. Lo ya cargado queda intacto.\n\n¿Continuar?')) return;

  const isAdmin = session.rol === 'admin';
  const local = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = new Date(y, m-1, 1);
  const fechaHasta = new Date(y, m, 0);
  const diasMes = fechaHasta.getDate();

  toast('Generando mes…');

  // Empleados filtrados por local
  let qEmp = sb.from('rrhh_empleados').select('id, local').eq('estado', 'activo');
  if (local) qEmp = qEmp.eq('local', local);
  const { data: empleados } = await qEmp;

  // Defaults
  const { data: defaults } = await sb.from('rrhh_turnos_default')
    .select('*, template:rrhh_templates_turno(*)')
    .in('empleado_id', (empleados||[]).map(e => e.id));
  // Map (emp_id × dia_semana) → default
  const defMap = {};
  (defaults || []).forEach(d => { defMap[`${d.empleado_id}_${d.dia_semana}`] = d; });

  // Turnos ya cargados (para no pisar)
  const { data: ya } = await sb.from('rrhh_turnos')
    .select('empleado_id, fecha')
    .gte('fecha', fechaDesde.toISOString().split('T')[0])
    .lte('fecha', fechaHasta.toISOString().split('T')[0])
    .in('empleado_id', (empleados||[]).map(e => e.id));
  const yaSet = new Set((ya || []).map(t => `${t.empleado_id}_${t.fecha}`));

  // Generar
  const inserts = [];
  for (const e of (empleados || [])) {
    for (let d = 1; d <= diasMes; d++) {
      const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (yaSet.has(`${e.id}_${fecha}`)) continue;
      const dow = new Date(y, m-1, d).getDay();
      const def = defMap[`${e.id}_${dow}`];
      if (!def) continue;
      inserts.push({
        empleado_id: e.id, fecha,
        template_id: def.template_id,
        hora_inicio: def.hora_inicio || def.template?.hora_inicio,
        hora_fin:    def.hora_fin    || def.template?.hora_fin,
        es_franco: def.es_franco,
        tipo: def.es_franco ? 'franco' : 'planificado',
        planificado_por: session.email,
      });
    }
  }
  if (inserts.length === 0) { toast('Nada que generar (todos los días ya estaban cargados)', ''); return; }

  // Insert en batches de 100
  for (let i = 0; i < inserts.length; i += 100) {
    const batch = inserts.slice(i, i+100);
    const { error } = await sb.from('rrhh_turnos').insert(batch);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
  }
  toast(`✓ ${inserts.length} turnos generados`, 'success');
  await renderCalendarioGrid();
}

async function limpiarMes() {
