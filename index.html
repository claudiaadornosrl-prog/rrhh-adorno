async function renderResumenContent() {
  const cont = document.getElementById('resumen-content');
  if (!cont) return;
  cont.innerHTML = '<div class="spinner"></div>';

  const isAdmin = session.rol === 'admin';
  const localFiltro = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];

  // Empleados + detalle del mes
  let qEmp = sb.from('rrhh_empleados').select('id, nombre_completo, local, ficha').eq('estado', 'activo');
  if (localFiltro) qEmp = qEmp.eq('local', localFiltro);
  const { data: empleadosRaw } = await qEmp;
  const empleados = (empleadosRaw || []).filter(e => e.ficha !== false);

  const { data: detalle } = await sb.from('rrhh_asistencias_detalle')
    .select('*').gte('fecha', fechaDesde).lte('fecha', fechaHasta);

  // Agrupar por empleado + contar errores de fichada
  const porEmp = {};
  (detalle || []).forEach(d => {
    if (!porEmp[d.empleado_id]) porEmp[d.empleado_id] = {
      puntual: 0, tarde: 0, ausente: 0, franco: 0, vacaciones: 0,
      licencia: 0, feriado: 0, falta_fichada: 0,
      min_tarde: 0, min_temp: 0, min_extra: 0, min_banco: 0,
      errores: 0,
    };
    const r = porEmp[d.empleado_id];
    r[d.estado] = (r[d.estado] || 0) + 1;
    r.min_tarde += d.minutos_tarde || 0;
    r.min_temp  += d.minutos_salida_temp || 0;
    r.min_extra += d.minutos_extra || 0;
    r.min_banco += d.minutos_banco || 0;
    // Puntos de error contra el premio (0, 1, o 2):
    //  - falta_fichada (sin entrada Y sin salida) = 2 puntos
    //  - falta_fichada (solo una) = 1 punto
    //  - ausente con turno planificado = 2 puntos (sin entrada ni salida)
    //  - tarde (minTarde > 5 min después del buffer = 10:06+) = 1 punto
    //  - Si está salvado → 0 puntos
    let pts = 0;
    if (d.estado === 'falta_fichada') {
      pts = (!d.entrada && !d.salida) ? 2 : 1;
    } else if (d.estado === 'ausente' && d.turno_id) {
      pts = 2;
    } else if (d.estado === 'tarde') {
      pts = 1;
    }
    if (pts > 0 && !d.error_salvado) r.errores += pts;
    if (pts > 0 && d.error_salvado)  r.errores_salvados = (r.errores_salvados || 0) + pts;
  });

  // Cargar config de tolerancias por local (para max_errores_premio)
  const { data: tols } = await sb.from('rrhh_config_tolerancias').select('local, max_errores_premio');
  const maxErrPorLocal = {};
  (tols || []).forEach(t => { maxErrPorLocal[t.local] = t.max_errores_premio || 4; });

  const lista = (empleados || []).sort((a,b) => (a.nombre_completo||'').localeCompare(b.nombre_completo||''));

  if (lista.length === 0 || Object.keys(porEmp).length === 0) {
    cont.innerHTML = `
      <div class="card">
        <div class="placeholder">
          <div class="icon">📊</div>
          <h3>Sin datos procesados para ${asisState.mes}</h3>
          <p>Tocá <strong>"⚙️ Procesar mes"</strong> arriba para cruzar fichadas y turnos.</p>
        </div>
      </div>`;
    return;
  }

  // Totales
  const tot = { puntual:0, tarde:0, ausente:0, min_tarde:0, min_extra:0, min_banco:0 };
  Object.values(porEmp).forEach(r => {
    tot.puntual += r.puntual; tot.tarde += r.tarde; tot.ausente += r.ausente;
    tot.min_tarde += r.min_tarde; tot.min_extra += r.min_extra; tot.min_banco += r.min_banco;
  });

  const fmtMin = (m) => {
    if (m == null) return '—';
    const sign = m < 0 ? '-' : '';
    const abs = Math.abs(m);
    return `${sign}${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
  };

  cont.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card accent"><div class="label">Empleados procesados</div><div class="value">${Object.keys(porEmp).length}</div></div>
      <div class="metric-card"><div class="label">Días puntuales</div><div class="value">${tot.puntual}</div></div>
      <div class="metric-card warn"><div class="label">Llegadas tarde</div><div class="value">${tot.tarde}</div><div class="hint">${fmtMin(tot.min_tarde)} acumulado</div></div>
      <div class="metric-card" style="border-left:4px solid var(--danger);"><div class="label">Ausencias</div><div class="value">${tot.ausente}</div></div>
      <div class="metric-card" style="border-left:4px solid #6366f1;"><div class="label">🎖 Pierden premio</div><div class="value">${(() => {
        return Object.entries(porEmp).filter(([eid, r]) => {
          const emp = lista.find(e => e.id == eid);
          if (!emp) return false;
          const max = maxErrPorLocal[emp.local] || 4;
          return (r.errores || 0) > max;
        }).length;
      })()}</div><div class="hint">empleados con +límite errores</div></div>
    </div>

    <table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-top:16px;">
      <thead>
        <tr style="background:#f9fafb;text-align:left;">
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);">Empleado</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);">Local</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">✓ Punt.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">⚠ Tarde</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">✗ Aus.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">🌴 Vac.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">📋 Lic.</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Min tarde</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Min extra</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:right;">Δ banco</th>
          <th style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">🎖 Premio</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map(e => {
          const r = porEmp[e.id] || {};
          return `
            <tr class="emp-row" data-emp="${e.id}" style="border-top:1px solid var(--border);cursor:pointer;" onclick="toggleDetalleResumen(${e.id})">
              <td style="padding:8px 12px;font-size:13px;"><span class="caret" id="caret-${e.id}" style="display:inline-block;width:14px;color:var(--muted);font-size:10px;">▶</span> ${escapeHtml(e.nombre_completo)}</td>
              <td style="padding:8px 12px;"><span class="emp-tag local-${e.local}">${LOCALES[e.local]?.nombre||''}</span></td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;">${r.puntual||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:${(r.tarde||0)>0?'var(--warning)':'var(--muted)'};">${r.tarde||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:${(r.ausente||0)>0?'var(--danger)':'var(--muted)'};">${r.ausente||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:var(--muted);">${r.vacaciones||0}</td>
              <td style="padding:8px 12px;text-align:center;font-size:13px;color:var(--muted);">${r.licencia||0}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;color:${(r.min_tarde||0)>0?'var(--warning)':'var(--muted)'};">${fmtMin(r.min_tarde||0)}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;">${fmtMin(r.min_extra||0)}</td>
              <td style="padding:8px 12px;text-align:right;font-size:13px;font-weight:600;color:${(r.min_banco||0)>=0?'var(--success)':'var(--danger)'};">${fmtMin(r.min_banco||0)}</td>
              <td style="padding:8px 12px;text-align:center;font-size:12px;">${(() => {
                const max = maxErrPorLocal[e.local] || 4;
                const err = r.errores || 0;
                let bg, color, label;
                if (err > max) { bg = '#fee2e2'; color = '#b91c1c'; label = `✗ Perdió (${err}/${max})`; }
                else if (err === max) { bg = '#fef3c7'; color = '#92400e'; label = `⚠ ${err}/${max}`; }
                else { bg = '#d1faf1'; color = '#0d9488'; label = `✓ ${err}/${max}`; }
                return `<span style="background:${bg};color:${color};padding:3px 9px;border-radius:99px;font-weight:600;white-space:nowrap;">${label}</span>`;
              })()}</td>
            </tr>
            <tr id="detalle-${e.id}" style="display:none;background:#fafafa;">
              <td colspan="11" style="padding:0;">
                <div id="detalle-cont-${e.id}" style="padding:16px 20px;">
                  <div class="spinner"></div>
                </div>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>

    <div class="hint" style="margin-top:10px;font-size:12px;color:var(--muted);text-align:right;">
      <strong>Δ banco</strong> = minutos extras − minutos tarde sobre tolerancia − minutos faltantes por ausencias. Verde = a favor, rojo = deuda.
    </div>
  `;
}

// ════════════════════════════════════════════════════════════
// FASE H — Cruce fichadas vs turnos
// ════════════════════════════════════════════════════════════
async function procesarMesUI() {
  const isAdmin = session.rol === 'admin';
  const localFiltro = isAdmin ? asisState.local : session.local_gerencia;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];

  if (!confirm(`¿Procesar ${asisState.mes}${localFiltro ? ' ('+LOCALES[localFiltro]?.nombre+')' : ''}?\n\nEsto va a cruzar fichadas vs turnos planificados y generar el detalle día×día + movimientos del banco de minutos. Si ya estaba procesado, se sobrescribe.`)) return;

  const btn = document.getElementById('btn-procesar-mes');
  btn.disabled = true; btn.textContent = '⏳ Procesando…';

  try {
    const stats = await procesarMes(asisState.mes, localFiltro);
    toast(`✓ Procesado: ${stats.dias_total} días, ${stats.tardanzas} tardanzas, ${stats.ausencias} ausencias`, 'success');
    renderResumenContent();
  } catch (e) {
    console.error(e);
    toast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '⚙️ Procesar mes';
  }
}

async function procesarMes(periodo, local = null) {
  const [y, m] = periodo.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];
  const diasMes = new Date(y, m, 0).getDate();

  // 1) Empleados activos del local
  let qEmp = sb.from('rrhh_empleados').select('id, local, fecha_ingreso').eq('estado', 'activo').eq('ficha', true);
  if (local) qEmp = qEmp.eq('local', local);
  const { data: empleados } = await qEmp;
  if (!empleados || empleados.length === 0) throw new Error('Sin empleados para procesar');

  const empIds = empleados.map(e => e.id);
  const empByLocal = {};
  empleados.forEach(e => { empByLocal[e.id] = e.local; });

  // 2) Turnos planificados
  const { data: turnos } = await sb.from('rrhh_turnos')
    .select('*').in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta);
  const turnoMap = {};
  (turnos || []).forEach(t => { turnoMap[`${t.empleado_id}_${t.fecha}`] = t; });

  // 3) Fichadas raw
  const { data: fichadas } = await sb.from('rrhh_fichadas_raw')
    .select('empleado_id, fecha, hora, checktype, fecha_hora')
    .in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta)
    .order('fecha_hora', { ascending: true });
  // Agrupar por (emp, fecha)
  const fichMap = {};
  (fichadas || []).forEach(f => {
    const k = `${f.empleado_id}_${f.fecha}`;
    if (!fichMap[k]) fichMap[k] = [];
    fichMap[k].push(f.hora);
  });

  // 4) Vacaciones aprobadas/tomadas
  const { data: vacs } = await sb.from('rrhh_vacaciones_movimientos')
    .select('empleado_id, fecha_desde, fecha_hasta')
    .in('empleado_id', empIds)
    .in('estado', ['aprobada','tomada']);
  const vacSet = new Set();
  (vacs || []).forEach(v => {
    let d = new Date(v.fecha_desde + 'T12:00:00');
    const f = new Date(v.fecha_hasta + 'T12:00:00');
    while (d <= f) {
      vacSet.add(`${v.empleado_id}_${d.toISOString().split('T')[0]}`);
      d.setDate(d.getDate() + 1);
    }
  });

  // 5) Licencias y certificados médicos
  const licSet = new Set();
  const { data: lics } = await sb.from('rrhh_licencias')
    .select('empleado_id, fecha_desde, fecha_hasta').in('empleado_id', empIds);
  (lics || []).forEach(l => {
    let d = new Date(l.fecha_desde + 'T12:00:00');
    const f = new Date(l.fecha_hasta + 'T12:00:00');
    while (d <= f) {
      licSet.add(`${l.empleado_id}_${d.toISOString().split('T')[0]}`);
      d.setDate(d.getDate() + 1);
    }
  });
  const { data: certs } = await sb.from('rrhh_certificados_medicos')
    .select('empleado_id, fecha_desde, fecha_hasta').in('empleado_id', empIds);
  (certs || []).forEach(c => {
    let d = new Date(c.fecha_desde + 'T12:00:00');
    const f = new Date(c.fecha_hasta + 'T12:00:00');
    while (d <= f) {
      licSet.add(`${c.empleado_id}_${d.toISOString().split('T')[0]}`);
      d.setDate(d.getDate() + 1);
    }
  });

  // 6) Feriados
  const { data: feriados } = await sb.from('rrhh_feriados')
    .select('fecha, cierra_oficina, cierra_shoppings')
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta);
  const feriadoMap = {};
  (feriados || []).forEach(f => { feriadoMap[f.fecha] = f; });

  // 7) Permisos aprobados (Fase E - puntuales). Backwards-compatible con la tabla vieja rrhh_permisos también.
  const { data: permisosPuntuales } = await sb.from('rrhh_permisos_puntuales')
    .select('empleado_id, fecha, tipo, hora_desde, hora_hasta, descontar_banco, minutos_descontar')
    .in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta)
    .eq('estado','aprobado');
  const permisosMap = {};
  const permisosPuntMap = {};
  (permisosPuntuales || []).forEach(p => {
    permisosPuntMap[`${p.empleado_id}_${p.fecha}`] = p;
    // Si descuenta del banco, mantener el mapa antiguo para compatibilidad
    if (p.descontar_banco) {
      permisosMap[`${p.empleado_id}_${p.fecha}`] = p.minutos_descontar || 0;
    }
  });
  // También leer permisos viejos (rrhh_permisos) si existen
  try {
    const { data: permisosLegacy } = await sb.from('rrhh_permisos')
      .select('empleado_id, fecha, minutos, estado')
      .in('empleado_id', empIds)
      .eq('estado','aprobado');
    (permisosLegacy || []).forEach(p => {
      const k = `${p.empleado_id}_${p.fecha}`;
      if (!permisosMap[k]) permisosMap[k] = p.minutos || 0;
    });
  } catch(_) {}

  // 8) Horas extras autorizadas
  const { data: extras } = await sb.from('rrhh_horas_extras')
    .select('empleado_id, fecha, minutos').in('empleado_id', empIds);
  const extrasMap = {};
  (extras || []).forEach(x => { extrasMap[`${x.empleado_id}_${x.fecha}`] = x.minutos || 0; });

  // 9) Tolerancias por local
  const { data: tolDb } = await sb.from('rrhh_config_tolerancias').select('*');
  const tols = {};
  (tolDb || []).forEach(t => { tols[t.local] = t; });

  // 10) Procesar día a día
  const detalleRows = [];
  const bancoMovs = [];
  const stats = { dias_total: 0, puntuales: 0, tardanzas: 0, ausencias: 0, extras: 0 };
  // Acumulador mensual de tardanzas por empleado (para aplicar umbral al final)
  const tardanzaAcum = {}; // empleado_id -> minutos tarde acumulados

  // Preservar salvados previos antes de borrar el detalle (idempotencia)
  // Los re-aplicamos al final para que los salvados sobrevivan al re-procesamiento
  const { data: salvadosPrevios } = await sb.from('rrhh_asistencias_detalle')
    .select('empleado_id, fecha, salvado_por, salvado_motivo, salvado_at')
    .in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta)
    .eq('error_salvado', true);
  const salvadosMap = {};
  (salvadosPrevios || []).forEach(s => {
    salvadosMap[`${s.empleado_id}_${s.fecha}`] = s;
  });
  const horaToMin = (h) => {
    if (!h) return null;
    const [hh, mm] = h.split(':').map(Number);
    return hh*60 + mm;
  };

  for (const emp of empleados) {
    const tol = tols[emp.local] || { minutos_tarde: 20, minutos_temprano: 5, buffer_entrada: 15 };
    for (let d = 1; d <= diasMes; d++) {
      const fecha = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const k = `${emp.id}_${fecha}`;
      stats.dias_total++;

      // Skip si fecha previa al ingreso
      if (emp.fecha_ingreso && fecha < emp.fecha_ingreso) continue;

      const turno = turnoMap[k];
      const fichs = (fichMap[k] || []).sort();
      const hayFichada = fichs.length > 0;
      const esVac = vacSet.has(k);
      const esLic = licSet.has(k);
      const feriado = feriadoMap[fecha];
      const cierraLocal = feriado && (
        (emp.local === 'oficina' && feriado.cierra_oficina) ||
        ((emp.local === 'unicenter' || emp.local === 'alcorta') && feriado.cierra_shoppings)
      );

      let estado = 'sin_definir';
      let minTarde = 0, minTemp = 0, minExtra = 0, minBanco = 0;
      let entrada = null, salida = null;
      const permPunt = permisosPuntMap[k]; // permiso puntual aprobado del día

      // Prioridad: vacaciones > licencia > feriado > permiso día completo > sin turno > sin fichada > análisis
      if (esVac) estado = 'vacaciones';
      else if (esLic) estado = 'licencia';
      else if (cierraLocal) estado = 'feriado';
      else if (permPunt && permPunt.tipo === 'dia_completo') {
        // Día completo justificado por permiso aprobado
        estado = 'licencia';  // se trata como licencia para que no descuente
        if (permPunt.descontar_banco) minBanco = -(permPunt.minutos_descontar || 0);
      }
      else if (!turno) {
        // Sin turno planificado — si fichó, registramos puntual; si no, ignoramos
        if (hayFichada) {
          estado = 'puntual';  // trabajó sin turno asignado
          entrada = fichs[0]; salida = fichs[fichs.length-1];
        } else continue;  // sin turno ni fichada, no se registra
      } else if (turno.es_franco) {
        if (hayFichada) {
          estado = 'puntual';  // vino en franco — cuenta como extra
          entrada = fichs[0]; salida = fichs[fichs.length-1];
        } else estado = 'franco';
      } else {
        // Turno normal planificado
        const ti = horaToMin(turno.hora_inicio);
        const tf = horaToMin(turno.hora_fin);
        if (!hayFichada) {
          estado = 'ausente';
          // -minutos del turno completo al banco (salvo que esté salvado)
          if (ti != null && tf != null && !salvadosMap[k]) minBanco = -(tf - ti);
        } else if (fichs.length === 1) {
          estado = 'falta_fichada';
          entrada = fichs[0];
        } else {
          entrada = fichs[0];
          salida = fichs[fichs.length-1];
          const ei = horaToMin(entrada);
          const es = horaToMin(salida);
          // Tarde = entró después del horario - buffer
          const entradaReal = ti + (tol.buffer_entrada || 15);   // horario real del turno
          minTarde = Math.max(0, ei - entradaReal);
          // Salida temprana = se fue antes del fin
          minTemp = Math.max(0, tf - es);
          // Extra = se quedó después
          minExtra = Math.max(0, es - tf);

          // Permisos puntuales aprobados — anular penalización si aplica
          if (permPunt) {
            if (permPunt.tipo === 'llegar_tarde') {
              // El permiso justifica la llegada tarde — no contar minTarde
              minTarde = 0;
            } else if (permPunt.tipo === 'retirarse_antes') {
              // Justifica la salida temprana — no contar minTemp
              minTemp = 0;
            } else if (permPunt.tipo === 'salir_volver') {
              // No tenemos forma fácil de detectar el "hueco" en el medio
              // Se asume que el permiso ya justifica el tiempo perdido
              // (el descuento al banco se aplica abajo si descontar_banco=true)
            }
          }

          // Clasificar
          // Tolerancia diaria: 5 min después del buffer (= 10:05 si turno+buffer = 10:00)
          // Si pasa de eso → 'tarde' Y cuenta como error contra el premio
          const tolDiariaTarde = tol.minutos_tarde || 5;
          if (minTarde > tolDiariaTarde || minTemp > (tol.minutos_temprano || 5)) {
            estado = 'tarde';
          } else if (minExtra > 5) {
            estado = 'puntual';   // siguió siendo puntual pero hizo extra
          } else {
            estado = 'puntual';
          }

          // Banco — las tardanzas se acumulan, NO se descuentan día a día.
          //         Al final del mes, si superan el umbral, descuento el excedente.
          //         Las salidas tempranas SI se descuentan día a día (siguen siendo error puntual).
          if (minTemp > (tol.minutos_temprano || 5)) {
            minBanco -= (minTemp - (tol.minutos_temprano || 5));
          }
          if (extrasMap[k]) {
            // Extras autorizadas suman al banco
            minBanco += extrasMap[k];
          }
        }
      }

      // Stats
      if (estado === 'puntual') stats.puntuales++;
      if (estado === 'tarde') stats.tardanzas++;
      if (estado === 'ausente') stats.ausencias++;
      // Acumular tardanzas para la suma mensual:
      // - Cuentan TODOS los minutos desde el horario real (después del buffer)
      // - Ej: turno 9:45, buffer 15min → real 10:00. Ficha 10:06 → +6 min a la suma.
      // - El umbral diario (5 min) determina si cuenta como error de premio, NO si entra a la suma.
      // - Excluye días salvados.
      const eraSalvado = !!salvadosMap[k];
      if (minTarde > 0 && !eraSalvado) {
        tardanzaAcum[emp.id] = (tardanzaAcum[emp.id] || 0) + minTarde;
      }

      // Permisos (restan del banco si están aprobados)
      if (permisosMap[k]) minBanco -= permisosMap[k];

      detalleRows.push({
        empleado_id: emp.id,
        fecha,
        entrada,
        salida,
        estado,
        minutos_tarde: minTarde,
        minutos_salida_temp: minTemp,
        minutos_extra: minExtra,
        minutos_banco: minBanco,
        turno_id: turno?.id || null,
        procesado_at: new Date().toISOString(),
      });

      // Movimiento en banco si != 0
      if (minBanco !== 0) {
        let tipo = 'ajuste';
        if (estado === 'ausente') tipo = 'falta';
        else if (estado === 'tarde') tipo = 'tarde';
        else if (extrasMap[k]) tipo = 'hora_extra';
        else if (permisosMap[k]) tipo = 'permiso_compensado';
        bancoMovs.push({
          empleado_id: emp.id, fecha, minutos: minBanco, tipo,
          referencia_tipo: 'asistencia', creado_por: 'sistema-cruce',
        });
      }
    }
  }

  // 10.5) Movimiento mensual de tardanzas
  //       Si total acumulado > umbral (60min) → descuenta TODO el acumulado
  //       Si total ≤ umbral → no descuenta nada
  //       (los días salvados ya están excluidos del acumulado)
  const fechaMesUltimo = fechaHasta;
  for (const emp of empleados) {
    const tol = tols[emp.local] || { umbral_mensual_tardanzas: 60 };
    const umbral = tol.umbral_mensual_tardanzas || 60;
    const acum = tardanzaAcum[emp.id] || 0;
    if (acum > umbral) {
      const descuento = -acum;   // ← descuenta el total completo
      bancoMovs.push({
        empleado_id: emp.id,
        fecha: fechaMesUltimo,
        minutos: descuento,
        tipo: 'tarde',
        referencia_tipo: 'tarde_mensual',
        observaciones: `Tardanzas del mes: ${acum} min (supera umbral ${umbral}). Descuento total: ${Math.abs(descuento)} min.`,
        creado_por: 'sistema-cruce',
      });
    }
  }

  // 11) Borrar detalle previo del mes (para no duplicar) y reinsertar
  await sb.from('rrhh_asistencias_detalle').delete()
    .in('empleado_id', empIds).gte('fecha', fechaDesde).lte('fecha', fechaHasta);
  // Borrar movs del banco generados por sistema en este período
  await sb.from('rrhh_banco_minutos').delete()
    .in('empleado_id', empIds)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta)
    .eq('creado_por', 'sistema-cruce');

  // Insertar en batches
  const BATCH = 200;
  for (let i = 0; i < detalleRows.length; i += BATCH) {
    const batch = detalleRows.slice(i, i+BATCH);
    const { error } = await sb.from('rrhh_asistencias_detalle').insert(batch);
    if (error) throw error;
  }
  for (let i = 0; i < bancoMovs.length; i += BATCH) {
    const batch = bancoMovs.slice(i, i+BATCH);
    const { error } = await sb.from('rrhh_banco_minutos').insert(batch);
    if (error) throw error;
  }

  // Re-aplicar salvados previos (preservar la decisión de la encargada)
  let restaurados = 0;
  for (const key in salvadosMap) {
    const s = salvadosMap[key];
    const { error: e1 } = await sb.from('rrhh_asistencias_detalle')
      .update({
        error_salvado: true,
        salvado_por: s.salvado_por,
        salvado_motivo: s.salvado_motivo,
        salvado_at: s.salvado_at,
      })
      .eq('empleado_id', s.empleado_id)
      .eq('fecha', s.fecha);
    if (!e1) restaurados++;
  }
  if (restaurados > 0) {
    console.log(`✓ ${restaurados} salvados previos restaurados`);
  }

  // Audit log
  await auditLog('procesar_mes', 'rrhh_asistencias_detalle', null, periodo, null,
    `${detalleRows.length} días, ${bancoMovs.length} movimientos`);

  return stats;
}

async function toggleDetalleResumen(empId) {
  const row = document.getElementById(`detalle-${empId}`);
  const caret = document.getElementById(`caret-${empId}`);
  if (!row) return;
  if (row.style.display === 'none' || row.style.display === '') {
    row.style.display = 'table-row';
    if (caret) caret.textContent = '▼';
    await renderDetalleEmpDia(empId);
  } else {
    row.style.display = 'none';
    if (caret) caret.textContent = '▶';
  }
}

async function salvarError(detalleId, empId) {
  if (!['admin','gerente'].includes(session.rol)) {
    toast('Solo encargada/admin pueden salvar errores', 'error');
    return;
  }
  const motivo = prompt('Motivo del salvado (ej. equipo de fichadas no funcionaba):');
  if (!motivo || !motivo.trim()) return;

  const { error } = await sb.from('rrhh_asistencias_detalle').update({
    error_salvado: true,
    salvado_por: session.email,
    salvado_motivo: motivo.trim(),
    salvado_at: new Date().toISOString(),
  }).eq('id', detalleId);

  if (error) { toast('Error: ' + error.message, 'error'); return; }

  await auditLog('salvar_error', 'rrhh_asistencias_detalle', detalleId, 'error_salvado', 'false', 'true');
  toast('Error salvado ✓', 'success');
  // Re-render del detalle y del resumen
  await renderDetalleEmpDia(empId);
  await renderResumenContent();
}

async function quitarSalvado(detalleId, empId) {
  if (!confirm('¿Quitar el salvado? El día va a volver a contar como error.')) return;
  const { error } = await sb.from('rrhh_asistencias_detalle').update({
    error_salvado: false,
    salvado_por: null, salvado_motivo: null, salvado_at: null,
  }).eq('id', detalleId);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('quitar_salvado', 'rrhh_asistencias_detalle', detalleId, 'error_salvado', 'true', 'false');
  toast('Salvado removido', 'success');
  await renderDetalleEmpDia(empId);
  await renderResumenContent();
}

async function renderDetalleEmpDia(empId) {
  const cont = document.getElementById(`detalle-cont-${empId}`);
  if (!cont) return;
  const [y, m] = asisState.mes.split('-').map(Number);
  const fechaDesde = `${y}-${String(m).padStart(2,'0')}-01`;
  const fechaHasta = new Date(y, m, 0).toISOString().split('T')[0];

  const { data: detalle } = await sb.from('rrhh_asistencias_detalle')
    .select('*, turno:rrhh_turnos(hora_inicio, hora_fin, tipo, es_franco)')
    .eq('empleado_id', empId)
    .gte('fecha', fechaDesde).lte('fecha', fechaHasta)
    .order('fecha', { ascending: true });

  if (!detalle || detalle.length === 0) {
    cont.innerHTML = '<div class="emp-empty" style="padding:20px;">Sin días procesados.</div>';
    return;
  }

  const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fmtMin = (mm) => {
    if (mm == null || mm === 0) return '—';
    const sign = mm < 0 ? '-' : '';
    const abs = Math.abs(mm);
    return `${sign}${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
  };
  const fmtHora = (h) => h ? h.substring(0,5) : '—';
  const ESTADO_MAP = {
    'puntual':       { label: '✓ Puntual',         color: 'var(--success)', bg: '#d1faf1' },
    'tarde':         { label: '⚠ Tarde',           color: 'var(--warning)', bg: '#fef3c7' },
    'ausente':       { label: '✗ Ausente',         color: 'var(--danger)',  bg: '#fee2e2' },
    'vacaciones':    { label: '🌴 Vacaciones',     color: 'var(--accent2)', bg: '#d1faf1' },
    'licencia':      { label: '📋 Licencia',       color: '#92400e',        bg: '#fef3c7' },
    'feriado':       { label: '🔒 Feriado',        color: '#b91c1c',        bg: '#fee2e2' },
    'franco':        { label: '— Franco',          color: 'var(--muted)',   bg: '#f3f4f6' },
    'falta_fichada': { label: '⚠ Falta fichada',   color: '#92400e',        bg: '#fef3c7' },
    'sin_definir':   { label: '?',                 color: 'var(--muted)',   bg: 'white' },
  };

  function detectarAnomalia(d) {
    if (d.estado === 'vacaciones' || d.estado === 'licencia' ||
        d.estado === 'feriado' || d.estado === 'franco') return null;
    // Ausente con turno planificado = 2 errores (perdió entrada + salida)
    if (d.estado === 'ausente' && d.turno?.hora_inicio) {
      return '🎖 ERROR · Ausente sin justificar (×2)';
    }
    if (d.estado === 'ausente') return null; // sin turno → no es error
    if (!d.entrada && !d.salida) return null;
    if (d.estado === 'falta_fichada') {
      if (!d.entrada && !d.salida) return '🎖 ERROR · Sin fichar entrada ni salida (×2)';
      if (!d.entrada) return '🎖 ERROR · Olvidó fichar entrada';
      if (!d.salida)  return '🎖 ERROR · Olvidó fichar salida';
    }
    if (d.estado === 'tarde' && (d.minutos_tarde||0) > 0) {
      return `🎖 ERROR · Tarde ${d.minutos_tarde} min`;
    }
    return null;
  }
  function puntosErrorPremio(d) {
    if (d.estado === 'falta_fichada') return (!d.entrada && !d.salida) ? 2 : 1;
    if (d.estado === 'ausente' && d.turno?.hora_inicio) return 2;
    if (d.estado === 'tarde') return 1;
    return 0;
  }
  function esErrorPremio(d) { return puntosErrorPremio(d) > 0; }

  // Contar errores del mes (excluyendo los salvados) — suma puntos (1 o 2 por día)
  const totalErrores = detalle.reduce((s,d) => s + (d.error_salvado ? 0 : puntosErrorPremio(d)), 0);
  const totalSalvados = detalle.reduce((s,d) => s + (d.error_salvado ? puntosErrorPremio(d) : 0), 0);
  const puedeSalvar = ['admin','gerente'].includes(session.rol);

  // Cargar max errores del local del empleado
  let maxErr = 4;
  try {
    const { data: emp } = await sb.from('rrhh_empleados').select('local').eq('id', empId).single();
    const { data: tol } = await sb.from('rrhh_config_tolerancias').select('max_errores_premio').eq('local', emp.local).single();
    if (tol) maxErr = tol.max_errores_premio || 4;
  } catch(e) {}

  cont.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Detalle día por día</div>
    <table style="width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;border:1px solid var(--border);font-size:12px;">
      <thead>
        <tr style="background:#f9fafb;text-align:left;">
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Fecha</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);">Día</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);">Turno planificado</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:center;">Entrada</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:center;">Salida</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:center;">Estado</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:right;">Tarde</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:right;">Extra</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);text-align:right;">Δ Banco</th>
          <th style="padding:6px 10px;font-size:10px;color:var(--muted);">Observación</th>
        </tr>
      </thead>
      <tbody>
        ${detalle.map(d => {
          const fecha = new Date(d.fecha + 'T12:00:00');
          const dow = DIAS[fecha.getDay()];
          const dia_num = fecha.getDate();
          const est = ESTADO_MAP[d.estado] || ESTADO_MAP.sin_definir;
          const turnoTxt = d.turno?.es_franco ? '— Franco' :
                           (d.turno?.hora_inicio ? `${fmtHora(d.turno.hora_inicio)} → ${fmtHora(d.turno.hora_fin)}` : '—');
          const anomalia = detectarAnomalia(d);
          const banco = d.minutos_banco || 0;
          const sinEntrada = !d.entrada && ['tarde','puntual','falta_fichada'].includes(d.estado);
          const sinSalida = !d.salida && ['tarde','puntual','falta_fichada'].includes(d.estado);
          return `
            <tr style="border-top:1px solid var(--border);${anomalia ? 'background:#fffbeb;' : ''}">
              <td style="padding:5px 10px;font-family:monospace;font-size:11px;color:var(--muted);">${d.fecha}</td>
              <td style="padding:5px 10px;font-weight:600;">${dow} ${String(dia_num).padStart(2,'0')}</td>
              <td style="padding:5px 10px;font-size:11px;color:var(--muted);">${turnoTxt}</td>
              <td style="padding:5px 10px;text-align:center;font-family:monospace;font-weight:${d.entrada?'600':'400'};color:${sinEntrada?'var(--danger)':'var(--text)'};">${sinEntrada?'⚠ falta':fmtHora(d.entrada)}</td>
              <td style="padding:5px 10px;text-align:center;font-family:monospace;font-weight:${d.salida?'600':'400'};color:${sinSalida?'var(--danger)':'var(--text)'};">${sinSalida?'⚠ falta':fmtHora(d.salida)}</td>
              <td style="padding:5px 10px;text-align:center;"><span style="background:${est.bg};color:${est.color};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap;">${est.label}</span></td>
              <td style="padding:5px 10px;text-align:right;color:${(d.minutos_tarde||0)>0?'var(--warning)':'var(--muted)'};">${fmtMin(d.minutos_tarde||0)}</td>
              <td style="padding:5px 10px;text-align:right;color:${(d.minutos_extra||0)>0?'var(--success)':'var(--muted)'};">${fmtMin(d.minutos_extra||0)}</td>
              <td style="padding:5px 10px;text-align:right;font-weight:600;color:${banco>=0?'var(--success)':'var(--danger)'};">${fmtMin(banco)}</td>
              <td style="padding:5px 10px;font-size:11px;">
                ${(() => {
                  if (!anomalia) return '';
                  if (d.error_salvado) {
                    return `<span style="text-decoration:line-through;color:#0d9488;">${anomalia}</span><br><span style="color:#0d9488;font-size:10px;">✓ Salvado: ${escapeHtml(d.salvado_motivo||'')} <em style="color:var(--muted);">— ${escapeHtml(d.salvado_por||'')}</em></span>`;
                  }
                  let html = `<span style="color:#92400e;">${anomalia}</span>`;
                  if (esErrorPremio(d) && puedeSalvar) {
                    html += ` <button class="btn small accent2" style="padding:1px 6px;font-size:10px;margin-left:6px;" onclick="event.stopPropagation();salvarError(${d.id}, ${empId})">Salvar</button>`;
                  }
                  return html;
                })()}
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:12px;flex-wrap:wrap;">
      <div style="color:var(--muted);">
        💡 <strong>🎖 ERROR</strong>: días que cuentan contra el premio. Encargada/admin puede <strong>Salvar</strong> un error (queda registrado el motivo).
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        ${totalSalvados > 0 ? `<span style="font-size:11px;color:#0d9488;">✓ ${totalSalvados} salvado${totalSalvados!==1?'s':''}</span>` : ''}
        <div style="font-weight:600;padding:6px 14px;border-radius:99px;background:${totalErrores > maxErr ? '#fee2e2' : totalErrores === maxErr ? '#fef3c7' : '#d1faf1'};color:${totalErrores > maxErr ? '#b91c1c' : totalErrores === maxErr ? '#92400e' : '#0d9488'};">
          ${totalErrores > maxErr ? `✗ Perdió premio (${totalErrores}/${maxErr})` : totalErrores === maxErr ? `⚠ En el límite (${totalErrores}/${maxErr})` : `✓ Premio OK (${totalErrores}/${maxErr})`}
        </div>
      </div>
    </div>
  `;
}

async function toggleActivoUsuario(id, currentActivo) {
  const nuevoActivo = !currentActivo;
  const { error } = await sb.from('rrhh_usuarios').update({ activo: nuevoActivo }).eq('id', id);
  if (error) { toast('Error: '+error.message, 'error'); return; }
  await auditLog('editar', 'rrhh_usuarios', id, 'activo', String(currentActivo), String(nuevoActivo));
  toast(nuevoActivo ? 'Usuario activado' : 'Usuario desactivado', 'success');
  renderConfigContent();
}

async function crearUsuario() {
  const uuid = document.getElementById('cfg-uuid').value.trim();
  const email = document.getElementById('cfg-email').value.trim();
  const rol = document.getElementById('cfg-rol').value;
  const empId = parseInt(document.getElementById('cfg-empleado').value, 10);
  const localGerencia = rol === 'gerente' ? document.getElementById('cfg-local-gerencia').value || null : null;

  if (!uuid || !/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(uuid)) {
    toast('UUID inválido', 'error'); return;
  }
  if (!email || !email.includes('@')) { toast('Email inválido', 'error'); return; }
  if (!empId) { toast('Falta empleado', 'error'); return; }
  if (rol === 'gerente' && !localGerencia) { toast('Si es gerente, falta el local', 'error'); return; }

  const { data, error } = await sb.from('rrhh_usuarios').insert({
    auth_user_id: uuid, empleado_id: empId, email, rol, local_gerencia: localGerencia, activo: true,
  }).select().single();
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('crear', 'rrhh_usuarios', data.id, null, null, email + ' / ' + rol);
  toast('Usuario vinculado ✓', 'success');
  configState.tab = 'usuarios';
  renderConfigContent();
}

function onTipoChange() {
  const tipo = document.getElementById('perm-tipo').value;
  const row = document.getElementById('perm-horario-row');
  if (tipo === 'dia_completo' || !tipo) {
    row.style.display = 'none';
  } else {
    row.style.display = 'grid';
  }
}

async function guardarPermisoAdmin() {
  const empleado_id = parseInt(document.getElementById('perm-emp').value, 10);
  const fecha = document.getElementById('perm-fecha').value;
  const tipo = document.getElementById('perm-tipo').value;
  const hora_desde = document.getElementById('perm-desde').value || null;
  const hora_hasta = document.getElementById('perm-hasta').value || null;
  const motivo = document.getElementById('perm-motivo').value.trim();
  const descontar_banco = document.getElementById('perm-descontar').checked;
  const minutos_descontar = parseInt(document.getElementById('perm-minutos').value, 10) || 0;

  if (!empleado_id) { toast('Falta empleado', 'error'); return; }
  if (!fecha) { toast('Falta fecha', 'error'); return; }
  if (!tipo) { toast('Falta tipo', 'error'); return; }

  const { data, error } = await sb.from('rrhh_permisos_puntuales').insert({
    empleado_id, fecha, tipo, hora_desde, hora_hasta, motivo,
    estado: 'aprobado',
    solicitado_por: session.email,
    revisado_por:   session.email,
    revisado_at:    new Date().toISOString(),
    descontar_banco,
    minutos_descontar: descontar_banco ? minutos_descontar : 0,
  }).select().single();

  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('crear_permiso', 'rrhh_permisos_puntuales', data.id, null, null, `${tipo} ${fecha}`);
  toast('Permiso aprobado ✓', 'success');
  document.getElementById('permiso-modal').remove();
  listarPermisos();
}

async function aprobarPermiso(id) {
  // Pedir confirmación de minutos a descontar
  const { data: perm } = await sb.from('rrhh_permisos_puntuales').select('*').eq('id', id).single();
  if (!perm) return;

  const descontar = confirm(`¿Descontar minutos del banco?\n\nOK = Sí, descontar.\nCancelar = No descontar (justificado sin penalización).`);
  let minutos = 0;
  if (descontar) {
    const m = prompt('¿Cuántos minutos descontar del banco?', perm.minutos_descontar || '0');
    if (m === null) return;
    minutos = parseInt(m, 10) || 0;
  }

  const { error } = await sb.from('rrhh_permisos_puntuales').update({
    estado: 'aprobado',
    revisado_por: session.email,
    revisado_at: new Date().toISOString(),
    descontar_banco: descontar,
    minutos_descontar: minutos,
  }).eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('aprobar_permiso', 'rrhh_permisos_puntuales', id, 'estado', 'pendiente', 'aprobado');
  toast('Permiso aprobado ✓', 'success');
  listarPermisos();
  actualizarBadgePermisos();
}

async function rechazarPermiso(id) {
  const motivo = prompt('Motivo del rechazo (opcional):');
  if (motivo === null) return;
  const { error } = await sb.from('rrhh_permisos_puntuales').update({
    estado: 'rechazado',
    revisado_por: session.email,
    revisado_at: new Date().toISOString(),
    revision_motivo: motivo,
  }).eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('rechazar_permiso', 'rrhh_permisos_puntuales', id, 'estado', 'pendiente', 'rechazado');
  toast('Permiso rechazado', 'info');
  listarPermisos();
  actualizarBadgePermisos();
}

async function eliminarPermiso(id) {
  if (!confirm('¿Eliminar este permiso?')) return;
  const { error } = await sb.from('rrhh_permisos_puntuales').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('eliminar_permiso', 'rrhh_permisos_puntuales', id, null, null, null);
  toast('Eliminado', 'info');
  listarPermisos();
}

// ─────────────────────────────────────────────────────────────
// Self-service vendedora: pedir permiso desde mi-calendario
// ─────────────────────────────────────────────────────────────
let editandoPermisoId = null;

async function abrirNuevoPermisoEmpleado(idEditar) {
  if (!session.empleado_id) {
    toast('Tu usuario no está vinculado a un empleado', 'error'); return;
  }
  editandoPermisoId = idEditar || null;

  // Si estamos editando, cargar los datos
  let datos = {};
  let editandoAprobado = false;
  if (editandoPermisoId) {
    const { data: p, error } = await sb.from('rrhh_permisos_puntuales').select('*').eq('id', editandoPermisoId).single();
    if (error || !p) { toast('No se pudo cargar el permiso', 'error'); editandoPermisoId = null; return; }
    const hoyStr = new Date().toISOString().split('T')[0];
    if (p.estado !== 'pendiente' && !(p.estado === 'aprobado' && p.fecha === hoyStr)) {
      toast('Solo podés modificar permisos pendientes (o aprobados del mismo día)', 'error');
      editandoPermisoId = null;
      return;
    }
    editandoAprobado = (p.estado === 'aprobado');
    datos = p;
  }

// Cache del turno consultado para no spamear queries
let _turnoCachePermiso = { fecha: null, turno: null };
let _bufferCache = null;

async function obtenerTurnoVendedoraDia(fecha) {
  if (!fecha || !session.empleado_id) return null;
  if (_turnoCachePermiso.fecha === fecha) return _turnoCachePermiso.turno;
  const { data: turno } = await sb.from('rrhh_turnos')
    .select('hora_inicio, hora_fin, es_franco, tipo')
    .eq('empleado_id', session.empleado_id)
    .eq('fecha', fecha)
    .maybeSingle();
  _turnoCachePermiso = { fecha, turno };
  return turno;
}

async function obtenerBufferEmpleado() {
  if (_bufferCache != null) return _bufferCache;
  const local = session.empleadoData?.local;
  if (!local) { _bufferCache = 15; return 15; }
  const { data: tol } = await sb.from('rrhh_config_tolerancias')
    .select('buffer_entrada').eq('local', local).maybeSingle();
  _bufferCache = tol?.buffer_entrada ?? 15;
  return _bufferCache;
}

function _horaAMin(h) {
  if (!h) return null;
  const parts = h.split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}

function _fmtMin(m) {
  if (m == null || m === 0) return '0 min';
  const sign = m < 0 ? '-' : '';
  const abs = Math.abs(m);
  const h = Math.floor(abs / 60);
  const min = abs % 60;
  if (h === 0) return `${sign}${min} min`;
  if (min === 0) return `${sign}${h}h`;
  return `${sign}${h}h ${min}min`;
}

async function actualizarCalcPermiso() {
  const fecha = document.getElementById('perme-fecha')?.value;
  const tipo = document.getElementById('perme-tipo')?.value;
  const hd = document.getElementById('perme-desde')?.value;
  const hh = document.getElementById('perme-hasta')?.value;

  const turnoInfo = document.getElementById('perme-turno-info');
  const calcBox = document.getElementById('perme-calc-box');
  if (!turnoInfo || !calcBox) return;

  // 1) Mostrar turno del día
  if (fecha) {
    const turno = await obtenerTurnoVendedoraDia(fecha);
    if (turno) {
      if (turno.es_franco) {
        turnoInfo.innerHTML = `📅 Ese día tenés <strong>franco</strong> planificado.`;
      } else if (turno.hora_inicio && turno.hora_fin) {
        turnoInfo.innerHTML = `📅 Turno planificado: <strong>${turno.hora_inicio.substring(0,5)} → ${turno.hora_fin.substring(0,5)}</strong>`;
      } else {
        turnoInfo.innerHTML = `📅 No hay turno planificado para ese día.`;
      }
      turnoInfo.style.display = 'block';
    } else {
      turnoInfo.innerHTML = `📅 No hay turno planificado para ese día.`;
      turnoInfo.style.display = 'block';
    }
  } else {
    turnoInfo.style.display = 'none';
  }

  // 2) Calcular minutos según tipo
  if (!tipo) { calcBox.style.display = 'none'; return; }
  const turno = await obtenerTurnoVendedoraDia(fecha);
  const buffer = await obtenerBufferEmpleado();
  let minutos = 0;
  let explicacion = '';

  if (tipo === 'dia_completo') {
    if (turno && turno.hora_inicio && turno.hora_fin && !turno.es_franco) {
      // Jornada real = (fin) - (inicio + buffer)
      const inicioReal = _horaAMin(turno.hora_inicio) + buffer;
      minutos = _horaAMin(turno.hora_fin) - inicioReal;
      const inicioRealStr = `${String(Math.floor(inicioReal/60)).padStart(2,'0')}:${String(inicioReal%60).padStart(2,'0')}`;
      explicacion = `Jornada completa: ${inicioRealStr} a ${turno.hora_fin.substring(0,5)} (turno planificado ${turno.hora_inicio.substring(0,5)} con ${buffer} min de margen)`;
    } else {
      explicacion = 'No se puede calcular sin turno planificado.';
    }
  } else if (tipo === 'retirarse_antes' && hd) {
    if (turno && turno.hora_fin && !turno.es_franco) {
      // Salida es exacta (sin buffer)
      minutos = _horaAMin(turno.hora_fin) - _horaAMin(hd);
      if (minutos < 0) {
        explicacion = `⚠ La hora es posterior al fin del turno (${turno.hora_fin.substring(0,5)})`;
        minutos = 0;
      } else {
        explicacion = `Te retirás a las ${hd}, el turno termina ${turno.hora_fin.substring(0,5)}`;
      }
    } else {
      explicacion = 'Necesito el turno para calcular.';
    }
  } else if (tipo === 'llegar_tarde' && hd) {
    if (turno && turno.hora_inicio && !turno.es_franco) {
      // Tarde se cuenta desde el horario REAL (turno + buffer)
      const inicioReal = _horaAMin(turno.hora_inicio) + buffer;
      minutos = _horaAMin(hd) - inicioReal;
      const inicioRealStr = `${String(Math.floor(inicioReal/60)).padStart(2,'0')}:${String(inicioReal%60).padStart(2,'0')}`;
      if (minutos < 0) {
        explicacion = `⚠ La hora ${hd} está dentro del margen (entrada real ${inicioRealStr})`;
        minutos = 0;
      } else {
        explicacion = `Llegás a las ${hd}, entrada real ${inicioRealStr} (turno ${turno.hora_inicio.substring(0,5)} + ${buffer} min margen)`;
      }
    } else {
      explicacion = 'Necesito el turno para calcular.';
    }
  } else if (tipo === 'salir_volver' && hd && hh) {
    minutos = _horaAMin(hh) - _horaAMin(hd);
    if (minutos < 0) {
      explicacion = '⚠ La hora de vuelta es anterior a la de salida';
      minutos = 0;
    } else {
      explicacion = `Salís ${hd}, volvés ${hh}`;
    }
  }

  if (minutos > 0) {
    calcBox.innerHTML = `⏱ Estás pidiendo <strong>${_fmtMin(minutos)}</strong> · <span style="font-weight:400;color:#92400e;">${explicacion}</span>`;
    calcBox.style.display = 'block';
  } else if (explicacion) {
    calcBox.innerHTML = `<span style="font-weight:400;">${explicacion}</span>`;
    calcBox.style.display = 'block';
  } else {
    calcBox.style.display = 'none';
  }
}

async function enviarPermisoEmpleado() {
  const fecha = document.getElementById('perme-fecha').value;
  const tipo = document.getElementById('perme-tipo').value;
  const hora_desde = document.getElementById('perme-desde').value || null;
  const hora_hasta = document.getElementById('perme-hasta').value || null;
  const motivo = document.getElementById('perme-motivo').value.trim();

  if (!fecha) { toast('Falta fecha', 'error'); return; }
  if (!tipo) { toast('Falta tipo', 'error'); return; }
  if (!motivo) { toast('Contá el motivo', 'error'); return; }

  // No permitir fechas pasadas
  const hoy = new Date().toISOString().split('T')[0];
  if (fecha < hoy) {
    toast('No podés pedir un permiso para una fecha pasada. Hablálo con la encargada.', 'error');
    return;
  }

  // Calcular minutos pedidos automáticamente (aplicando el buffer del local)
  const turno = await obtenerTurnoVendedoraDia(fecha);
  const buffer = await obtenerBufferEmpleado();
  let minutosCalc = 0;
  if (turno && !turno.es_franco && turno.hora_inicio && turno.hora_fin) {
    const inicioReal = _horaAMin(turno.hora_inicio) + buffer;
    if (tipo === 'dia_completo') {
      // Jornada real = fin - (inicio + buffer)
      minutosCalc = _horaAMin(turno.hora_fin) - inicioReal;
    } else if (tipo === 'retirarse_antes' && hora_desde) {
      // Salida exacta (sin buffer)
      minutosCalc = Math.max(0, _horaAMin(turno.hora_fin) - _horaAMin(hora_desde));
    } else if (tipo === 'llegar_tarde' && hora_desde) {
      // Tarde desde horario real (turno + buffer)
      minutosCalc = Math.max(0, _horaAMin(hora_desde) - inicioReal);
    } else if (tipo === 'salir_volver' && hora_desde && hora_hasta) {
      minutosCalc = Math.max(0, _horaAMin(hora_hasta) - _horaAMin(hora_desde));
    }
  }

  if (editandoPermisoId) {
    // UPDATE — la RLS valida (pendiente, o aprobado del mismo día)
    // Si era aprobado, vuelve a pendiente y se limpia la revisión
    const eraAprobado = !!window._editandoAprobado;
    const updateObj = {
      fecha, tipo, hora_desde, hora_hasta, motivo,
      minutos_descontar: minutosCalc,
    };
    if (eraAprobado) {
      updateObj.estado = 'pendiente';
      updateObj.revisado_por = null;
      updateObj.revisado_at = null;
      updateObj.revision_motivo = null;
    }
    const { error } = await sb.from('rrhh_permisos_puntuales').update(updateObj).eq('id', editandoPermisoId);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast(eraAprobado ? 'Modificado — vuelve a pendiente para re-aprobación' : 'Permiso modificado ✓', 'success');
    editandoPermisoId = null;
    window._editandoAprobado = false;
    document.getElementById('permiso-emp-modal').remove();
    if (currentTab === 'mis-permisos') switchTab('mis-permisos');
    return;
  }

  const { data, error } = await sb.from('rrhh_permisos_puntuales').insert({
    empleado_id: session.empleado_id,
    fecha, tipo, hora_desde, hora_hasta, motivo,
    estado: 'pendiente',
    solicitado_por: session.email,
    minutos_descontar: minutosCalc,
  }).select().single();

  if (error) { toast('Error: ' + error.message, 'error'); return; }
  toast('Solicitud enviada ✓', 'success');
  document.getElementById('permiso-emp-modal').remove();
  if (currentTab === 'mis-permisos') switchTab('mis-permisos');
}

// ════════════════════════════════════════════════════════════
// REGLA DE FRANCO ASOCIADO (solo Unicenter / Alcorta)
//
// Si el período de vacaciones incluye un día de fin de semana (sáb/dom)
// y el día opuesto del mismo finde es franco, se extiende el rango
// para incluir ese franco. Así un finde queda siempre completo (jornada
// larga + franco juntos).
//
// No aplica a oficina.
// No aplica si la vendedora trabaja ambos días del finde (sin franco).
// ════════════════════════════════════════════════════════════
async function _extenderPorFranco(empId, fechaDesde, fechaHasta) {
  const { data: emp } = await sb.from('rrhh_empleados').select('local').eq('id', empId).maybeSingle();
  if (!emp || emp.local === 'oficina') {
    return { desde: fechaDesde, hasta: fechaHasta, extendido: false, mensaje: null };
  }

  const d1 = new Date(fechaDesde + 'T12:00:00');
  const d2 = new Date(fechaHasta + 'T12:00:00');
  const dExt1 = new Date(d1); dExt1.setDate(dExt1.getDate() - 3);
  const dExt2 = new Date(d2); dExt2.setDate(dExt2.getDate() + 3);
  const desdeExt = dExt1.toISOString().split('T')[0];
  const hastaExt = dExt2.toISOString().split('T')[0];

  const { data: turnos } = await sb.from('rrhh_turnos')
    .select('fecha, es_franco, hora_inicio')
    .eq('empleado_id', empId)
    .gte('fecha', desdeExt).lte('fecha', hastaExt);
  const turnoPorFecha = {};
  (turnos || []).forEach(t => { turnoPorFecha[t.fecha] = t; });

  let nuevoDesde = fechaDesde;
  let nuevoHasta = fechaHasta;
  const ajustes = [];

  let d = new Date(d1);
  while (d <= d2) {
    const fecha = d.toISOString().split('T')[0];
    const dow = d.getDay(); // 0=Dom, 6=Sáb
    if (dow === 0 || dow === 6) {
      const opuesto = new Date(d);
      if (dow === 0) opuesto.setDate(opuesto.getDate() - 1); // dom → sábado del mismo finde
      else opuesto.setDate(opuesto.getDate() + 1);            // sáb → domingo del mismo finde
      const fechaOp = opuesto.toISOString().split('T')[0];
      const turnoOp = turnoPorFecha[fechaOp];
      // Solo extender si la opuesta es franco Y no está en el rango actual
      if (turnoOp && turnoOp.es_franco && (fechaOp < nuevoDesde || fechaOp > nuevoHasta)) {
        if (fechaOp < nuevoDesde) nuevoDesde = fechaOp;
        if (fechaOp > nuevoHasta) nuevoHasta = fechaOp;
        ajustes.push(`${fechaOp} (franco asociado al ${dow===0?'domingo':'sábado'} ${fecha})`);
      }
    }
    d.setDate(d.getDate() + 1);
  }

  const extendido = ajustes.length > 0;
  return {
    desde: nuevoDesde, hasta: nuevoHasta, extendido,
    mensaje: extendido ? `Se agregó: ${ajustes.join(', ')}` : null,
  };
}

// FIFO: descuenta `diasTotal` del saldo pendiente del empleado, empezando
// del año más viejo. Si los días no entran en un solo año, parte en varios.
// Devuelve lista de tramos: [{vacId, año, dias}, ...]
// Si el saldo del año más viejo no es suficiente y NO hay años siguientes,
// crea el año actual con corresp=0.
async function _consumirSaldoFIFO(empId, diasTotal) {
  // 1) Cargar todos los saldos del empleado (ordenado por año asc)
  const { data: saldos } = await sb.from('rrhh_vacaciones')
    .select('id, año, dias_correspondientes, dias_tomados, dias_pendientes')
    .eq('empleado_id', empId)
    .order('año', { ascending: true });

  const conPendientes = (saldos || []).filter(s => (s.dias_pendientes || 0) > 0);

  const tramos = [];
  let restantes = diasTotal;

  // 2) Repartir entre años con pendientes (más viejo primero)
  for (const s of conPendientes) {
    if (restantes <= 0) break;
    const aTomar = Math.min(s.dias_pendientes, restantes);
    tramos.push({ vacId: s.id, año: s.año, dias: aTomar });
    restantes -= aTomar;
  }

  // 3) Si quedan días sin saldo donde imputar
  if (restantes > 0) {
    // Si hay saldos del año actual o futuro, los usamos aunque tengan 0 pendientes (negativo)
    // O creamos el año actual si no existe
    const añoActual = new Date().getFullYear();
    let saldoFallback = (saldos || []).find(s => s.año === añoActual);
    if (saldoFallback) {
      tramos.push({ vacId: saldoFallback.id, año: añoActual, dias: restantes });
    } else {
      // Crear saldo año actual con corresp=0
      const { data: created, error: errC } = await sb.from('rrhh_vacaciones')
        .insert({ empleado_id: empId, año: añoActual, dias_correspondientes: 0, dias_tomados: 0 })
        .select().single();
      if (errC) throw new Error('No se pudo crear saldo: '+errC.message);
      tramos.push({ vacId: created.id, año: añoActual, dias: restantes });
    }
  }

  return tramos;
}

async function guardarAsignarVacacion() {
  const empSel = document.getElementById('asg-emp');
  const empId = parseInt(empSel.value, 10);
  let desde = document.getElementById('asg-desde').value;
  let hasta = document.getElementById('asg-hasta').value;
  const obs = document.getElementById('asg-obs').value.trim();

  if (!empId) { toast('Falta empleado', 'error'); return; }
  if (!desde || !hasta) { toast('Faltan fechas', 'error'); return; }
  if (hasta < desde) { toast('La fecha hasta no puede ser anterior a desde', 'error'); return; }

  // Aplicar regla franco asociado (solo locales)
  const ext = await _extenderPorFranco(empId, desde, hasta);
  if (ext.extendido) {
    if (!confirm(`Período incluye día de jornada larga. Se extiende para completar el finde:\n\n  Original: ${desde} → ${hasta}\n  Ajustado: ${ext.desde} → ${ext.hasta}\n  ${ext.mensaje}\n\n¿Continuar?`)) return;
    desde = ext.desde;
    hasta = ext.hasta;
  }

  const opt = empSel.options[empSel.selectedIndex];
  const esOficina = opt?.dataset?.local === 'oficina';
  const dias = esOficina ? _diasHabilesUI(desde, hasta) : (Math.round((new Date(hasta+'T12:00:00') - new Date(desde+'T12:00:00')) / 86400000) + 1);
  const hoy = new Date().toISOString().split('T')[0];
  const estado = (desde < hoy) ? 'tomada' : 'aprobada';

  // FIFO — repartir los días entre años más viejos primero
  let tramos;
  try { tramos = await _consumirSaldoFIFO(empId, dias); }
  catch(e) { toast('Error: '+e.message, 'error'); return; }

  // Mostrar info al usuario si se parte en varios años
  if (tramos.length > 1) {
    const detalle = tramos.map(t => `${t.dias}d → ${t.año}`).join(', ');
    if (!confirm(`Los ${dias} días se reparten así por FIFO:\n${detalle}\n\n¿Confirmás?`)) return;
  }

  // Calcular sumas de descuento por año para actualizar saldos
  const sumaPorVac = {};
  tramos.forEach(t => { sumaPorVac[t.vacId] = (sumaPorVac[t.vacId] || 0) + t.dias; });

  // Update saldos
  for (const vacIdStr in sumaPorVac) {
    const vacId = parseInt(vacIdStr, 10);
    const { data: s } = await sb.from('rrhh_vacaciones').select('dias_tomados').eq('id', vacId).single();
    await sb.from('rrhh_vacaciones').update({ dias_tomados: (s.dias_tomados||0) + sumaPorVac[vacId] }).eq('id', vacId);
  }

  // Crear movimientos (uno por tramo, con las mismas fechas)
  const obsBase = (obs || 'Asignada directamente por encargada/admin') + (esOficina ? ' (días hábiles)' : '');
  const inserts = tramos.map(t => ({
    vacaciones_id: t.vacId,
    empleado_id: empId,
    fecha_desde: desde,
    fecha_hasta: hasta,
    dias: t.dias,
    estado,
    solicitado_por: session.email,
    aprobado_por:   session.email,
    fecha_aprobacion: new Date().toISOString(),
    observaciones: obsBase + (tramos.length > 1 ? ` — Imputado a saldo ${t.año} (FIFO)` : ''),
  }));
  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert(inserts).select();
  if (error) { toast('Error: ' + error.message, 'error'); return; }

  await auditLog('asignar_vacacion', 'rrhh_vacaciones_movimientos', data[0]?.id || null, null, null,
    `${desde} → ${hasta} (${dias}d, ${estado}, ${tramos.length} tramo${tramos.length>1?'s':''})`);
  toast(`✓ ${dias} días asignados${tramos.length>1 ? ' (FIFO: '+tramos.length+' tramos)' : ''}`, 'success');
  document.getElementById('asignvac-modal').remove();
  if (typeof renderVacContent === 'function') renderVacContent();
}

// Calcula cuántos días son elegibles para pago en cada año del empleado.
// Reglas (LCT):
//  - Mínimo 3 semanas de vacaciones anuales para poder pagar
//  - Máx 1 semana paga por año
//  - Conversión de "semana" según local:
//     · OFICINA: 1 semana = 5 días hábiles (min=15, max_pag=5)
//     · LOCALES (Alcorta/Unicenter): 1 semana = 7 días corridos (min=21, max_pag=7)
async function _disponibilidadParaPago(empId) {
  // Determinar tipo de cómputo según el local del empleado
  const { data: emp } = await sb.from('rrhh_empleados').select('local').eq('id', empId).maybeSingle();
  const esOficina = emp?.local === 'oficina';
  const minCorresp = esOficina ? 15 : 21;
  const maxPagAño  = esOficina ? 5  : 7;
  const tipoTxt    = esOficina ? 'hábiles' : 'corridos';

  const { data: saldos } = await sb.from('rrhh_vacaciones')
    .select('id, año, dias_correspondientes, dias_pendientes, dias_tomados')
    .eq('empleado_id', empId).order('año', { ascending: true });

  if (!saldos || saldos.length === 0) return { saldos: [], esOficina, minCorresp, maxPagAño, tipoTxt };

  // Cuántos días ya están "pagados" por año (solo movimientos con estado='pagada')
  const { data: pagos } = await sb.from('rrhh_vacaciones_movimientos')
    .select('vacaciones_id, dias')
    .eq('empleado_id', empId)
    .eq('estado', 'pagada');
  const pagPorVac = {};
  (pagos || []).forEach(p => { pagPorVac[p.vacaciones_id] = (pagPorVac[p.vacaciones_id] || 0) + (p.dias || 0); });

  const lista = saldos.map(s => {
    const yaPagados = pagPorVac[s.id] || 0;
    let disp = 0;
    let motivo = null;
    if (s.dias_correspondientes < minCorresp) {
      motivo = `corresp=${s.dias_correspondientes}${tipoTxt[0]} (< ${minCorresp} mínimo, 3 semanas)`;
    } else if (yaPagados >= maxPagAño) {
      motivo = `ya se pagaron ${yaPagados}${tipoTxt[0]} este año (máx ${maxPagAño})`;
    } else if (s.dias_pendientes <= 0) {
      motivo = 'sin pendientes';
    } else {
      disp = Math.min(maxPagAño - yaPagados, s.dias_pendientes);
    }
    return {
      vacId: s.id, año: s.año, corresp: s.dias_correspondientes,
      pendientes: s.dias_pendientes, ya_pagados: yaPagados,
      disponible_pago: disp, motivo,
    };
  });

  return { saldos: lista, esOficina, minCorresp, maxPagAño, tipoTxt };
}

async function actualizarSaldoPagVac() {
  const empId = parseInt(document.getElementById('pag-emp').value, 10);
  const box = document.getElementById('pag-saldo-box');
  if (!empId) { box.style.display = 'none'; return; }

  const r = await _disponibilidadParaPago(empId);
  const { saldos, esOficina, minCorresp, maxPagAño, tipoTxt } = r;

  if (saldos.length === 0) {
    box.innerHTML = `<div style="background:#fee2e2;color:#7f1d1d;padding:10px 12px;border-radius:8px;">⚠ Sin saldos cargados</div>`;

  const noElegibles = saldos.filter(d => d.disponible_pago === 0 && d.pendientes > 0);

  let html = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${esOficina ? '🏢 Oficina (días hábiles)' : '🏬 Local (días corridos)'}</div>`;

    html += `<div style="background:#d1faf1;color:#065f46;padding:10px 12px;border-radius:8px;border-left:3px solid #0d9488;margin-bottom:6px;">💵 Disponible para pago: ${detalle}</div>`;
  } else {
    html += `<div style="background:#fee2e2;color:#7f1d1d;padding:10px 12px;border-radius:8px;border-left:3px solid #dc2626;margin-bottom:6px;">⚠ Sin días elegibles para pago</div>`;
  }
  if (noElegibles.length > 0) {
    const detalleNo = noElegibles.map(d => `${d.año}: ${d.pendientes}${tipoTxt[0]} (${d.motivo})`).join(' · ');
    html += `<div style="background:#fef3c7;color:#92400e;padding:8px 12px;border-radius:8px;font-size:11px;">Años NO elegibles: ${detalleNo}</div>`;
  }
  html += `<div style="margin-top:8px;font-size:11px;color:var(--muted);">📋 Reglas: el año debe tener ≥ ${minCorresp}d (3 semanas ${tipoTxt}). Máx ${maxPagAño}d (1 semana ${tipoTxt}) pagados por año.</div>`;
  box.innerHTML = html;
  box.style.display = 'block';

  const inputDias = document.getElementById('pag-dias');
  if (inputDias && (!inputDias.value || parseInt(inputDias.value,10) > totalDisp)) {
    inputDias.value = Math.min(totalDisp, maxPagAño) || 0;
    inputDias.max = totalDisp;
  }
}

async function guardarPagoVacaciones() {
  const empId = parseInt(document.getElementById('pag-emp').value, 10);
  const dias = parseInt(document.getElementById('pag-dias').value, 10);
  const fecha = document.getElementById('pag-fecha').value;
  const obs = document.getElementById('pag-obs').value.trim();

  if (!empId) { toast('Falta empleado', 'error'); return; }
  if (!dias || dias <= 0) { toast('Indicá la cantidad de días', 'error'); return; }
  if (!fecha) { toast('Falta fecha de pago', 'error'); return; }

  // FIFO con restricciones: solo años elegibles y máximo por reglas (oficina=15/5, locales=21/7)
  const r = await _disponibilidadParaPago(empId);
  const { saldos, minCorresp, maxPagAño, tipoTxt } = r;
  const elegibles = saldos.filter(d => d.disponible_pago > 0);
  const totalDisp = elegibles.reduce((s,d) => s + d.disponible_pago, 0);

  if (totalDisp === 0) {
    toast(`Sin días elegibles (requiere ≥${minCorresp}${tipoTxt[0]} corresp y < ${maxPagAño}${tipoTxt[0]} ya pagados)`, 'error');
    return;
  }
  if (dias > totalDisp) {
    toast(`Solo se pueden pagar ${totalDisp} días ${tipoTxt} (límite por reglas)`, 'error');
    return;
  }

  // Repartir FIFO entre años elegibles (más viejo primero)
  const tramos = [];
  let restantes = dias;
  for (const e of elegibles) {
    if (restantes <= 0) break;
    const tomar = Math.min(e.disponible_pago, restantes);
    tramos.push({ vacId: e.vacId, año: e.año, dias: tomar });
    restantes -= tomar;
  }

  if (tramos.length > 1) {
    const detalle = tramos.map(t => `${t.dias}d → ${t.año}`).join(', ');
    if (!confirm(`Los ${dias} días se reparten así por FIFO:\n${detalle}\n\n¿Confirmás el pago?`)) return;
  }

  // Update saldos
  const sumaPorVac = {};
  tramos.forEach(t => { sumaPorVac[t.vacId] = (sumaPorVac[t.vacId] || 0) + t.dias; });
  for (const vacIdStr in sumaPorVac) {
    const vacId = parseInt(vacIdStr, 10);
    const { data: s } = await sb.from('rrhh_vacaciones').select('dias_tomados').eq('id', vacId).single();
    await sb.from('rrhh_vacaciones').update({ dias_tomados: (s.dias_tomados||0) + sumaPorVac[vacId] }).eq('id', vacId);
  }

  // Crear movimientos con estado='pagada' (uno por tramo)
  const inserts = tramos.map(t => ({
    vacaciones_id: t.vacId,
    empleado_id: empId,
    fecha_desde: fecha,
    fecha_hasta: fecha,
    dias: t.dias,
    estado: 'pagada',
    solicitado_por: session.email,
    aprobado_por:   session.email,
    fecha_aprobacion: new Date().toISOString(),
    observaciones: (obs || 'Pago de vacaciones no tomadas') + ` — Imputado a saldo ${t.año}${tramos.length > 1 ? ' (FIFO)' : ''}`,
  }));
  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert(inserts).select();
  if (error) { toast('Error: ' + error.message, 'error'); return; }

  await auditLog('pagar_vacaciones', 'rrhh_vacaciones_movimientos', data[0]?.id || null, null, null,
    `${dias}d pagados ${tramos.length>1?'(FIFO '+tramos.length+' tramos)':''}`);
  toast(`✓ Pago registrado: ${dias} días`, 'success');
  document.getElementById('pagvac-modal').remove();
  if (typeof renderVacContent === 'function') renderVacContent();
}

function _diasHabilesUI(desdeStr, hastaStr) {
  let d = new Date(desdeStr + 'T12:00:00');
  const f = new Date(hastaStr + 'T12:00:00');
  let n = 0;
  while (d <= f) {
    const dow = d.getDay(); // 0=Dom .. 6=Sáb
    if (dow !== 0 && dow !== 6) n++;
    d.setDate(d.getDate() + 1);
  }
  return n;
}

async function guardarCargaMasivaVac() {
  const filas = document.querySelectorAll('.cargavac-row');
  const items = [];   // {empId, desde, hasta, dias, año, obs, esOficina}
  const errores = [];

  // Necesitamos saber el local del empleado para calcular días hábiles vs corridos
  // Lo conseguimos de la lista pre-cargada
  const empMap = {};
  (window._cargaVacEmpleados || []).forEach(e => { empMap[e.id] = e; });

  const ajustesFranco = [];   // para avisar al final

  for (let idx = 0; idx < filas.length; idx++) {
    const f = filas[idx];
    const empId = parseInt(f.querySelector('[data-cv="empleado"]').value, 10);
    let desde = f.querySelector('[data-cv="desde"]').value;
    let hasta = f.querySelector('[data-cv="hasta"]').value;
    const obs   = f.querySelector('[data-cv="obs"]').value.trim();

    // Saltar filas vacías
    if (!empId && !desde && !hasta) continue;

    if (!empId) { errores.push(`Fila ${idx+1}: falta empleado`); continue; }
    if (!desde) { errores.push(`Fila ${idx+1}: falta fecha desde`); continue; }
    if (!hasta) { errores.push(`Fila ${idx+1}: falta fecha hasta`); continue; }
    if (hasta < desde) { errores.push(`Fila ${idx+1}: la fecha hasta no puede ser anterior a desde`); continue; }

    const emp = empMap[empId];
    const esOficina = emp?.local === 'oficina';

    // Aplicar regla franco asociado (solo locales)
    if (!esOficina) {
      const ext = await _extenderPorFranco(empId, desde, hasta);
      if (ext.extendido) {
        ajustesFranco.push(`Fila ${idx+1} (${emp?.nombre_completo}): ${desde}→${hasta}  →  ${ext.desde}→${ext.hasta} (${ext.mensaje})`);
        desde = ext.desde;
        hasta = ext.hasta;
      }
    }

    const d1 = new Date(desde + 'T12:00:00');
    const d2 = new Date(hasta + 'T12:00:00');
    const dias = esOficina
      ? _diasHabilesUI(desde, hasta)
      : (Math.round((d2 - d1) / (1000*60*60*24)) + 1);

    items.push({
      empId, desde, hasta, dias, año: d1.getFullYear(),
      obs: obs || null, esOficina,
    });
  }

  if (ajustesFranco.length > 0) {
    if (!confirm(`Las siguientes filas se extendieron por la regla "franco asociado":\n\n${ajustesFranco.join('\n')}\n\n¿Continuar?`)) return;
  }

  if (errores.length > 0) {
    toast('Revisá: ' + errores.join(' · '), 'error');
    return;
  }
  if (items.length === 0) {
    toast('No hay nada para cargar', 'info');
    return;
  }

  // Resolver/crear saldo en rrhh_vacaciones para cada (empleado, año) — necesario para la FK
  const vacIdCache = {};   // key="empId_año" → vacaciones_id
  const sumaPorEmpAño = {};
  for (const it of items) {
    const k = `${it.empId}_${it.año}`;
    sumaPorEmpAño[k] = (sumaPorEmpAño[k] || 0) + it.dias;
  }
  for (const k in sumaPorEmpAño) {
    const [empId, año] = k.split('_').map(Number);
    const dias = sumaPorEmpAño[k];
    const { data: existing } = await sb.from('rrhh_vacaciones')
      .select('id, dias_tomados').eq('empleado_id', empId).eq('año', año).maybeSingle();
    if (existing) {
      vacIdCache[k] = existing.id;
      await sb.from('rrhh_vacaciones')
        .update({ dias_tomados: (existing.dias_tomados || 0) + dias })
        .eq('id', existing.id);
    } else {
      const { data: created, error: errCreate } = await sb.from('rrhh_vacaciones')
        .insert({ empleado_id: empId, año, dias_correspondientes: 0, dias_tomados: dias })
        .select().single();
      if (errCreate) { toast('Error creando saldo: '+errCreate.message,'error'); return; }
      vacIdCache[k] = created.id;
    }
  }

  // Armar inserts de movimientos con vacaciones_id y campos correctos del schema
  const inserts = items.map(it => ({
    vacaciones_id: vacIdCache[`${it.empId}_${it.año}`],
    empleado_id: it.empId,
    fecha_desde: it.desde,
    fecha_hasta: it.hasta,
    dias: it.dias,
    estado: 'tomada',
    observaciones: it.obs ? (it.obs + (it.esOficina ? ' (días hábiles)' : '')) : (it.esOficina ? 'Carga masiva (días hábiles)' : 'Carga masiva'),
    solicitado_por: session.email,
    aprobado_por: session.email,
    fecha_aprobacion: new Date().toISOString(),
  }));

  // Insertar en lote
  const { data, error } = await sb.from('rrhh_vacaciones_movimientos').insert(inserts).select();
  if (error) { toast('Error: ' + error.message, 'error'); return; }

  await auditLog('carga_masiva_vacaciones', 'rrhh_vacaciones_movimientos', null, null, null, `${inserts.length} registros`);
  toast(`✓ ${inserts.length} vacaciones cargadas`, 'success');
  document.getElementById('cargavac-modal').remove();
  if (typeof renderVacContent === 'function') renderVacContent();
}

function inferirTipoExtra(motivo) {
  if (!motivo) return 'otro';
  const m = motivo.toLowerCase();
  if (m.includes('franco') || m.includes('día libre')) return 'franco';
  if (m.includes('antes') || m.includes('temprano')) return 'antes_turno';
  if (m.includes('después') || m.includes('despues') || m.includes('hasta')) return 'despues_turno';
  return 'otro';
}

async function guardarExtra() {
  const empleado_id = parseInt(document.getElementById('ext-emp').value, 10);
  const fecha = document.getElementById('ext-fecha').value;
  const tipo = document.getElementById('ext-tipo').value;
  const horas = parseInt(document.getElementById('ext-horas').value, 10) || 0;
  const mins = parseInt(document.getElementById('ext-mins').value, 10) || 0;
  const minutos = horas * 60 + mins;
  const compensacion = document.getElementById('ext-comp').value;
  const motivo = document.getElementById('ext-motivo').value.trim();

  if (!empleado_id) { toast('Falta empleado', 'error'); return; }
  if (!fecha) { toast('Falta fecha', 'error'); return; }
  if (minutos <= 0) { toast('Cargá las horas/minutos', 'error'); return; }

  const motivoFinal = `[${tipo}] ${motivo}`.trim();
  const { data, error } = await sb.from('rrhh_horas_extras').insert({
    empleado_id, fecha, minutos,
    motivo: motivoFinal,
    autorizado_por: session.email,
    compensacion,
  }).select().single();

  if (error) { toast('Error: ' + error.message, 'error'); return; }

  // Si compensación = banco, también crear movimiento en banco
  if (compensacion === 'banco') {
    await sb.from('rrhh_banco_minutos').insert({
      empleado_id, fecha, minutos,
      tipo: 'hora_extra',
      referencia_tipo: 'horas_extras',
      referencia_id: data.id,
      observaciones: motivoFinal,
      creado_por: session.email,
    });
  }

  await auditLog('crear_hora_extra', 'rrhh_horas_extras', data.id, null, null, `${minutos} min - ${motivoFinal}`);
  toast('Hora extra registrada ✓', 'success');
  document.getElementById('extra-modal').remove();
  renderAsisTab();
}

async function eliminarExtra(id) {
  if (!confirm('¿Eliminar esta hora extra? Si estaba en banco también se va a borrar el movimiento.')) return;
  // Borrar movimiento de banco asociado
  await sb.from('rrhh_banco_minutos').delete().eq('referencia_tipo','horas_extras').eq('referencia_id', id);
  const { error } = await sb.from('rrhh_horas_extras').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await auditLog('eliminar_hora_extra', 'rrhh_horas_extras', id, null, null, null);
  toast('Eliminado', 'info');
  renderAsisTab();
}

      <div style="font-size:48px;font-weight:800;font-family:monospace;color:${saldoMin>=0?'#0d9488':'#b91c1c'};margin-top:8px;">${saldo?.saldo_horas || '00:00'}</div>
      <div style="font-size:13px;color:${saldoMin>=0?'#0d9488':'#b91c1c'};margin-top:8px;font-style:italic;">
        ${saldoMin >= 480 ? `≈ ${Math.floor(saldoMin/480)} día${Math.floor(saldoMin/480)!==1?'s':''} a favor` : (saldoMin <= -480 ? `≈ ${Math.floor(Math.abs(saldoMin)/480)} día${Math.floor(Math.abs(saldoMin)/480)!==1?'s':''} en contra` : '')}
      </div>
    </div>

    <div class="metrics-grid" style="margin-top:16px;">
      <div class="metric-card accent"><div class="label">Total a favor</div><div class="value" style="font-size:22px;font-family:monospace;">${fmtMin(positivos)}</div></div>
      <div class="metric-card" style="border-left:4px solid var(--danger);"><div class="label">Total en contra</div><div class="value" style="font-size:22px;font-family:monospace;">${fmtMin(negativos)}</div></div>
      <div class="metric-card"><div class="label">Movimientos</div><div class="value">${(movs||[]).length}</div></div>
    </div>

    <div class="card" style="margin-top:16px;padding:14px;">
      <h3 style="margin:0 0 10px;font-size:14px;">Movimientos recientes</h3>
      ${(!movs||movs.length===0) ? `<div style="text-align:center;color:var(--muted);padding:20px;">Sin movimientos.</div>` : `
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:#f9fafb;text-align:left;">
            <th style="padding:8px 10px;font-size:11px;color:var(--muted);">Fecha</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--muted);">Tipo</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--muted);text-align:right;">Minutos</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--muted);">Detalle</th>
          </tr>
        </thead>
        <tbody>
          ${movs.map(m => {
            const t = TIPOS_BANCO[m.tipo] || { label: m.tipo, color: '#6b7280', icon: '•' };
            return `<tr style="border-top:1px solid var(--border);">
              <td style="padding:8px 10px;font-family:monospace;font-size:12px;">${m.fecha}</td>
              <td style="padding:8px 10px;">${t.icon} ${t.label}</td>
              <td style="padding:8px 10px;text-align:right;font-family:monospace;font-weight:600;color:${(m.minutos||0)>=0?'var(--success)':'var(--danger)'};">${fmtMin(m.minutos)}</td>
              <td style="padding:8px 10px;font-size:11px;color:var(--muted);">${escapeHtml(m.observaciones || '')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>

    <div class="card" style="margin-top:16px;padding:14px;background:#fef3c7;border-left:4px solid #d97706;">
      <div style="font-size:13px;color:#92400e;">
        💡 <strong>¿Cómo funciona el banco?</strong><br>
        Si tenés muchos minutos <strong>a favor</strong> (saldo positivo), podés pedir días extra de vacaciones o que se te paguen.<br>
        Si tenés minutos <strong>en contra</strong> (saldo negativo), se descuentan del sueldo de las vacaciones.
      </div>
    </div>
  `;
}

</script>
</body>
</html>
